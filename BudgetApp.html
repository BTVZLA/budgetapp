                        </div>
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Iniciales</label>
                          <div className="flex items-center gap-2">
                            <input value={fichaForm.initials} onChange={e=>setFichaForm({...fichaForm,initials:e.target.value.toUpperCase().slice(0,4)})} maxLength={4}
                              className="w-20 border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                            <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'rgb(0,186,179)'}}>
                              {fichaForm.initials||autoInitials([fichaForm.nombres,fichaForm.apellidos].filter(Boolean).join(' '))||'?'}
                            </div>
                          </div>
                        </div>
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Categoría *</label>
                          <select value={fichaForm.catId} onChange={e=>setFichaForm({...fichaForm,catId:e.target.value})}
                            className="w-full border rounded-lg px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400">
                            {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Departamento</label>
                          <select value={fichaForm.deptId||''} onChange={e=>setFichaForm({...fichaForm,deptId:e.target.value})}
                            className="w-full border rounded-lg px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400">
                            <option value="">— Sin asignar —</option>
                            {data.departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Contacto y Datos Bancarios</div>
                      <div className="grid grid-cols-3 gap-2 mb-3">
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Correo Electrónico</label>
                          <input type="email" value={fichaForm.email} onChange={e=>setFichaForm({...fichaForm,email:e.target.value})} placeholder="correo@empresa.com"
                            className="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                        </div>
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Celular / Teléfono</label>
                          <input value={fichaForm.celular} onChange={e=>setFichaForm({...fichaForm,celular:e.target.value})} placeholder="0414-1234567"
                            className="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                        </div>
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Banco</label>
                          <input value={fichaForm.banco} onChange={e=>setFichaForm({...fichaForm,banco:e.target.value})} placeholder="Ej: Banesco"
                            className="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                        </div>
                        <div className="col-span-2">
                          <label className="text-gray-500 text-xs mb-1 block"># de Cuenta</label>
                          <input value={fichaForm.numCuenta} onChange={e=>setFichaForm({...fichaForm,numCuenta:e.target.value})} placeholder="0134-0000-00-0000000000"
                            className="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <button
                          onClick={()=>{
                            if(!fichaForm.nombres.trim()&&!fichaForm.apellidos.trim())return;
                            const name=[fichaForm.nombres.trim(),fichaForm.apellidos.trim()].filter(Boolean).join(' ');
                            const ini=(fichaForm.initials.trim()||autoInitials(name)).toUpperCase();
                            const newPerson={id:uid(),name,nombres:fichaForm.nombres.trim(),apellidos:fichaForm.apellidos.trim(),ci:fichaForm.ci.trim(),initials:ini,catId:fichaForm.catId,deptId:fichaForm.deptId||null,banco:fichaForm.banco.trim(),numCuenta:fichaForm.numCuenta.trim(),celular:fichaForm.celular.trim(),email:fichaForm.email.trim()};
                            // Also sync user name/initials to match
                            const updatedUsers=data.users.map(x=>x.id===u.id?{...x,name,initials:ini,deptId:fichaForm.deptId||x.deptId}:x);
                            save({...data,people:[...people,newPerson],users:updatedUsers});
                            setFichaId(null);
                          }}
                          disabled={!fichaForm.nombres.trim()&&!fichaForm.apellidos.trim()}
                          className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-1.5 rounded-lg text-sm disabled:opacity-40 font-medium transition-colors">
                          💾 Guardar ficha
                        </button>
                        <button onClick={()=>setFichaId(null)} className="border text-gray-500 px-4 py-1.5 rounded-lg text-sm hover:bg-white transition-colors">Cancelar</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="px-4 py-2 bg-amber-50 border-t">
            <p className="text-xs text-amber-600">Estos usuarios tienen cuenta de acceso pero aún no tienen ficha completa en el equipo. Usa <b>📋 Crear ficha</b> para completar sus datos y habilitarlos en proyectos.</p>
          </div>
        </div>
      )}

    </div>
  );
}

/* ── CLIENTES ── */
function ClientsConf({data,save}){
  const clients=data.clients||[];
  const emptyForm={code:'',name:'',shortName:''};
  const [form,setForm]=useState(emptyForm);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [search,setSearch]=useState('');

  const add=()=>{
    if(!form.name.trim())return;
    save({...data,clients:[...clients,{id:uid(),code:form.code.trim(),name:form.name.trim(),shortName:form.shortName.trim()}]});
    setForm(emptyForm);
  };
  const del=id=>save({...data,clients:clients.filter(c=>c.id!==id)});
  const startEdit=c=>{setEditId(c.id);setEditForm({code:c.code||'',name:c.name,shortName:c.shortName||''}); };
  const applyEdit=()=>{
    save({...data,clients:clients.map(c=>c.id===editId?{...c,...editForm,name:editForm.name.trim(),shortName:editForm.shortName.trim(),code:editForm.code.trim()}:c)});
    setEditId(null);
  };

  const filtered=search?clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.code.toLowerCase().includes(search.toLowerCase())||(c.shortName||'').toLowerCase().includes(search.toLowerCase())):clients;

  return(
    <div className="max-w-3xl space-y-5">
      {/* Form */}
      <div className="bg-white rounded-xl border p-5">
        <div className="font-semibold mb-1 text-sm">🏢 Agregar Cliente</div>
        <p className="text-gray-400 text-xs mb-4">Registra los clientes de la firma para asociarlos a los proyectos.</p>
        <div className="grid grid-cols-3 gap-3 mb-4">
          <div>
            <label className="text-gray-400 text-xs mb-1 block">ID / Código</label>
            <input value={form.code} onChange={e=>setForm({...form,code:e.target.value})} placeholder="Ej: CLI-001"
              className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Nombre completo del cliente</label>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Ej: Seguros Caracas, C.A."
              className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Nombre resumido</label>
            <input value={form.shortName} onChange={e=>setForm({...form,shortName:e.target.value})} placeholder="Ej: SEGUROS CCS"
              className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
        </div>
        <button onClick={add} disabled={!form.name.trim()}
          className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-1.5 rounded-lg text-sm disabled:opacity-40">+ Agregar Cliente</button>
      </div>

      {/* Search + List */}
      <div className="bg-white rounded-xl border overflow-hidden">
        <div className="px-4 py-3 border-b flex items-center justify-between gap-3">
          <div className="font-semibold text-sm">Directorio de Clientes <span className="text-gray-400 font-normal text-xs">({clients.length})</span></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar..."
            className="border rounded-lg px-3 py-1.5 text-sm w-48"/>
        </div>
        {filtered.length===0?(
          <div className="p-6 text-center text-gray-400 text-xs">{search?'Sin resultados para "'+search+'"':'Sin clientes registrados.'}</div>
        ):(
          <table className="w-full text-xs">
            <thead className="bg-gray-50 text-gray-400">
              <tr>
                <th className="text-left px-4 py-2 w-28">ID / Código</th>
                <th className="text-left px-4 py-2">Nombre completo</th>
                <th className="text-left px-4 py-2">Nombre resumido</th>
                <th className="w-20"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c=>(
                <tr key={c.id} className="border-t hover:bg-gray-50">
                  {editId===c.id?(
                    <>
                      <td className="px-4 py-2"><input value={editForm.code} onChange={e=>setEditForm({...editForm,code:e.target.value})} className="border rounded px-2 py-1 text-xs w-full"/></td>
                      <td className="px-4 py-2"><input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} className="border rounded px-2 py-1 text-xs w-full"/></td>
                      <td className="px-4 py-2"><input value={editForm.shortName} onChange={e=>setEditForm({...editForm,shortName:e.target.value})} className="border rounded px-2 py-1 text-xs w-full"/></td>
                      <td className="px-4 py-2 text-right whitespace-nowrap">
                        <button onClick={applyEdit} className="text-green-600 font-bold mr-2">✓</button>
                        <button onClick={()=>setEditId(null)} className="text-gray-400">✕</button>
                      </td>
                    </>
                  ):(
                    <>
                      <td className="px-4 py-2"><span className="px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full font-mono">{c.code||'—'}</span></td>
                      <td className="px-4 py-2 font-medium text-gray-700">{c.name}</td>
                      <td className="px-4 py-2 text-gray-500">{c.shortName||'—'}</td>
                      <td className="px-4 py-2 text-right whitespace-nowrap">
                        <button onClick={()=>startEdit(c)} className="text-indigo-400 mr-2">✏️</button>
                        <button onClick={()=>del(c.id)} className="text-red-400">✕</button>
                      </td>
                    </>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}


/* ══════════════════════ GASTOS FIJOS ══════════════════════════════════ */
const MESES_GF=['Ago','Sep','Oct','Nov','Dic','Ene','Feb','Mar','Abr','May','Jun','Jul'];

/* ══════════════════════ COSTOS LABORALES ═══════════════════════════════ */
const LC_COLS=[
  {key:'sueldo',     label:'Sueldo US$',      color:'text-indigo-700'},
  {key:'ticket',     label:'Ticket US$',       color:'text-blue-600'},
  {key:'bstaff',     label:'B-Staff $',        color:'text-purple-600'},
  {key:'depreciacion',label:'Depreciación $',  color:'text-orange-600'},
  {key:'asignacion', label:'Asignación $',     color:'text-teal-600'},
  {key:'movilidad',  label:'Movilidad $',      color:'text-cyan-600'},
  {key:'participaciones',label:'Participaciones $',color:'text-amber-600'},
];

/* ══════════════════════ COSTOS LABORALES ═══════════════════════════════ */

const OLC_CATS=['BENEFICIOS','PRESTACIONES SOCIALES','ADIESTRAMIENTO Y DESARROLLO','EVENTOS Y ACTIVIDADES MOTIVACIONALES','PROVEEDORES','PARAFISCALES'];

function ACostosLaborales({data,save}){
  const items=data.laborCosts||[];
  const olcItems=data.otherLaborCosts||[];
  const [periodo,setPeriodo]=useState(currentPeriodo);
  const [vista,setVista]=useState('nomina'); // 'nomina' | 'otros'
  const [showForm,setShowForm]=useState(false);
  const [search,setSearch]=useState('');
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const emptyForm={nombre:'',cargo:'',sueldo:'',ticket:'',bstaff:'',depreciacion:'',asignacion:'',movilidad:'',participaciones:'',notas:'',activo:true};
  const [form,setForm]=useState(emptyForm);

  // OLC state
  const [olcEditId,setOlcEditId]=useState(null);
  const [olcEditForm,setOlcEditForm]=useState({});
  const [olcCellEdit,setOlcCellEdit]=useState(null);
  const [olcCellVal,setOlcCellVal]=useState('');
  const [showOlcForm,setShowOlcForm]=useState(false);
  const [olcForm,setOlcForm]=useState({categoria:OLC_CATS[0],concepto:'',montos:Array(12).fill('')});

  const periodoItems=items.filter(i=>i.periodo===periodo&&i.activo!==false);
  const filtItems=search?periodoItems.filter(i=>i.nombre.toLowerCase().includes(search.toLowerCase())||i.cargo.toLowerCase().includes(search.toLowerCase())):periodoItems;
  const olcPeriodoItems=olcItems.filter(i=>i.periodo===periodo);

  const totalMensual=r=>LC_COLS.reduce((s,c)=>s+(parseFloat(r[c.key])||0),0);
  const totMes=filtItems.reduce((s,i)=>s+totalMensual(i),0);
  const totAnual=totMes*12;
  const totByCol=key=>filtItems.reduce((s,i)=>s+(parseFloat(i[key])||0),0);

  const olcTotByMonth=MESES_GF.map((_,m)=>olcPeriodoItems.reduce((s,i)=>s+(parseFloat((i.montos||[])[m])||0),0));
  const olcTotAnual=olcTotByMonth.reduce((a,b)=>a+b,0);
  const olcTotItem=item=>(item.montos||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);

  // Nómina actions
  const add=()=>{
    if(!form.nombre.trim())return;
    const ni={id:uid(),periodo,...Object.fromEntries(LC_COLS.map(c=>[c.key,parseFloat(form[c.key])||0])),
      nombre:form.nombre.trim(),cargo:form.cargo.trim(),notas:form.notas.trim(),activo:true};
    save({...data,laborCosts:[...items,ni]});
    setForm(emptyForm);setShowForm(false);
  };
  const del=id=>save({...data,laborCosts:items.filter(i=>i.id!==id)});
  const startEdit=item=>{
    setEditId(item.id);
    setEditForm({nombre:item.nombre,cargo:item.cargo||'',notas:item.notas||'',
      ...Object.fromEntries(LC_COLS.map(c=>[c.key,String(item[c.key]||0)]))});
  };
  const applyEdit=()=>{
    save({...data,laborCosts:items.map(i=>i.id===editId?{...i,
      nombre:editForm.nombre,cargo:editForm.cargo,notas:editForm.notas,
      ...Object.fromEntries(LC_COLS.map(c=>[c.key,parseFloat(editForm[c.key])||0]))}:i)});
    setEditId(null);
  };

  // OLC actions
  const olcAdd=()=>{
    if(!olcForm.concepto.trim())return;
    const ni={id:uid(),periodo,categoria:olcForm.categoria,concepto:olcForm.concepto.trim(),
      montos:olcForm.montos.map(v=>parseFloat(v)||0),montosReal:Array(12).fill(0)};
    save({...data,otherLaborCosts:[...olcItems,ni]});
    setOlcForm({categoria:OLC_CATS[0],concepto:'',montos:Array(12).fill('')});
    setShowOlcForm(false);
  };
  const olcDel=id=>save({...data,otherLaborCosts:olcItems.filter(i=>i.id!==id)});
  const olcStartCell=(id,m,val)=>{setOlcCellEdit({id,m});setOlcCellVal(String(val||''));};
  const olcApplyCell=()=>{
    if(!olcCellEdit)return;
    save({...data,otherLaborCosts:olcItems.map(i=>{
      if(i.id!==olcCellEdit.id)return i;
      const nm=[...(i.montos||Array(12).fill(0))];
      nm[olcCellEdit.m]=parseFloat(olcCellVal)||0;
      return{...i,montos:nm};
    })});
    setOlcCellEdit(null);
  };


  return(
    <div className="p-6">
      {/* Header */}
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h2 className="font-bold text-base">👷 Costos Laborales</h2>
          <p className="text-gray-400 text-xs">Nómina y otros costos — período Ago–Jul</p>
        </div>
        <div className="flex items-center gap-3">
          <select value={periodo} onChange={e=>setPeriodo(e.target.value)} className="border rounded-lg px-3 py-2 text-sm">
            {PERIODOS.map(pp=><option key={pp} value={pp}>{pp} · {periodoLabel(pp)}</option>)}
          </select>
        </div>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-4 gap-3 mb-5">
        <div className="bg-blue-50 rounded-xl border border-blue-200 p-3 text-xs">
          <div className="text-blue-400 mb-0.5">Nómina Mensual</div>
          <div className="font-bold text-blue-700 text-sm">{$n(totMes)}</div>
          <div className="text-blue-300 mt-0.5">{periodoItems.length} empleados · Anual: {$n(totAnual)}</div>
        </div>
        <div className="bg-cyan-50 rounded-xl border border-cyan-200 p-3 text-xs">
          <div className="text-cyan-500 mb-0.5">Otros Costos Laborales</div>
          <div className="font-bold text-cyan-700 text-sm">{$n(olcTotAnual)}</div>
          <div className="text-cyan-300 mt-0.5">{olcPeriodoItems.length} conceptos · Anual</div>
        </div>
        <div className="bg-indigo-50 rounded-xl border border-indigo-200 p-3 text-xs">
          <div className="text-indigo-400 mb-0.5">Total Costos Laborales</div>
          <div className="font-bold text-indigo-700 text-sm">{$n(totAnual+olcTotAnual)}</div>
          <div className="text-indigo-300 mt-0.5">Nómina + Otros · Anual</div>
        </div>
        <div className="bg-amber-50 rounded-xl border border-amber-200 p-3 text-xs">
          <div className="text-amber-500 mb-0.5">Participaciones / mes</div>
          <div className="font-bold text-amber-700 text-sm">{$n(totByCol('participaciones'))}</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-2 mb-5">
        {[['nomina','👷 Nómina'],['otros','📋 Otros Costos Laborales']].map(([v,l])=>(
          <button key={v} onClick={()=>{setVista(v);setShowForm(false);setShowOlcForm(false);}}
            className={'px-4 py-2 rounded-lg text-sm font-medium '+(vista===v?'bg-indigo-600 text-white':'bg-white border text-gray-600 hover:bg-gray-50')}>{l}</button>
        ))}
      </div>

      {/* ── VISTA: NÓMINA ── */}
      {vista==='nomina'&&(
        <div className="space-y-4">
          <div className="flex items-center gap-3">
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar empleado..." className="border rounded-lg px-3 py-2 text-sm w-64"/>
            {search&&<button onClick={()=>setSearch('')} className="text-gray-400 text-xs">✕</button>}
            <button onClick={()=>setShowForm(!showForm)} className="ml-auto bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm">+ Agregar Empleado</button>
          </div>
          {showForm&&(
            <div className="bg-white rounded-xl border p-5">
              <div className="font-semibold text-sm mb-3">Agregar Empleado</div>
              <div className="grid grid-cols-3 gap-3 mb-3">
                <div><label className="text-gray-400 text-xs mb-1 block">Nombre y Apellido</label>
                  <input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Ej: GARCIA, JUAN" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
                <div><label className="text-gray-400 text-xs mb-1 block">Cargo</label>
                  <input value={form.cargo} onChange={e=>setForm({...form,cargo:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
                <div><label className="text-gray-400 text-xs mb-1 block">Notas</label>
                  <input value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
              </div>
              <div className="grid grid-cols-4 gap-3 mb-3">
                {LC_COLS.map(c=>(
                  <div key={c.key}>
                    <label className={'text-xs mb-1 block font-medium '+c.color}>{c.label}</label>
                    <input type="number" value={form[c.key]} onChange={e=>setForm({...form,[c.key]:e.target.value})} placeholder="0" className="w-full border rounded-lg px-3 py-2 text-sm text-right"/>
                  </div>
                ))}
                <div className="flex items-end">
                  <div className="w-full border-2 border-blue-200 bg-blue-50 rounded-lg px-3 py-2 text-sm font-bold text-blue-700">
                    {$n(LC_COLS.reduce((s,c)=>s+(parseFloat(form[c.key])||0),0))}
                  </div>
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={add} disabled={!form.nombre.trim()} className="bg-indigo-600 text-white px-5 py-1.5 rounded-lg text-sm disabled:opacity-40">💾 Guardar</button>
                <button onClick={()=>setShowForm(false)} className="border text-gray-600 px-4 py-1.5 rounded-lg text-sm">Cancelar</button>
              </div>
            </div>
          )}
          <div className="bg-white rounded-xl border overflow-hidden overflow-x-auto">
            <table className="text-xs min-w-max w-full">
              <thead className="bg-blue-50">
                <tr>
                  <th className="text-left px-3 py-2 w-52 text-gray-600 font-semibold">Nombre</th>
                  <th className="text-left px-3 py-2 w-28 text-gray-400">Cargo</th>
                  {LC_COLS.map(c=><th key={c.key} className={'text-right px-2 py-2 w-20 font-medium '+c.color}>{c.label}</th>)}
                  <th className="text-right px-3 py-2 text-blue-700 font-bold">Total Mes</th>
                  <th className="text-right px-3 py-2 text-indigo-600 font-bold">Anual</th>
                  <th className="w-14"></th>
                </tr>
              </thead>
              <tbody>
                {filtItems.length===0?<tr><td colSpan={12} className="text-center py-8 text-gray-400">Sin empleados para este período.</td></tr>
                :filtItems.sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(item=>{
                  const totM=totalMensual(item);
                  return(
                    <tr key={item.id} className="border-t hover:bg-gray-50">
                      {editId===item.id?(
                        <>
                          <td className="px-3 py-1.5"><input value={editForm.nombre} onChange={e=>setEditForm({...editForm,nombre:e.target.value})} className="border rounded px-2 py-1 text-xs w-44"/></td>
                          <td className="px-3 py-1.5"><input value={editForm.cargo} onChange={e=>setEditForm({...editForm,cargo:e.target.value})} className="border rounded px-2 py-1 text-xs w-24"/></td>
                          {LC_COLS.map(c=><td key={c.key} className="px-1 py-1.5"><input type="number" value={editForm[c.key]} onChange={e=>setEditForm({...editForm,[c.key]:e.target.value})} className="border rounded px-1 py-1 text-xs w-16 text-right"/></td>)}
                          <td className="px-3 py-1.5 text-right font-bold text-blue-700">{$n(LC_COLS.reduce((s,c)=>s+(parseFloat(editForm[c.key])||0),0))}</td>
                          <td className="px-3 py-1.5 text-right font-bold text-indigo-600">{$n(LC_COLS.reduce((s,c)=>s+(parseFloat(editForm[c.key])||0),0)*12)}</td>
                          <td className="px-3 py-1.5 text-right whitespace-nowrap">
                            <button onClick={applyEdit} className="text-green-600 font-bold mr-1">✓</button>
                            <button onClick={()=>setEditId(null)} className="text-gray-400">✕</button>
                          </td>
                        </>
                      ):(
                        <>
                          <td className="px-3 py-2 font-medium text-gray-700">{item.nombre}</td>
                          <td className="px-3 py-2 text-gray-500">{item.cargo||'—'}</td>
                          {LC_COLS.map(c=><td key={c.key} className={'px-2 py-2 text-right '+(item[c.key]>0?c.color:'text-gray-200')}>{item[c.key]>0?$n(item[c.key]):'—'}</td>)}
                          <td className="px-3 py-2 text-right font-bold text-blue-700">{$n(totM)}</td>
                          <td className="px-3 py-2 text-right font-bold text-indigo-600">{$n(totM*12)}</td>
                          <td className="px-3 py-2 text-right whitespace-nowrap">
                            <button onClick={()=>startEdit(item)} className="text-indigo-400 mr-2">✏️</button>
                            <button onClick={()=>del(item.id)} className="text-red-400">✕</button>
                          </td>
                        </>
                      )}
                    </tr>
                  );
                })}
              </tbody>
              {filtItems.length>0&&(
                <tfoot className="border-t-2 bg-blue-50 font-bold text-xs">
                  <tr>
                    <td colSpan={2} className="px-3 py-2 text-blue-700">TOTAL MENSUAL</td>
                    {LC_COLS.map(c=><td key={c.key} className={'px-2 py-2 text-right '+(totByCol(c.key)>0?c.color:'text-gray-300')}>{totByCol(c.key)>0?$n(totByCol(c.key)):'—'}</td>)}
                    <td className="px-3 py-2 text-right text-blue-800">{$n(totMes)}</td>
                    <td className="px-3 py-2 text-right text-indigo-700">{$n(totAnual)}</td>
                    <td></td>
                  </tr>
                </tfoot>
              )}
            </table>
          </div>
        </div>
      )}

      {/* ── VISTA: OTROS COSTOS LABORALES ── */}
      {vista==='otros'&&(
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <div className="text-xs text-gray-400">Clic en cualquier celda para editar el monto mensual</div>
            <button onClick={()=>setShowOlcForm(!showOlcForm)} className="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-lg text-sm">+ Agregar Concepto</button>
          </div>

          {showOlcForm&&(
            <div className="bg-white rounded-xl border p-5">
              <div className="font-semibold text-sm mb-3">Nuevo Concepto</div>
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div>
                  <label className="text-gray-400 text-xs mb-1 block">Categoría</label>
                  <select value={olcForm.categoria} onChange={e=>setOlcForm({...olcForm,categoria:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm">
                    {OLC_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-gray-400 text-xs mb-1 block">Concepto</label>
                  <input value={olcForm.concepto} onChange={e=>setOlcForm({...olcForm,concepto:e.target.value})} placeholder="Descripción del concepto" className="w-full border rounded-lg px-3 py-2 text-sm"/>
                </div>
              </div>
              <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Montos Mensuales (USD)</div>
              <div className="grid grid-cols-6 gap-2 mb-3">
                {MESES_GF.map((mes,m)=>(
                  <div key={m}><label className="text-gray-400 text-xs mb-1 block">{mes}</label>
                    <input type="number" value={olcForm.montos[m]} onChange={e=>{const nm=[...olcForm.montos];nm[m]=e.target.value;setOlcForm({...olcForm,montos:nm});}} placeholder="0" className="w-full border rounded-lg px-2 py-1.5 text-xs text-right"/></div>
                ))}
              </div>
              {olcForm.montos.some(v=>parseFloat(v)>0)&&(
                <div className="text-xs text-cyan-600 bg-cyan-50 rounded-lg px-3 py-2 mb-3">
                  Total anual: <b>{$n(olcForm.montos.reduce((s,v)=>s+(parseFloat(v)||0),0))}</b>
                </div>
              )}
              <div className="flex gap-2">
                <button onClick={olcAdd} disabled={!olcForm.concepto.trim()} className="bg-cyan-600 text-white px-5 py-1.5 rounded-lg text-sm disabled:opacity-40">💾 Guardar</button>
                <button onClick={()=>setShowOlcForm(false)} className="border text-gray-600 px-4 py-1.5 rounded-lg text-sm">Cancelar</button>
              </div>
            </div>
          )}

          <div className="bg-white rounded-xl border overflow-hidden overflow-x-auto">
            <table className="text-xs min-w-max w-full">
              <thead className="bg-cyan-50">
                <tr>
                  <th className="text-left px-3 py-2 w-64 text-gray-600 font-semibold">Concepto</th>
                  <th className="text-right px-3 py-2 w-24 text-cyan-700 font-bold">Total Anual</th>
                  {MESES_GF.map((m,i)=><th key={i} className="text-right px-2 py-2 w-20 text-gray-400">{m}</th>)}
                  <th className="w-10"></th>
                </tr>
              </thead>
              <tbody>
                {OLC_CATS.map(cat=>{
                  const catItems=olcPeriodoItems.filter(i=>i.categoria===cat);
                  if(catItems.length===0)return null;
                  return(
                    <React.Fragment key={cat}>
                      <tr className="bg-indigo-700">
                        <td colSpan={16} className="px-3 py-1.5 text-white text-xs font-bold uppercase tracking-wide">{cat}</td>
                      </tr>
                      {catItems.map(item=>(
                        <tr key={item.id} className="border-t hover:bg-gray-50">
                          <td className="px-3 py-2 font-medium text-gray-700 pl-5">{item.concepto}</td>
                          <td className="px-3 py-2 text-right font-bold text-cyan-700">{$n(olcTotItem(item))}</td>
                          {(item.montos||Array(12).fill(0)).map((v,m)=>{
                            const isEd=olcCellEdit&&olcCellEdit.id===item.id&&olcCellEdit.m===m;
                            return(
                              <td key={m} className="px-1 py-2 text-right cursor-pointer hover:bg-cyan-50"
                                onClick={()=>olcStartCell(item.id,m,v)}>
                                {isEd?<input type="number" value={olcCellVal} onChange={e=>setOlcCellVal(e.target.value)}
                                  onBlur={olcApplyCell} onKeyDown={e=>{if(e.key==='Enter')olcApplyCell();if(e.key==='Escape')setOlcCellEdit(null);}}
                                  autoFocus className="border-2 border-cyan-300 rounded px-1 py-0.5 text-xs w-16 text-right" onClick={e=>e.stopPropagation()}/>
                                :<span className={(parseFloat(v)||0)>0?'text-cyan-700':'text-gray-200'}>{(parseFloat(v)||0)>0?$n(parseFloat(v)):'—'}</span>}
                              </td>
                            );
                          })}
                          <td className="px-2 py-2 text-right">
                            <button onClick={()=>olcDel(item.id)} className="text-red-400 hover:text-red-600">✕</button>
                          </td>
                        </tr>
                      ))}
                    </React.Fragment>
                  );
                })}
                {/* Items without category */}
                {olcPeriodoItems.filter(i=>!OLC_CATS.includes(i.categoria)).map(item=>(
                  <tr key={item.id} className="border-t hover:bg-gray-50">
                    <td className="px-3 py-2 font-medium text-gray-700">{item.concepto} <span className="text-gray-400 text-xs">({item.categoria})</span></td>
                    <td className="px-3 py-2 text-right font-bold text-cyan-700">{$n(olcTotItem(item))}</td>
                    {(item.montos||Array(12).fill(0)).map((v,m)=>(
                      <td key={m} className="px-1 py-2 text-right cursor-pointer hover:bg-cyan-50"
                        onClick={()=>olcStartCell(item.id,m,v)}>
                        <span className={(parseFloat(v)||0)>0?'text-cyan-700':'text-gray-200'}>{(parseFloat(v)||0)>0?$n(parseFloat(v)):'—'}</span>
                      </td>
                    ))}
                    <td className="px-2 py-2 text-right"><button onClick={()=>olcDel(item.id)} className="text-red-400">✕</button></td>
                  </tr>
                ))}
                {olcPeriodoItems.length===0&&<tr><td colSpan={16} className="text-center py-10 text-gray-400">Sin conceptos registrados. Haz clic en "+ Agregar Concepto".</td></tr>}
              </tbody>
              {olcPeriodoItems.length>0&&(
                <tfoot className="border-t-2 bg-cyan-50 font-bold text-xs">
                  <tr>
                    <td className="px-3 py-2 text-cyan-700">TOTAL</td>
                    <td className="px-3 py-2 text-right text-cyan-800">{$n(olcTotAnual)}</td>
                    {olcTotByMonth.map((t,i)=><td key={i} className={'px-2 py-2 text-right '+(t>0?'text-cyan-700':'text-gray-300')}>{t>0?$n(t):'—'}</td>)}
                    <td></td>
                  </tr>
                </tfoot>
              )}
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


function AGastosFijos({data,save}){
  const items=data.fixedExpenses||[];
  const [periodo,setPeriodo]=useState(currentPeriodo);
  const [vista,setVista]=useState('presupuesto'); // 'presupuesto' | 'real' | 'comparativo'
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({cuenta:'',concepto:'',montos:Array(12).fill('')});
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [search,setSearch]=useState('');
  const [cellEdit,setCellEdit]=useState(null);
  const [cellVal,setCellVal]=useState('');
  // Import real modal
  const [showImport,setShowImport]=useState(false);
  const [importMes,setImportMes]=useState(0);
  const [importVals,setImportVals]=useState({});
  const [pasteText,setPasteText]=useState('');
  const [pasteMode,setPasteMode]=useState(false);

  const periodoItems=items.filter(i=>i.periodo===periodo);
  const filtItems=search?periodoItems.filter(i=>i.concepto.toLowerCase().includes(search.toLowerCase())||i.cuenta.includes(search)):periodoItems;

  // Totals
  const totEstByMonth=MESES_GF.map((_,m)=>filtItems.reduce((s,i)=>s+(parseFloat(i.montos[m])||0),0));
  const totRealByMonth=MESES_GF.map((_,m)=>filtItems.reduce((s,i)=>s+(parseFloat((i.montosReal||[])[m])||0),0));
  const totEstAnual=totEstByMonth.reduce((a,b)=>a+b,0);
  const totRealAnual=totRealByMonth.reduce((a,b)=>a+b,0);

  const totEstAnualItem=item=>item.montos.reduce((s,v)=>s+(parseFloat(v)||0),0);
  const totRealAnualItem=item=>(item.montosReal||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);

  const emptyF=()=>({cuenta:'',concepto:'',montos:Array(12).fill('')});

  const add=()=>{
    if(!form.concepto.trim())return;
    const newItem={id:uid(),cuenta:form.cuenta.trim(),concepto:form.concepto.trim(),periodo,
      montos:form.montos.map(v=>parseFloat(v)||0),montosReal:Array(12).fill(0)};
    save({...data,fixedExpenses:[...items,newItem]});
    setForm(emptyF());setShowForm(false);
  };
  const del=id=>save({...data,fixedExpenses:items.filter(i=>i.id!==id)});
  const startEdit=item=>{
    setEditId(item.id);
    setEditForm({cuenta:item.cuenta||'',concepto:item.concepto||'',
      montos:item.montos.map(String),montosReal:(item.montosReal||Array(12).fill(0)).map(String)});
  };
  const applyEdit=()=>{
    save({...data,fixedExpenses:items.map(i=>i.id===editId?{...i,
      cuenta:editForm.cuenta,concepto:editForm.concepto,
      montos:editForm.montos.map(v=>parseFloat(v)||0),
      montosReal:editForm.montosReal.map(v=>parseFloat(v)||0)}:i)});
    setEditId(null);
  };

  // Inline cell edit
  const startCell=(id,m,val,type)=>{setCellEdit({id,m,type});setCellVal(String(val||''));};
  const applyCell=()=>{
    if(!cellEdit)return;
    save({...data,fixedExpenses:items.map(i=>{
      if(i.id!==cellEdit.id)return i;
      if(cellEdit.type==='real'){
        const nm=[...(i.montosReal||Array(12).fill(0))];nm[cellEdit.m]=parseFloat(cellVal)||0;
        return{...i,montosReal:nm};
      } else {
        const nm=[...i.montos];nm[cellEdit.m]=parseFloat(cellVal)||0;
        return{...i,montos:nm};
      }
    })});
    setCellEdit(null);
  };

  // ── IMPORTAR REAL ──
  const openImport=m=>{
    setImportMes(m);
    const vals={};
    periodoItems.forEach(i=>{vals[i.id]=String((i.montosReal||[])[m]||'');});
    setImportVals(vals);
    setPasteText('');setPasteMode(false);
    setShowImport(true);
  };

  const applyImport=()=>{
    const updated=items.map(i=>{
      if(i.periodo!==periodo)return i;
      const v=parseFloat(importVals[i.id])||0;
      const nm=[...(i.montosReal||Array(12).fill(0))];
      nm[importMes]=v;
      return{...i,montosReal:nm};
    });
    save({...data,fixedExpenses:updated});
    setShowImport(false);
  };

  // Parse pasted text (from Excel: rows separated by \n, concept\tamount)
  const applyPaste=()=>{
    const lines=pasteText.trim().split('\n');
    const newVals={...importVals};
    lines.forEach(line=>{
      const parts=line.split('\t');
      if(parts.length<2)return;
      const rawAmt=parts[parts.length-1].replace(/[$,\s]/g,'');
      const amt=parseFloat(rawAmt);
      if(isNaN(amt))return;
      const search=parts[0].trim().toLowerCase();
      const match=periodoItems.find(i=>
        i.concepto.toLowerCase().includes(search)||
        i.cuenta.includes(search)||
        search.includes(i.concepto.toLowerCase().slice(0,10))
      );
      if(match) newVals[match.id]=String(amt);
    });
    setImportVals(newVals);
    setPasteMode(false);
    setPasteText('');
  };

  const CellInput=({val})=>(
    <input type="number" value={cellVal} onChange={e=>setCellVal(e.target.value)}
      onBlur={applyCell} onKeyDown={e=>{if(e.key==='Enter')applyCell();if(e.key==='Escape')setCellEdit(null);}}
      autoFocus className="border-2 border-indigo-300 rounded px-1 py-0.5 text-xs w-20 text-right" onClick={e=>e.stopPropagation()}/>
  );

  const MonthCell=({item,m,type})=>{
    const val=type==='real'?(item.montosReal||[])[m]||0:item.montos[m]||0;
    const isEditing=cellEdit&&cellEdit.id===item.id&&cellEdit.m===m&&cellEdit.type===type;
    const color=type==='real'?'text-emerald-600':'text-gray-700';
    return(
      <td className={'px-1 py-2 text-right cursor-pointer hover:bg-blue-50 '+(type==='real'?'bg-emerald-50/30':'')}
        onClick={()=>startCell(item.id,m,val,type)}>
        {isEditing?<CellInput val={val}/>:
          <span className={(parseFloat(val)||0)>0?color:'text-gray-200'}>{(parseFloat(val)||0)>0?$n(parseFloat(val)):'—'}</span>}
      </td>
    );
  };

  const totImport=Object.values(importVals).reduce((s,v)=>s+(parseFloat(v)||0),0);

  return(
    <div className="p-6">
      {/* ── IMPORT MODAL ── */}
      {showImport&&(
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-screen overflow-y-auto">
            <div className="px-6 py-4 border-b flex items-center justify-between">
              <div>
                <div className="font-bold text-sm">📥 Importar Gastos Reales — {MESES_GF[importMes]}</div>
                <div className="text-gray-400 text-xs mt-0.5">Período {periodo} · Ingresa el monto real ejecutado por concepto</div>
              </div>
              <button onClick={()=>setShowImport(false)} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
            </div>
            <div className="p-5">
              {/* Paste mode toggle */}
              <div className="flex gap-2 mb-4">
                <button onClick={()=>setPasteMode(false)}
                  className={'px-3 py-1.5 rounded-lg text-xs font-medium '+(pasteMode?'bg-white border text-gray-600':'bg-indigo-600 text-white')}>
                  ✏️ Ingresar manualmente
                </button>
                <button onClick={()=>setPasteMode(true)}
                  className={'px-3 py-1.5 rounded-lg text-xs font-medium '+(pasteMode?'bg-indigo-600 text-white':'bg-white border text-gray-600')}>
                  📋 Pegar desde Excel
                </button>
              </div>

              {pasteMode?(
                <div>
                  <div className="text-xs text-gray-500 mb-2 bg-blue-50 rounded-lg p-3">
                    <b>Cómo pegar desde Excel:</b> Selecciona las columnas <b>Concepto</b> y <b>Monto</b> en Excel,
                    copia (Ctrl+C) y pega aquí (Ctrl+V). El sistema intentará hacer coincidir por nombre.
                  </div>
                  <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)}
                    placeholder={'Alquiler de Oficina\t1120\nCondominio\t140\nElectricidad\t53\n...'}
                    rows={10} className="w-full border-2 border-indigo-200 rounded-lg p-3 text-xs font-mono"/>
                  <button onClick={applyPaste} disabled={!pasteText.trim()}
                    className="mt-2 bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm disabled:opacity-40">
                    ↪ Procesar y previsualizar
                  </button>
                </div>
              ):(
                <div>
                  <div className="text-xs text-gray-400 mb-3 flex justify-between">
                    <span>{periodoItems.length} conceptos</span>
                    <span className="font-medium text-emerald-600">Total: {$n(totImport)}</span>
                  </div>
                  <div className="space-y-1 max-h-96 overflow-y-auto pr-1">
                    {periodoItems.map(item=>(
                      <div key={item.id} className="flex items-center gap-3 py-1.5 border-b border-gray-50">
                        <div className="flex-1 min-w-0">
                          <div className="text-xs font-medium text-gray-700 truncate">{item.concepto}</div>
                          <div className="text-xs text-gray-400 font-mono">{item.cuenta}</div>
                        </div>
                        <div className="text-xs text-gray-400 w-20 text-right">
                          Ppto: {item.montos[importMes]>0?$n(item.montos[importMes]):'—'}
                        </div>
                        <input type="number"
                          value={importVals[item.id]||''}
                          onChange={e=>setImportVals({...importVals,[item.id]:e.target.value})}
                          placeholder="0"
                          className="w-28 border-2 border-emerald-300 rounded-lg px-2 py-1 text-xs text-right focus:outline-none focus:ring-2 focus:ring-emerald-300"/>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div className="px-6 py-4 border-t flex items-center justify-between bg-gray-50 rounded-b-2xl">
              <div className="text-xs text-gray-500">
                Total a registrar: <b className="text-emerald-700">{$n(totImport)}</b>
                {totEstByMonth[importMes]>0&&<span className="ml-2 text-gray-400">
                  · Ppto: {$n(totEstByMonth[importMes])}
                  · Var: <span className={(totImport-totEstByMonth[importMes])>0?'text-red-500':'text-green-600'}>
                    {(totImport-totEstByMonth[importMes])>=0?'+':''}{$n(totImport-totEstByMonth[importMes])}
                  </span>
                </span>}
              </div>
              <div className="flex gap-2">
                <button onClick={()=>setShowImport(false)} className="border px-4 py-1.5 rounded-lg text-sm text-gray-600">Cancelar</button>
                <button onClick={applyImport} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-1.5 rounded-lg text-sm font-medium">
                  💾 Guardar {MESES_GF[importMes]}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h2 className="font-bold text-base">🧾 Gastos Fijos</h2>
          <p className="text-gray-400 text-xs">Presupuesto y ejecución real — período Ago–Jul</p>
        </div>
        <div className="flex items-center gap-3">
          <select value={periodo} onChange={e=>setPeriodo(e.target.value)} className="border rounded-lg px-3 py-2 text-sm">
            {PERIODOS.map(pp=><option key={pp} value={pp}>{pp} · {periodoLabel(pp)}</option>)}
          </select>
          <button onClick={()=>setShowForm(!showForm)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Agregar Concepto</button>
        </div>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-5 gap-3 mb-5">
        <div className="bg-red-50 rounded-xl border border-red-200 p-3 text-xs col-span-1">
          <div className="text-red-400 mb-0.5">Presupuesto Anual</div>
          <div className="font-bold text-red-700 text-sm">{$n(totEstAnual)}</div>
          <div className="text-red-300 text-xs mt-0.5">{periodoItems.length} conceptos</div>
        </div>
        <div className="bg-emerald-50 rounded-xl border border-emerald-200 p-3 text-xs">
          <div className="text-emerald-500 mb-0.5">Real Ejecutado</div>
          <div className="font-bold text-emerald-700 text-sm">{$n(totRealAnual)}</div>
        </div>
        <div className={'rounded-xl border p-3 text-xs '+(totRealAnual>totEstAnual?'bg-red-50 border-red-200':'bg-green-50 border-green-200')}>
          <div className={(totRealAnual>totEstAnual?'text-red-400':'text-green-500')+' mb-0.5'}>Variación</div>
          <div className={'font-bold text-sm '+(totRealAnual>totEstAnual?'text-red-700':'text-green-700')}>
            {totRealAnual>totEstAnual?'+':''}{$n(totRealAnual-totEstAnual)}
          </div>
          <div className={'text-xs mt-0.5 '+(totRealAnual>totEstAnual?'text-red-300':'text-green-300')}>
            {totEstAnual>0?((totRealAnual-totEstAnual)/totEstAnual*100).toFixed(2)+'%':''}
          </div>
        </div>
        <div className="bg-orange-50 rounded-xl border border-orange-200 p-3 text-xs">
          <div className="text-orange-400 mb-0.5">Ppto. Mensual Prom.</div>
          <div className="font-bold text-orange-700">{$n(totEstAnual/12)}</div>
        </div>
        <div className="bg-blue-50 rounded-xl border border-blue-200 p-3 text-xs">
          <div className="text-blue-400 mb-0.5">Real Mensual Prom.</div>
          <div className="font-bold text-blue-700">{$n(totRealAnual/12)}</div>
        </div>
      </div>

      {/* View tabs */}
      <div className="flex gap-2 mb-4">
        {[['presupuesto','📋 Presupuesto'],['real','✅ Real'],['comparativo','📊 Comparativo']].map(([v,l])=>(
          <button key={v} onClick={()=>setVista(v)}
            className={'px-4 py-1.5 rounded-lg text-sm font-medium '+(vista===v?'bg-indigo-600 text-white':'bg-white border text-gray-600 hover:bg-gray-50')}>{l}</button>
        ))}
      </div>

      {/* Add form */}
      {showForm&&(
        <div className="bg-white rounded-xl border p-5 mb-5">
          <div className="font-semibold text-sm mb-3">Nuevo Concepto</div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div><label className="text-gray-400 text-xs mb-1 block">Cuenta Contable</label>
              <input value={form.cuenta} onChange={e=>setForm({...form,cuenta:e.target.value})} placeholder="Ej: 5.1.02.01" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
            <div><label className="text-gray-400 text-xs mb-1 block">Concepto del Gasto</label>
              <input value={form.concepto} onChange={e=>setForm({...form,concepto:e.target.value})} placeholder="Ej: Alquiler de Oficina" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          </div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Montos Mensuales Presupuestados (USD)</div>
          <div className="grid grid-cols-6 gap-2 mb-3">
            {MESES_GF.map((mes,m)=>(
              <div key={m}><label className="text-gray-400 text-xs mb-1 block">{mes}</label>
                <input type="number" value={form.montos[m]} onChange={e=>{const nm=[...form.montos];nm[m]=e.target.value;setForm({...form,montos:nm});}}
                  placeholder="0" className="w-full border rounded-lg px-2 py-1.5 text-xs text-right"/></div>
            ))}
          </div>
          {form.montos.some(v=>parseFloat(v)>0)&&(
            <div className="text-xs text-indigo-600 bg-indigo-50 rounded-lg px-3 py-2 mb-3">
              Total anual: <b>{$n(form.montos.reduce((s,v)=>s+(parseFloat(v)||0),0))}</b>
            </div>
          )}
          <div className="flex gap-2">
            <button onClick={add} disabled={!form.concepto.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-1.5 rounded-lg text-sm disabled:opacity-40">💾 Guardar</button>
            <button onClick={()=>setShowForm(false)} className="border text-gray-600 px-4 py-1.5 rounded-lg text-sm">Cancelar</button>
          </div>
        </div>
      )}

      {/* Search */}
      <div className="flex items-center gap-3 mb-3">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar concepto o cuenta..." className="border rounded-lg px-3 py-2 text-sm w-64"/>
        {search&&<button onClick={()=>setSearch('')} className="text-gray-400 text-xs">✕</button>}
        <span className="text-gray-400 text-xs ml-auto">{filtItems.length} conceptos · Clic en celda para editar</span>
      </div>

      {/* ─── VISTA: PRESUPUESTO ─── */}
      {vista==='presupuesto'&&(
        <div className="bg-white rounded-xl border overflow-hidden overflow-x-auto">
          <table className="text-xs min-w-max w-full">
            <thead className="bg-red-50">
              <tr>
                <th className="text-left px-3 py-2 w-24 text-gray-400">Cuenta</th>
                <th className="text-left px-3 py-2 w-52 text-gray-600 font-semibold">Concepto</th>
                <th className="text-right px-3 py-2 w-24 text-red-600 font-semibold">Total Est.</th>
                {MESES_GF.map((m,i)=><th key={i} className="text-right px-2 py-2 w-20 text-gray-400">{m}</th>)}
                <th className="w-16"></th>
              </tr>
            </thead>
            <tbody>
              {filtItems.length===0?<tr><td colSpan={16} className="text-center py-8 text-gray-400">Sin conceptos registrados.</td></tr>
              :filtItems.map(item=>(
                <tr key={item.id} className="border-t hover:bg-gray-50">
                  {editId===item.id?(
                    <>
                      <td className="px-3 py-1.5"><input value={editForm.cuenta} onChange={e=>setEditForm({...editForm,cuenta:e.target.value})} className="border rounded px-2 py-1 text-xs w-20"/></td>
                      <td className="px-3 py-1.5"><input value={editForm.concepto} onChange={e=>setEditForm({...editForm,concepto:e.target.value})} className="border rounded px-2 py-1 text-xs w-48"/></td>
                      <td className="px-3 py-1.5 text-right font-semibold text-red-600">{$n(editForm.montos.reduce((s,v)=>s+(parseFloat(v)||0),0))}</td>
                      {MESES_GF.map((_,m)=>(
                        <td key={m} className="px-1 py-1.5"><input type="number" value={editForm.montos[m]} onChange={e=>{const nm=[...editForm.montos];nm[m]=e.target.value;setEditForm({...editForm,montos:nm});}} className="border rounded px-1 py-1 text-xs w-16 text-right"/></td>
                      ))}
                      <td className="px-3 py-1.5 text-right whitespace-nowrap">
                        <button onClick={applyEdit} className="text-green-600 font-bold mr-1">✓</button>
                        <button onClick={()=>setEditId(null)} className="text-gray-400">✕</button>
                      </td>
                    </>
                  ):(
                    <>
                      <td className="px-3 py-2 text-gray-400 font-mono">{item.cuenta||'—'}</td>
                      <td className="px-3 py-2 font-medium text-gray-700">{item.concepto}</td>
                      <td className="px-3 py-2 text-right font-bold text-red-700">{$n(totEstAnualItem(item))}</td>
                      {item.montos.map((v,m)=>(<MonthCell key={m} item={item} m={m} type="est"/>))}
                      <td className="px-3 py-2 text-right whitespace-nowrap">
                        <button onClick={()=>startEdit(item)} className="text-indigo-400 mr-2">✏️</button>
                        <button onClick={()=>del(item.id)} className="text-red-400">✕</button>
                      </td>
                    </>
                  )}
                </tr>
              ))}
            </tbody>
            {filtItems.length>0&&(
              <tfoot className="border-t-2 bg-red-50 font-bold text-xs">
                <tr>
                  <td colSpan={2} className="px-3 py-2 text-red-700">TOTAL PRESUPUESTO</td>
                  <td className="px-3 py-2 text-right text-red-800">{$n(totEstAnual)}</td>
                  {totEstByMonth.map((t,i)=>(
                    <td key={i} className={'px-1 py-2 text-right '+(t>0?'text-red-700':'text-gray-300')}>{t>0?$n(t):'—'}</td>
                  ))}
                  <td></td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      )}

      {/* ─── VISTA: REAL ─── */}
      {vista==='real'&&(
        <div className="bg-white rounded-xl border overflow-hidden overflow-x-auto">
          <div className="px-4 py-3 border-b bg-emerald-50 flex items-center justify-between">
            <div className="text-xs text-emerald-700">💡 Clic en celda para editar individualmente, o usa <b>📥 Importar Mes</b> para cargar todos los conceptos de un mes a la vez.</div>
          </div>
          <table className="text-xs min-w-max w-full">
            <thead className="bg-emerald-50">
              <tr>
                <th className="text-left px-3 py-2 w-24 text-gray-400">Cuenta</th>
                <th className="text-left px-3 py-2 w-52 text-gray-600 font-semibold">Concepto</th>
                <th className="text-right px-3 py-2 w-24 text-emerald-600 font-semibold">Total Real</th>
                {MESES_GF.map((m,i)=>(
                  <th key={i} className="text-right px-2 py-2 w-20">
                    <div className="text-gray-400">{m}</div>
                    <button onClick={()=>openImport(i)}
                      className="text-emerald-600 text-xs font-normal hover:text-emerald-800 underline">📥</button>
                  </th>
                ))}
                <th className="w-12"></th>
              </tr>
            </thead>
            <tbody>
              {filtItems.length===0?<tr><td colSpan={16} className="text-center py-8 text-gray-400">Sin conceptos. Agrégalos en la vista Presupuesto.</td></tr>
              :filtItems.map(item=>(
                <tr key={item.id} className="border-t hover:bg-gray-50">
                  <td className="px-3 py-2 text-gray-400 font-mono">{item.cuenta||'—'}</td>
                  <td className="px-3 py-2 font-medium text-gray-700">{item.concepto}</td>
                  <td className="px-3 py-2 text-right font-bold text-emerald-700">{$n(totRealAnualItem(item))}</td>
                  {(item.montosReal||Array(12).fill(0)).map((v,m)=>(<MonthCell key={m} item={item} m={m} type="real"/>))}
                  <td className="px-3 py-2 text-center text-gray-300 text-xs">✏️</td>
                </tr>
              ))}
            </tbody>
            {filtItems.length>0&&(
              <tfoot className="border-t-2 bg-emerald-50 font-bold text-xs">
                <tr>
                  <td colSpan={2} className="px-3 py-2 text-emerald-700">TOTAL REAL</td>
                  <td className="px-3 py-2 text-right text-emerald-800">{$n(totRealAnual)}</td>
                  {totRealByMonth.map((t,i)=>(
                    <td key={i} className={'px-1 py-2 text-right '+(t>0?'text-emerald-700':'text-gray-300')}>{t>0?$n(t):'—'}</td>
                  ))}
                  <td></td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      )}

      {/* ─── VISTA: COMPARATIVO ─── */}
      {vista==='comparativo'&&(
        <div className="space-y-4">
          <div className="bg-white rounded-xl border overflow-hidden overflow-x-auto">
            <div className="px-4 py-3 border-b font-semibold text-sm">📊 Comparativo Mensual — Presupuesto vs Real</div>
            <table className="text-xs min-w-max w-full">
              <thead className="bg-gray-50 text-gray-400">
                <tr>
                  <th className="text-left px-3 py-2 w-56">Concepto</th>
                  {MESES_GF.map((m,i)=><th key={i} className="text-right px-2 py-2 w-24">{m}</th>)}
                  <th className="text-right px-3 py-2 w-28">Total</th>
                </tr>
              </thead>
              <tbody>
                {filtItems.map(item=>{
                  const rAnual=totRealAnualItem(item);
                  const eAnual=totEstAnualItem(item);
                  return(
                    <tr key={item.id} className="border-t hover:bg-gray-50">
                      <td className="px-3 py-1.5">
                        <div className="font-medium text-gray-700 truncate max-w-52">{item.concepto}</div>
                        <div className="text-gray-400 font-mono text-xs">{item.cuenta}</div>
                      </td>
                      {MESES_GF.map((_,m)=>{
                        const est=item.montos[m]||0;
                        const real=(item.montosReal||[])[m]||0;
                        const dif=real-est;
                        if(est===0&&real===0)return<td key={m} className="px-2 py-1.5 text-center text-gray-200">—</td>;
                        return(
                          <td key={m} className="px-2 py-1.5 text-right">
                            {est>0&&<div className="text-gray-500">{$n(est)}</div>}
                            {real>0&&<div className="text-emerald-600 font-medium">{$n(real)}</div>}
                            {(est>0||real>0)&&dif!==0&&<div className={'text-xs '+(dif>0?'text-red-500':'text-green-600')}>{dif>0?'+':''}{$n(dif)}</div>}
                          </td>
                        );
                      })}
                      <td className="px-3 py-1.5 text-right">
                        {eAnual>0&&<div className="text-gray-500 font-medium">{$n(eAnual)}</div>}
                        {rAnual>0&&<div className="text-emerald-600 font-bold">{$n(rAnual)}</div>}
                        {eAnual>0&&<div className={'text-xs font-medium '+(rAnual-eAnual>0?'text-red-500':'text-green-600')}>{rAnual-eAnual>0?'+':''}{$n(rAnual-eAnual)}</div>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot className="border-t-2 font-bold text-xs">
                <tr className="bg-gray-50">
                  <td className="px-3 py-2 text-gray-600">Ppto. Estimado</td>
                  {totEstByMonth.map((t,i)=><td key={i} className={'px-2 py-2 text-right '+(t>0?'text-gray-700':'text-gray-200')}>{t>0?$n(t):'—'}</td>)}
                  <td className="px-3 py-2 text-right text-gray-700">{$n(totEstAnual)}</td>
                </tr>
                <tr className="bg-emerald-50">
                  <td className="px-3 py-2 text-emerald-700">Real Ejecutado</td>
                  {totRealByMonth.map((t,i)=><td key={i} className={'px-2 py-2 text-right '+(t>0?'text-emerald-700':'text-gray-200')}>{t>0?$n(t):'—'}</td>)}
                  <td className="px-3 py-2 text-right text-emerald-700">{$n(totRealAnual)}</td>
                </tr>
                <tr className="bg-blue-50">
                  <td className="px-3 py-2 text-blue-700">Variación (Real−Ppto.)</td>
                  {MESES_GF.map((_,i)=>{
                    const d=totRealByMonth[i]-totEstByMonth[i];
                    if(totEstByMonth[i]===0&&totRealByMonth[i]===0)return<td key={i} className="px-2 py-2 text-center text-gray-200">—</td>;
                    return<td key={i} className={'px-2 py-2 text-right font-medium '+(d>0?'text-red-600':d<0?'text-green-600':'text-gray-400')}>{d!==0?(d>0?'+':'')+$n(d):'='}</td>;
                  })}
                  {(()=>{const d=totRealAnual-totEstAnual;return<td className={'px-3 py-2 text-right font-bold '+(d>0?'text-red-600':d<0?'text-green-600':'text-gray-400')}>{d!==0?(d>0?'+':'')+$n(d):'='}</td>;})()}
                </tr>
                <tr className="bg-indigo-50">
                  <td className="px-3 py-2 text-indigo-700">% Ejecución</td>
                  {MESES_GF.map((_,i)=>{
                    const e=totEstByMonth[i],r=totRealByMonth[i];
                    if(e===0&&r===0)return<td key={i} className="px-2 py-2 text-center text-gray-200">—</td>;
                    const pct=e>0?(r/e*100).toFixed(2)+'%':'—';
                    return<td key={i} className="px-2 py-2 text-right text-indigo-600">{pct}</td>;
                  })}
                  <td className="px-3 py-2 text-right text-indigo-700 font-bold">{totEstAnual>0?(totRealAnual/totEstAnual*100).toFixed(2)+'%':'—'}</td>
                </tr>
              </tfoot>
            </table>
          </div>
          {(totEstAnual>0||totRealAnual>0)&&(
            <div className="bg-white rounded-xl border p-5">
              <div className="font-semibold text-sm mb-4">📊 Gráfico Comparativo Mensual</div>
              <div className="flex items-end gap-3 h-32">
                {MESES_GF.map((mes,i)=>{
                  const est=totEstByMonth[i],real=totRealByMonth[i];
                  const maxV=Math.max(...totEstByMonth,...totRealByMonth,1);
                  const hEst=Math.round((est/maxV)*100);
                  const hReal=Math.round((real/maxV)*100);
                  return(
                    <div key={i} className="flex-1 flex flex-col items-center gap-0.5">
                      <div className="w-full flex items-end gap-0.5 justify-center" style={{height:'100px'}}>
                        <div title={'Ppto: '+$n(est)} className="flex-1 rounded-t" style={{height:hEst+'px',background:'rgb(239,68,68)',opacity:0.6}}/>
                        <div title={'Real: '+$n(real)} className="flex-1 rounded-t" style={{height:hReal+'px',background:'rgb(16,185,129)',opacity:0.8}}/>
                      </div>
                      <div className="text-xs text-gray-500 font-medium">{mes}</div>
                    </div>
                  );
                })}
              </div>
              <div className="flex gap-4 mt-3 text-xs justify-center">
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded" style={{background:'rgb(239,68,68)',opacity:0.6}}/><span className="text-gray-500">Presupuesto</span></div>
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded" style={{background:'rgb(16,185,129)',opacity:0.8}}/><span className="text-gray-500">Real</span></div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
/* ══════════════════════ REPORTE PARTICIPACIONES PAGADAS ════════════════ */
function APartReport({data,currentUser}){
  const isAdmin=currentUser&&currentUser.role==='admin';

  // Socios categories — only admin can see these
  // pcat1 = Socio Captador, pcat2 = Socio Revisor/Firmante
  const SOCIO_CATS=['pcat1','pcat2'];
  const SOCIO_NAMES=['socio captador','socio revisor','socio revisor/firmante'];
  const isSocioCat=catId=>{
    if(SOCIO_CATS.includes(catId))return true;
    // Also check by name in case Supabase uses different IDs
    const cat=cats.find(c=>c.id===catId);
    return cat&&SOCIO_NAMES.some(n=>cat.name.toLowerCase().includes(n));
  };

  const people=data.people||[];
  const projects=(data.projects||[]).filter(p=>!p.enPapelera);
  const pagos=data.pagosParticipaciones||[];
  const realParts=data.realParticipations||[];
  const cats=data.partCats||DEFAULT_PART_CATS;

  // Helper: determine Aug-Jul period from a payment date
  const getPeriodoPago=fecha=>{
    if(!fecha)return'Sin fecha';
    const d=new Date(fecha+'T00:00:00');
    const y=d.getFullYear(),m=d.getMonth();
    return m>=7?`${y}-${y+1}`:`${y-1}-${y}`;
  };

  // Filter out socios payments if not admin
  const visiblePagos=isAdmin?pagos:pagos.filter(pago=>{
    const person=people.find(p=>p.id===pago.personId);
    return person&&!isSocioCat(person.catId);
  });

  const [filtroPeriodo,setFiltroPeriodo]=useState('todos');
  const [filtroPersona,setFiltroPersona]=useState('todos');
  const [expandedPersonas,setExpandedPersonas]=useState({});
  const togglePersona=id=>setExpandedPersonas(prev=>({...prev,[id]:!(prev[id]!==false)}));
  // Default: all expanded (open). Only close if explicitly toggled to false-then-true
  const isOpen=id=>expandedPersonas[id]!==false;

  // Enrich payments
  const enriched=visiblePagos.map(pago=>{
    const person=people.find(p=>p.id===pago.personId)||{name:'Sin nombre',initials:'?',catId:''};
    const proj=projects.find(p=>p.id===pago.projectId)||{name:'—',client:'—',periodo:''};
    const rp=realParts.find(r=>r.projectId===pago.projectId&&r.personId===pago.personId);
    const cat=cats.find(c=>c.id===person.catId);
    return{
      ...pago,
      personName:person.name||'Sin nombre',
      personInitials:person.initials||autoInitials(person.name||''),
      personCatId:person.catId,
      personCat:cat?cat.name:'—',
      isSocio:isSocioCat(person.catId),
      projName:proj.name,
      projCodigo:proj.codigo||'',
      client:proj.client||'—',
      pct:rp?rp.pct:0,
      periodo:getPeriodoPago(pago.fecha),
    };
  });

  // Unique periods and people for filters
  const allPeriodos=[...new Set(enriched.map(p=>p.periodo).filter(p=>p!=='Sin fecha'))].sort().reverse();
  const allPersonas=[...new Set(enriched.map(p=>p.personId))];

  // Apply filters
  const filtered=enriched.filter(p=>{
    const okP=filtroPeriodo==='todos'||p.periodo===filtroPeriodo;
    const okPers=filtroPersona==='todos'||p.personId===filtroPersona;
    return okP&&okPers;
  }).sort((a,b)=>{
    if(a.personName!==b.personName)return a.personName.localeCompare(b.personName);
    return(a.fecha||'')>(b.fecha||'')?1:-1;
  });

  // Group: person → period → project → payments
  const byPerson={};
  filtered.forEach(p=>{
    if(!byPerson[p.personId])byPerson[p.personId]={
      name:p.personName,initials:p.personInitials,id:p.personId,
      catId:p.personCatId,cat:p.personCat,isSocio:p.isSocio,periodos:{}
    };
    if(!byPerson[p.personId].periodos[p.periodo])
      byPerson[p.personId].periodos[p.periodo]=[];
    byPerson[p.personId].periodos[p.periodo].push(p);
  });

  const personaList=Object.values(byPerson).sort((a,b)=>a.name.localeCompare(b.name));
  const totGlobal=filtered.reduce((s,p)=>s+p.amount,0);
  const totSocios=filtered.filter(p=>p.isSocio).reduce((s,p)=>s+p.amount,0);
  const totNoSocios=filtered.filter(p=>!p.isSocio).reduce((s,p)=>s+p.amount,0);

  return(
    <div className="p-6 max-w-5xl">
      {/* Header */}
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h2 className="font-bold text-base">🏆 Participaciones Pagadas</h2>
          <p className="text-gray-400 text-xs">
            Reporte por persona · período Ago–Jul
            {!isAdmin&&<span className="ml-2 px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full">Vista restringida — sin pagos de socios</span>}
          </p>
        </div>
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <label className="text-gray-500 text-xs font-medium">Período:</label>
            <select value={filtroPeriodo} onChange={e=>setFiltroPeriodo(e.target.value)}
              className="border rounded-lg px-3 py-1.5 text-sm focus:outline-none">
              <option value="todos">— Todos —</option>
              {allPeriodos.map(pp=><option key={pp} value={pp}>{pp} · {periodoLabel(pp)}</option>)}
            </select>
          </div>
          <div className="flex items-center gap-2">
            <label className="text-gray-500 text-xs font-medium">Persona:</label>
            <select value={filtroPersona} onChange={e=>setFiltroPersona(e.target.value)}
              className="border rounded-lg px-3 py-1.5 text-sm focus:outline-none min-w-44">
              <option value="todos">— Todas —</option>
              {allPersonas.map(pid=>{
                const p=people.find(x=>x.id===pid);
                return p?<option key={pid} value={pid}>{p.name}</option>:null;
              })}
            </select>
          </div>
        </div>
      </div>

      {/* Summary cards */}
      <div className={'grid gap-3 mb-6 '+(isAdmin?'grid-cols-4':'grid-cols-3')}>
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-xs">
          <div className="text-emerald-500 mb-0.5">Total Pagado</div>
          <div className="font-bold text-emerald-700 text-base">{$n(totGlobal)}</div>
          <div className="text-emerald-300 mt-0.5">{filtered.length} pagos · {personaList.length} personas</div>
        </div>
        {isAdmin&&(
          <>
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs">
              <div className="text-amber-500 mb-0.5">🔑 Socios</div>
              <div className="font-bold text-amber-700 text-base">{$n(totSocios)}</div>
              <div className="text-amber-300 mt-0.5">{filtered.filter(p=>p.isSocio).length} pagos</div>
            </div>
            <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-xs">
              <div className="text-indigo-400 mb-0.5">Equipo</div>
              <div className="font-bold text-indigo-700 text-base">{$n(totNoSocios)}</div>
              <div className="text-indigo-300 mt-0.5">{filtered.filter(p=>!p.isSocio).length} pagos</div>
            </div>
          </>
        )}
        <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs">
          <div className="text-blue-400 mb-0.5">Períodos</div>
          <div className="font-bold text-blue-700 text-base">{[...new Set(filtered.map(p=>p.periodo))].length}</div>
        </div>
      </div>

      {/* Empty state */}
      {personaList.length===0&&(
        <div className="bg-white rounded-xl border p-12 text-center">
          <div className="text-3xl mb-3">📭</div>
          <div className="text-gray-500 text-sm font-medium">Sin pagos de participaciones registrados</div>
          <div className="text-gray-400 text-xs mt-1">
            {visiblePagos.length===0
              ?'Registra pagos en la sección Participaciones Real de cada proyecto.'
              :'No hay pagos que coincidan con los filtros seleccionados.'}
          </div>
        </div>
      )}

      {/* Report by person */}
      <div className="space-y-3">
        {personaList.map(persona=>{
          const totPersona=filtered.filter(p=>p.personId===persona.id).reduce((s,p)=>s+p.amount,0);
          const open=isOpen(persona.id);
          const periodKeys=Object.keys(persona.periodos).filter(p=>p!=='Sin fecha').sort().reverse();
          const sinFechaPagos=persona.periodos['Sin fecha']||[];

          return(
            <div key={persona.id} className={'bg-white rounded-xl border overflow-hidden '+(persona.isSocio?'border-amber-200':'')}>
              {/* Person header */}
              <button onClick={()=>togglePersona(persona.id)}
                className={'w-full flex items-center justify-between px-5 py-3.5 hover:bg-gray-50 transition-colors '+(persona.isSocio?'bg-amber-50':'')}> 
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0"
                    style={{background:persona.isSocio?'rgb(217,119,6)':'rgb(0,186,179)'}}>
                    {persona.initials||'?'}
                  </div>
                  <div className="text-left">
                    <div className="flex items-center gap-2">
                      <span className="font-bold text-sm text-gray-800">{persona.name}</span>
                      {persona.isSocio&&isAdmin&&<span className="px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full text-xs">🔑 Socio</span>}
                      <span className="px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full text-xs">{persona.cat}</span>
                    </div>
                    <div className="text-xs text-gray-400 mt-0.5">
                      {filtered.filter(p=>p.personId===persona.id).length} pagos
                      · {periodKeys.length} período{periodKeys.length!==1?'s':''}
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="text-right">
                    <div className={'font-bold '+(persona.isSocio?'text-amber-700':'text-emerald-700')}>{$n(totPersona)}</div>
                    <div className="text-xs text-gray-400">total pagado</div>
                  </div>
                  <span className="text-gray-400">{open?'▲':'▼'}</span>
                </div>
              </button>

              {/* Body */}
              {open&&(
                <div className="border-t">
                  {[...periodKeys,...(sinFechaPagos.length?['Sin fecha']:[])].map(periodo=>{
                    const periodoPagos=persona.periodos[periodo]||[];
                    const totPeriodo=periodoPagos.reduce((s,p)=>s+p.amount,0);

                    // Group by project
                    const byProj={};
                    periodoPagos.forEach(p=>{
                      if(!byProj[p.projectId])byProj[p.projectId]={
                        projName:p.projName,projCodigo:p.projCodigo,
                        client:p.client,pct:p.pct,pagos:[]
                      };
                      byProj[p.projectId].pagos.push(p);
                    });

                    return(
                      <div key={periodo} className="border-b last:border-b-0">
                        {/* Period header */}
                        <div className="px-5 py-2 bg-indigo-50 flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold text-indigo-700">
                              {periodo==='Sin fecha'?'📅 Sin fecha asignada':`📅 Período ${periodo}`}
                            </span>
                            {periodo!=='Sin fecha'&&<span className="text-xs text-indigo-400">· {periodoLabel(periodo)}</span>}
                          </div>
                          <span className="font-bold text-indigo-700 text-sm">{$n(totPeriodo)}</span>
                        </div>

                        {/* Projects */}
                        {Object.entries(byProj).map(([projId,projData])=>{
                          const totProj=projData.pagos.reduce((s,p)=>s+p.amount,0);
                          return(
                            <div key={projId}>
                              <div className="px-5 py-2 bg-gray-50 flex items-center justify-between border-t border-gray-100">
                                <div className="flex items-center gap-2 flex-wrap">
                                  {projData.projCodigo&&<span className="px-1.5 py-0.5 bg-indigo-100 text-indigo-600 rounded font-mono text-xs">{projData.projCodigo}</span>}
                                  <span className="font-medium text-xs text-gray-700">{projData.projName}</span>
                                  <span className="text-gray-400 text-xs">· {projData.client}</span>
                                  {projData.pct>0&&<span className="px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded text-xs">{projData.pct.toFixed(2)}%</span>}
