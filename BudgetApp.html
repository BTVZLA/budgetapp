/* ── DIRECTORIO DE PERSONAS ── */
function TeamConf({data,save,cfg,session,currentUser}){
  const isAdmin=currentUser&&currentUser.role==='admin';
  const cats=data.partCats||DEFAULT_PART_CATS;
  const people=data.people||[];
  const users=data.users||[];

  const normName=n=>(n||'').toLowerCase().trim().replace(/\s+/g,' ');
  const personFullName=p=>[p.nombres,p.apellidos].filter(Boolean).join(' ')||p.name||'';
  const findUser=p=>{const pn=normName(personFullName(p));return users.find(u=>normName(u.name)===pn);};
  const orphanUsers=users.filter(u=>{const un=normName(u.name);return!people.some(p=>normName(personFullName(p))===un);});

  const emptyForm={nombres:'',apellidos:'',ci:'',initials:'',catId:(cats[0]||{}).id||'',deptId:(data.departments[0]||{}).id||'',banco:'',numCuenta:'',celular:'',email:''};
  const [form,setForm]=useState(emptyForm);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [expandId,setExpandId]=useState(null);
  const [acctId,setAcctId]=useState(null);
  const [acctForm,setAcctForm]=useState({role:'equipo',pass:''});
  const [acctLoading,setAcctLoading]=useState(false);
  const [roleId,setRoleId]=useState(null);
  const [roleVal,setRoleVal]=useState('equipo');
  const [pwdId,setPwdId]=useState(null);
  const [pwdVal,setPwdVal]=useState('');
  const [pwdLoading,setPwdLoading]=useState(false);
  const [msgs,setMsgs]=useState({});
  const [fichaId,setFichaId]=useState(null);  // orphan user id expanding ficha form
  const [fichaForm,setFichaForm]=useState({});

  const buildName=f=>[f.nombres.trim(),f.apellidos.trim()].filter(Boolean).join(' ');

  const addPerson=()=>{
    if(!form.nombres.trim()&&!form.apellidos.trim())return;
    const name=buildName(form);
    const ini=(form.initials.trim()||autoInitials(name)).toUpperCase();
    save({...data,people:[...people,{id:uid(),name,nombres:form.nombres.trim(),apellidos:form.apellidos.trim(),ci:form.ci.trim(),initials:ini,catId:form.catId,deptId:form.deptId||null,banco:form.banco.trim(),numCuenta:form.numCuenta.trim(),celular:form.celular.trim(),email:form.email.trim()}]});
    setForm(emptyForm);
  };
  const delPerson=id=>save({...data,people:people.filter(p=>p.id!==id)});
  const startEdit=p=>{
    setEditId(p.id);
    setEditForm({nombres:p.nombres||'',apellidos:p.apellidos||'',ci:p.ci||'',initials:p.initials||autoInitials(p.name),catId:p.catId,deptId:p.deptId||'',banco:p.banco||'',numCuenta:p.numCuenta||'',celular:p.celular||'',email:p.email||''});
  };
  const applyEdit=()=>{
    const name=buildName(editForm)||editForm.name||'';
    save({...data,people:people.map(p=>p.id===editId?{...p,...editForm,name,initials:(editForm.initials||autoInitials(name)).toUpperCase()}:p)});
    setEditId(null);
  };

  const createAccount=async(person)=>{
    if(!acctForm.pass.trim()){setMsgs(m=>({...m,[person.id]:{type:'err',text:'Ingresa una contraseña.'}}));return;}
    if(acctForm.pass.trim().length<6){setMsgs(m=>({...m,[person.id]:{type:'err',text:'La contraseña debe tener al menos 6 caracteres.'}}));return;}
    if(!person.email){setMsgs(m=>({...m,[person.id]:{type:'err',text:'Sin correo. Agrégalo en ✏️ Editar primero.'}}));return;}
    setAcctLoading(true);setMsgs(m=>({...m,[person.id]:null}));
    try{
      let authId=null;
      const hasSvcKey=!!(cfg.serviceKey&&cfg.serviceKey.trim());
      if(hasSvcKey){
        // Admin API path
        try{
          const created=await sbAdminCreateUser(cfg,person.email,acctForm.pass);
          authId=created.id||null;
        }catch(e){
          const msg=e.message||'';
          const isEmailExists=msg.includes('email_exists')||msg.includes('already')||msg.includes('422');
          if(isEmailExists){
            // Email exists in Auth but not in app_users — find the auth user and link + update password
            const existing=await sbAdminFindUserByEmail(cfg,person.email);
            if(existing&&existing.id){
              authId=existing.id;
              // Update their password to the one the admin just entered
              await sbAdminUpdateUserPassword(cfg,authId,acctForm.pass);
            }else{
              throw new Error('El correo ya existe en Supabase Auth pero no se pudo recuperar. Ve a Supabase → Authentication → Users, elimínalo manualmente y vuelve a intentar.');
            }
          }else{
            throw e;
          }
        }
      }else{
        // Fallback: public signup
        const res=await sbSignUp(cfg,person.email,acctForm.pass);
        if(res.error||res.code){
          const msg=parseSupabaseError(res.error||res);
          const isEmailExists=msg.toLowerCase().includes('already')||msg.includes('email_exists')||msg.includes('422');
          if(!isEmailExists){
            setMsgs(m=>({...m,[person.id]:{type:'err',text:msg+'\n\nConsejo: configura la Service Role Key en Configuración → 🔒 Seguridad para crear usuarios sin este problema.'}}));
            setAcctLoading(false);return;
          }
          // Email exists: can't recover without service key
          setMsgs(m=>({...m,[person.id]:{type:'err',text:'Este correo ya está registrado en Supabase Auth.\n\nOpciones:\n1. Configura la Service Role Key (Configuración → 🔒 Seguridad) para que la app lo vincule automáticamente.\n2. Ve a Supabase → Authentication → Users, elimina este correo y vuelve a intentar.'}}));
          setAcctLoading(false);return;
        }
        const authUser=res.user||(res.data&&res.data.user)||null;
        authId=authUser&&authUser.id||null;
      }
      const name=personFullName(person);
      const newUser={id:uid(),name,initials:(person.initials||autoInitials(name)).toUpperCase(),dept_id:person.deptId||null,role:acctForm.role,auth_id:authId||null};
      const tok=session&&session.tok;
      if(cfg&&cfg.url&&tok){
        const r=await fetch(cfg.url+'/rest/v1/app_users',{method:'POST',headers:{'apikey':cfg.key,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(newUser)});
        if(!r.ok){const t=await r.text();throw new Error('Error al registrar usuario: '+t);}
      }
      // Update state via save() — syncData uses upsert (merge-duplicates) so re-inserting is harmless
      const localUser={id:newUser.id,name:newUser.name,initials:newUser.initials,deptId:newUser.dept_id,role:newUser.role,authId:newUser.auth_id};
      save({...data,users:[...users,localUser]});
      setMsgs(m=>({...m,[person.id]:{type:'ok',text:hasSvcKey?'✅ Cuenta creada y lista para usar.':'✅ Cuenta creada. Si el usuario no puede ingresar, desactiva la confirmación de email en Supabase → Authentication → Settings.'}}));
      setAcctId(null);
    }catch(e){setMsgs(m=>({...m,[person.id]:{type:'err',text:e.message}}));}
    finally{setAcctLoading(false);}
  };

  const applyRole=(linkedUser)=>{
    const updated=users.map(u=>u.id===linkedUser.id?{...u,role:roleVal}:u);
    save({...data,users:updated});
    const tok=session&&session.tok;
    if(cfg&&cfg.url&&tok)fetch(cfg.url+'/rest/v1/app_users?id=eq.'+linkedUser.id,{method:'PATCH',headers:{'apikey':cfg.key,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({role:roleVal})}).catch(()=>{});
    setRoleId(null);
  };

  const changePassword=async(person,linkedUser)=>{
    if(!pwdVal.trim()||pwdVal.trim().length<6){setMsgs(m=>({...m,[person.id]:{type:'err',text:'La contraseña debe tener al menos 6 caracteres.'}}));return;}
    if(!linkedUser.authId){setMsgs(m=>({...m,[person.id]:{type:'err',text:'Este usuario no tiene ID de autenticación registrado.'}}));return;}
    setPwdLoading(true);setMsgs(m=>({...m,[person.id]:null}));
    try{
      await sbAdminUpdatePassword(cfg,linkedUser.authId,pwdVal.trim());
      setMsgs(m=>({...m,[person.id]:{type:'ok',text:'✅ Contraseña actualizada correctamente.'}}));
      setPwdId(null);setPwdVal('');
    }catch(e){setMsgs(m=>({...m,[person.id]:{type:'err',text:e.message}}));}
    finally{setPwdLoading(false);}
  };

  const grouped={};
  cats.forEach(c=>{grouped[c.id]=[];});
  people.forEach(p=>{if(!grouped[p.catId])grouped[p.catId]=[];grouped[p.catId].push(p);});

  const FieldRow=({label,value})=>value?<div className="flex gap-2 text-xs"><span className="text-gray-400 w-24 shrink-0">{label}:</span><span className="font-medium text-gray-700">{value}</span></div>:null;

  return(
    <div className="max-w-3xl space-y-5">

      {/* ── Add person form ── */}
      <div className="bg-white rounded-xl border p-5">
        <div className="font-semibold mb-1 text-sm">👥 Agregar Persona</div>
        <p className="text-gray-400 text-xs mb-4">Registra los datos del miembro del equipo. El administrador puede asignarle rol y contraseña de acceso desde su ficha.</p>
        <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Datos Personales</div>
        <div className="grid grid-cols-3 gap-3 mb-3">
          <div><label className="text-gray-400 text-xs mb-1 block">Nombre(s)</label><input value={form.nombres} onChange={e=>setForm({...form,nombres:e.target.value})} placeholder="Ej: Ana María" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div><label className="text-gray-400 text-xs mb-1 block">Apellido(s)</label><input value={form.apellidos} onChange={e=>setForm({...form,apellidos:e.target.value})} placeholder="Ej: García López" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div><label className="text-gray-400 text-xs mb-1 block">C.I.</label><input value={form.ci} onChange={e=>setForm({...form,ci:e.target.value})} placeholder="Ej: V-12345678" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Iniciales</label>
            <div className="flex items-center gap-2">
              <input value={form.initials} onChange={e=>setForm({...form,initials:e.target.value.toUpperCase().slice(0,4)})} placeholder="Auto" maxLength={4} className="w-20 border rounded-lg px-3 py-2 text-sm"/>
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'rgb(0,186,179)'}}>{form.initials||autoInitials(buildName(form))||'?'}</div>
            </div>
          </div>
          <div><label className="text-gray-400 text-xs mb-1 block">Categoría</label><select value={form.catId} onChange={e=>setForm({...form,catId:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm">{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div><label className="text-gray-400 text-xs mb-1 block">Departamento</label><select value={form.deptId} onChange={e=>setForm({...form,deptId:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm"><option value="">— Sin asignar —</option>{data.departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
        </div>
        <div className="text-xs font-semibold text-gray-500 uppercase mb-2 mt-1">Contacto y Datos Bancarios</div>
        <div className="grid grid-cols-3 gap-3 mb-4">
          <div><label className="text-gray-400 text-xs mb-1 block">Banco</label><input value={form.banco} onChange={e=>setForm({...form,banco:e.target.value})} placeholder="Ej: Banesco" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div><label className="text-gray-400 text-xs mb-1 block"># de Cuenta</label><input value={form.numCuenta} onChange={e=>setForm({...form,numCuenta:e.target.value})} placeholder="Ej: 0134-0000-..." className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div><label className="text-gray-400 text-xs mb-1 block">Celular / Teléfono</label><input value={form.celular} onChange={e=>setForm({...form,celular:e.target.value})} placeholder="Ej: 0414-1234567" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div className="col-span-2"><label className="text-gray-400 text-xs mb-1 block">Correo Electrónico</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Ej: ana.garcia@empresa.com" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
        </div>
        <button onClick={addPerson} disabled={!form.nombres.trim()&&!form.apellidos.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-1.5 rounded-lg text-sm disabled:opacity-40">+ Agregar Persona</button>
      </div>

      {/* ── People list ── */}
      <div className="space-y-4">
        {cats.map(cat=>{
          const ppl=grouped[cat.id]||[];
          if(ppl.length===0)return null;
          return(
            <div key={cat.id} className="bg-white rounded-xl border overflow-hidden">
              <div className="px-4 py-2 border-b flex items-center gap-2" style={{background:'rgba(0,186,179,0.08)'}}>
                <span className="font-semibold text-xs" style={{color:'rgb(0,130,125)'}}>{cat.name}</span>
                <span className="text-xs text-gray-400">{ppl.length} persona{ppl.length!==1?'s':''}</span>
              </div>
              <div className="divide-y">
                {ppl.map(p=>{
                  const dept=data.departments.find(d=>d.id===p.deptId);
                  const linkedUser=findUser(p);
                  const isEditing=editId===p.id;
                  const isExpanded=expandId===p.id;
                  const isAcct=acctId===p.id;
                  const isRole=roleId===p.id;
                  const msg=msgs[p.id];
                  const pName=personFullName(p);

                  return(
                    <div key={p.id}>
                      {isEditing?(
                        /* ── Edit form ── */
                        <div className="p-4 bg-indigo-50">
                          <div className="grid grid-cols-3 gap-3 mb-3">
                            <div><label className="text-gray-500 text-xs mb-1 block">Nombre(s)</label><input value={editForm.nombres} onChange={e=>setEditForm({...editForm,nombres:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">Apellido(s)</label><input value={editForm.apellidos} onChange={e=>setEditForm({...editForm,apellidos:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">C.I.</label><input value={editForm.ci} onChange={e=>setEditForm({...editForm,ci:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">Iniciales</label><input value={editForm.initials} onChange={e=>setEditForm({...editForm,initials:e.target.value.toUpperCase().slice(0,4)})} className="w-20 border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">Categoría</label><select value={editForm.catId} onChange={e=>setEditForm({...editForm,catId:e.target.value})} className="w-full border rounded-lg px-2 py-1.5 text-xs">{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">Departamento</label><select value={editForm.deptId||''} onChange={e=>setEditForm({...editForm,deptId:e.target.value})} className="w-full border rounded-lg px-2 py-1.5 text-xs"><option value="">— Sin asignar —</option>{data.departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">Banco</label><input value={editForm.banco} onChange={e=>setEditForm({...editForm,banco:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div><label className="text-gray-500 text-xs mb-1 block"># Cuenta</label><input value={editForm.numCuenta} onChange={e=>setEditForm({...editForm,numCuenta:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div><label className="text-gray-500 text-xs mb-1 block">Celular</label><input value={editForm.celular} onChange={e=>setEditForm({...editForm,celular:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                            <div className="col-span-3"><label className="text-gray-500 text-xs mb-1 block">Correo Electrónico</label><input type="email" value={editForm.email||''} onChange={e=>setEditForm({...editForm,email:e.target.value})} className="w-full border rounded-lg px-3 py-1.5 text-xs"/></div>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={applyEdit} className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs">💾 Guardar</button>
                            <button onClick={()=>setEditId(null)} className="border text-gray-600 px-3 py-1.5 rounded-lg text-xs">Cancelar</button>
                          </div>
                        </div>
                      ):(
                        <div className="px-4 py-3 hover:bg-gray-50 transition-colors">

                          {/* ── Main row ── */}
                          <div className="flex items-start gap-3">
                            <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5" style={{background:'rgb(0,186,179)'}}>{p.initials||autoInitials(pName)}</div>

                            {/* Name + badges */}
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2 flex-wrap">
                                <span className="font-medium text-sm text-gray-800">{pName}</span>
                                {p.ci&&<span className="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full">CI: {p.ci}</span>}
                                {dept&&<span className="text-xs text-indigo-400">{dept.name}</span>}
                              </div>
                              {/* Quick info line */}
                              {(p.email||p.celular)&&(
                                <div className="text-xs text-gray-400 mt-0.5 flex gap-3 flex-wrap">
                                  {p.email&&<span>✉️ {p.email}</span>}
                                  {p.celular&&<span>📱 {p.celular}</span>}
                                </div>
                              )}
                            </div>

                            {/* ── ROL SECTION — always visible, admin-editable ── */}
                            <div className="flex-shrink-0 min-w-[180px]">
                              {isAdmin?(
                                linkedUser?(
                                  isRole?(
                                    /* Inline role editor */
                                    <div className="flex items-center gap-1">
                                      <select value={roleVal} onChange={e=>setRoleVal(e.target.value)}
                                        className="border rounded-lg px-2 py-1 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400 flex-1">

                                <div>
                                  <label className="text-indigo-600 text-xs mb-1 block font-medium">Rol de acceso</label>

                                  <label className="text-indigo-600 text-xs mb-1 block font-medium">Contraseña inicial</label>

                                  </div>
                                  <div className="flex gap-2">
                                    <button onClick={()=>changePassword(p,linkedUser)}

                                      {pwdLoading?'Actualizando…':'🔑 Actualizar contraseña'}
                                    </button>
                                    <button onClick={()=>{setPwdId(null);setPwdVal('');}}

                                  </div>
                                </div>
                              )}
                            </div>

                          {/* ── Expanded: personal + bank detail ── */}
                          {isExpanded&&(
                            <div className="mt-2 ml-11 p-3 bg-gray-50 rounded-xl space-y-1">
                              <FieldRow label="C.I." value={p.ci}/>
                              <FieldRow label="Banco" value={p.banco}/>

                              <FieldRow label="Celular" value={p.celular}/>

                    </div>
                  );

              </div>
            </div>
          );
        })}
        {people.length===0&&<div className="bg-white rounded-xl border p-8 text-center text-gray-400 text-sm">Sin personas registradas.</div>}

      {/* ── Orphan users ── admin only */}

            <span className="font-semibold text-xs text-amber-700">👤 Usuarios sin ficha de persona</span>

          </div>
          <div className="divide-y">
            {orphanUsers.map(u=>{
              const dept=data.departments.find(d=>d.id===u.deptId)||{};
              const isFicha=fichaId===u.id;
              return(
                <div key={u.id}>
                  {/* User row */}
                  <div className="px-4 py-2.5 flex items-center justify-between hover:bg-gray-50">
                    <div className="flex items-center gap-2.5">
                      <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'rgb(0,186,179)'}}>{u.initials||autoInitials(u.name)}</div>
                      <div>

                    <div className="flex items-center gap-2">
                      <button
                        onClick={()=>{

                          const nombres=parts[0]||'';
                          const apellidos=parts.slice(1).join(' ')||'';
                          setFichaForm({nombres,apellidos,ci:'',initials:u.initials||autoInitials(u.name),catId:(cats[0]||{}).id||'',deptId:u.deptId||'',banco:'',numCuenta:'',celular:'',email:''});
                          setFichaId(u.id);

                        className={`text-xs px-3 py-1 rounded-lg border transition-colors ${isFicha?'bg-gray-100 text-gray-500':'bg-indigo-50 hover:bg-indigo-100 border-indigo-200 text-indigo-600'}`}>

                      <button onClick={()=>save({...data,users:data.users.filter(x=>x.id!==u.id)})} className="text-red-300 hover:text-red-500 text-xs px-2 py-1 rounded hover:bg-red-50">✕</button>

                  {/* Inline ficha creation form */}
                  {isFicha&&(

                      <div className="grid grid-cols-3 gap-2 mb-3">

                            className="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                        </div>
                        <div>
                          <label className="text-gray-500 text-xs mb-1 block">Apellido(s) *</label>
                          <input value={fichaForm.apellidos} onChange={e=>setFichaForm({...fichaForm,apellidos:e.target.value})}
                            className="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400"/>

                        <div>
