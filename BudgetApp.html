const MO=Array.from({length:24},(_,i)=>{

});

// Generate next project code
const nextProjectCode=(periodo,serviceCode,existingProjects)=>{
  if(!periodo||!serviceCode)return'';
  const prefix=periodo+serviceCode;
  const existing=existingProjects
    .filter(p=>p.codigo&&p.codigo.startsWith(prefix))
    .map(p=>{const n=parseInt(p.codigo.slice(prefix.length));return isNaN(n)?0:n;});
  const next=existing.length?Math.max(...existing)+1:1;
  return prefix+String(next).padStart(4,'0');
};

const CFG_KEY='bapp_sb_cfg';
const getLocalCfg=()=>{try{const s=localStorage.getItem(CFG_KEY);return s?JSON.parse(s):null;}catch(_){return null;}};
const setLocalCfg=c=>{try{localStorage.setItem(CFG_KEY,JSON.stringify(c));}catch(_){}};

const sbH=(cfg,tok)=>({'apikey':cfg.key,'Authorization':'Bearer '+(tok||cfg.key),'Content-Type':'application/json'});
const sbGet=async(cfg,tok,table)=>{const r=await fetch(cfg.url+'/rest/v1/'+table+'?select=*',{headers:sbH(cfg,tok)});if(!r.ok)throw new Error('Error '+table);const d=await r.json();return Array.isArray(d)?d:[];};
const sbUpsert=async(cfg,tok,table,rows)=>{if(!rows||!rows.length)return;const r=await fetch(cfg.url+'/rest/v1/'+table,{method:'POST',headers:{...sbH(cfg,tok),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(rows)});if(!r.ok){const t=await r.text();throw new Error(t);}};
const sbDel=async(cfg,tok,table,id)=>fetch(cfg.url+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sbH(cfg,tok)});
const sbSignIn=async(cfg,email,pw)=>{const r=await fetch(cfg.url+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':cfg.key,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});return r.json();};
const sbSignUp=async(cfg,email,pw)=>{const r=await fetch(cfg.url+'/auth/v1/signup',{method:'POST',headers:{'apikey':cfg.key,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});return r.json();};
const sbAdminUpdatePassword=async(cfg,authId,newPw)=>{
  const svcKey=cfg.serviceKey;
  if(!svcKey)throw new Error('Se requiere la Service Role Key en Configuración para cambiar contraseñas.');
  const r=await fetch(cfg.url+'/auth/v1/admin/users/'+authId,{method:'PUT',headers:{'apikey':svcKey,'Authorization':'Bearer '+svcKey,'Content-Type':'application/json'},body:JSON.stringify({password:newPw})});
  if(!r.ok){const t=await r.text();throw new Error(t);}
  return r.json();
};
const sbAdminCreateUser=async(cfg,email,pw)=>{
  const svcKey=cfg.serviceKey;
  if(!svcKey)throw new Error('NO_SERVICE_KEY');
  const r=await fetch(cfg.url+'/auth/v1/admin/users',{method:'POST',headers:{'apikey':svcKey,'Authorization':'Bearer '+svcKey,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw,email_confirm:true})});
  const d=await r.json();
  if(!r.ok){
    const friendly=d.error_code==='unexpected_failure'||d.code===500
      ?'Error interno de Supabase (500). Si acabas de eliminar este usuario, espera 2-3 minutos y vuelve a intentar.'
      :d.message||d.msg||d.error||JSON.stringify(d);
    throw new Error(friendly);
  }
  return d;
};
const sbAdminFindUserByEmail=async(cfg,email)=>{
  const svcKey=cfg.serviceKey;
  if(!svcKey)return null;
  const r=await fetch(cfg.url+'/auth/v1/admin/users?email='+encodeURIComponent(email),{
    headers:{'apikey':svcKey,'Authorization':'Bearer '+svcKey}
  });
  if(!r.ok)return null;
  const d=await r.json();
  // Response is {users:[...]} or array
  const list=Array.isArray(d)?d:(d.users||[]);
  return list.find(u=>u.email&&u.email.toLowerCase()===email.toLowerCase())||null;
};
const sbAdminUpdateUserPassword=async(cfg,authId,pw)=>{
  const svcKey=cfg.serviceKey;
  if(!svcKey)throw new Error('NO_SERVICE_KEY');
  const r=await fetch(cfg.url+'/auth/v1/admin/users/'+authId,{method:'PUT',
    headers:{'apikey':svcKey,'Authorization':'Bearer '+svcKey,'Content-Type':'application/json'},
    body:JSON.stringify({password:pw,email_confirm:true})
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d.message||d.error||JSON.stringify(d));
  return d;
};
const parseSupabaseError=r=>{
  if(!r)return'Error desconocido';
  if(typeof r==='string')return r;
  if(r.message)return r.message;
  if(r.error_description)return r.error_description;
  if(r.error&&typeof r.error==='string')return r.error;
  if(r.error&&r.error.message)return r.error.message;
  return JSON.stringify(r);
};

const sbGetSafe=async(cfg,tok,table,mapper)=>{
  try{const r=await fetch(cfg.url+'/rest/v1/'+table+'?select=*',{headers:sbH(cfg,tok)});
    if(!r.ok)return[];
    const d=await r.json();
    return Array.isArray(d)?d.filter(x=>x&&x.id).map(mapper):[];
  }catch(_){return[];}
};

async function syncData(cfg,tok,old,nw){
  const syncArr=async(table,key,oldArr,newArr)=>{
    const safe=a=>(Array.isArray(a)?a:[]).filter(x=>x&&x.id);
    const oMap=new Map(safe(oldArr).map(x=>[x.id,JSON.stringify(x)]));
    const nSafe=safe(newArr);
    const ups=nSafe.filter(x=>oMap.get(x.id)!==JSON.stringify(x));
    const nIds=new Set(nSafe.map(x=>x.id));
    const dels=[...oMap.keys()].filter(id=>!nIds.has(id));
    if(ups.length) await sbUpsert(cfg,tok,table,ups.map(toDB[key]));
    if(dels.length) await Promise.all(dels.map(id=>sbDel(cfg,tok,table,id)));
  };
  // syncPeople: tries with email first, falls back without if column missing
  const syncPeople=async(oldArr,newArr)=>{
    const safe=a=>(Array.isArray(a)?a:[]).filter(x=>x&&x.id);
    const oMap=new Map(safe(oldArr).map(x=>[x.id,JSON.stringify(x)]));
    const nSafe=safe(newArr);
    const ups=nSafe.filter(x=>oMap.get(x.id)!==JSON.stringify(x));
    const nIds=new Set(nSafe.map(x=>x.id));
    const dels=[...oMap.keys()].filter(id=>!nIds.has(id));
    if(ups.length){
      try{
        await sbUpsert(cfg,tok,'people',ups.map(toDB.people));
      }catch(e){
        // If email column doesn't exist yet in Supabase, retry without it
        if(e.message&&(e.message.includes('email')||e.message.includes('column'))){
          const toDBnoEmail=p=>{const r=toDB.people(p);delete r.email;return r;};
          await sbUpsert(cfg,tok,'people',ups.map(toDBnoEmail));
          console.warn('people synced without email column - add column email TEXT to people table in Supabase');
        } else { throw e; }
      }
    }
    if(dels.length) await Promise.all(dels.map(id=>sbDel(cfg,tok,'people',id)));
  };
  const sc=JSON.stringify(old.rates)!==JSON.stringify(nw.rates)||JSON.stringify(old.partCats)!==JSON.stringify(nw.partCats);
  const errors=[];
  const safe=async(label,fn)=>{try{await fn();}catch(e){errors.push(label+': '+e.message);}};
  await Promise.all([
    syncArr('departments','departments',old.departments,nw.departments),
    syncArr('app_users','app_users',old.users,nw.users),
    syncArr('projects','projects',old.projects,nw.projects),
    syncArr('revenues','revenues',old.revenues,nw.revenues),
    syncArr('internal_costs','internal_costs',old.internalCosts,nw.internalCosts),
    syncArr('external_costs','external_costs',old.externalCosts,nw.externalCosts),
    syncArr('participations','participations',old.participations,nw.participations),
    syncArr('expenses','expenses',old.expenses,nw.expenses),
    syncPeople(old.people||[],nw.people||[]),
    safe('real_internal_costs',()=>syncArr('real_internal_costs','real_internal_costs',old.realInternalCosts||[],nw.realInternalCosts||[])),
    safe('real_external_costs',()=>syncArr('real_external_costs','real_external_costs',old.realExternalCosts||[],nw.realExternalCosts||[])),
    safe('real_participations',()=>syncArr('real_participations','real_participations',old.realParticipations||[],nw.realParticipations||[])),
    safe('real_cobros',()=>syncArr('real_cobros','real_cobros',old.realCobros||[],nw.realCobros||[])),
    safe('pagos_participaciones',()=>syncArr('pagos_participaciones','pagos_participaciones',old.pagosParticipaciones||[],nw.pagosParticipaciones||[])),
    safe('clients',()=>syncArr('clients','clients',old.clients||[],nw.clients||[])),
    safe('fixed_expenses',()=>syncArr('fixed_expenses','fixed_expenses',old.fixedExpenses||[],nw.fixedExpenses||[])),
    safe('labor_costs',()=>syncArr('labor_costs','labor_costs',old.laborCosts||[],nw.laborCosts||[])),
    safe('other_labor_costs',()=>syncArr('other_labor_costs','other_labor_costs',old.otherLaborCosts||[],nw.otherLaborCosts||[])),
    syncArr('timesheets','timesheets',old.timesheets||[],nw.timesheets||[]),
    sc?sbUpsert(cfg,tok,'settings',[{id:1,rates:nw.rates,part_cats:nw.partCats}]):Promise.resolve(),
  ]);
  if(errors.length) throw new Error(errors.join(' | '));
}

const $n=n=>(n<0?'-$':'$')+new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.abs(n||0));
const pc=n=>(!isFinite(n)||isNaN(n))?'0.00%':n.toFixed(2)+'%';
const getRev=(pid,m,d,t)=>(d.revenues.find(r=>r.projectId===pid&&r.month===m)||{})[t||'est']||0;
const getTotRev=(pid,d,t)=>MO.reduce((s,_,m)=>s+getRev(pid,m,d,t||'est'),0);
const getIntCost=(pid,m,d)=>d.internalCosts.filter(c=>c.projectId===pid&&c.month===m).reduce((s,c)=>s+c.hours*(d.rates[c.level]||0),0);
const getExtCost=(pid,m,d)=>d.externalCosts.filter(c=>c.projectId===pid&&c.month===m).reduce((s,c)=>s+(c.type==='fixed'?c.amount:c.rate*c.hours),0);
const getPartCost=(pid,d,t)=>{const rev=getTotRev(pid,d,t||'est');return(d.participations||[]).filter(p=>p.projectId===pid).reduce((s,p)=>s+(p.pct/100)*rev,0);};
const getTotDir=(pid,d)=>MO.reduce((s,_,m)=>s+getIntCost(pid,m,d)+getExtCost(pid,m,d),0)+getPartCostEst(pid,d);
const getMargin=(pid,d)=>{const r=getTotRev(pid,d),c=getTotDir(pid,d);return r>0?(r-c)/r*100:0;};
const getDeptRev=(did,m,d,t)=>d.projects.filter(p=>p.deptId===did).reduce((s,p)=>s+getRev(p.id,m,d,t||'est'),0);
const getDeptExp=(did,m,d,t)=>d.expenses.filter(e=>e.deptId===did&&e.month===m).reduce((s,e)=>s+(e[t||'est']||0),0);
const getTotDeptExp=(did,d,t)=>MO.reduce((s,_,m)=>s+getDeptExp(did,m,d,t||'est'),0);
const getRealIntCost=(pid,m,d)=>(d.realInternalCosts||[]).filter(c=>c.projectId===pid&&c.month===m).reduce((s,c)=>s+c.hours*(d.rates[c.level]||0),0);
const getRealExtCost=(pid,m,d)=>(d.realExternalCosts||[]).filter(c=>c.projectId===pid&&c.month===m).reduce((s,c)=>s+(c.type==='fixed'?c.amount:c.rate*c.hours),0);
const getTotRealInt=(pid,d)=>MO.reduce((s,_,m)=>s+getRealIntCost(pid,m,d),0);
const getTotRealExt=(pid,d)=>MO.reduce((s,_,m)=>s+getRealExtCost(pid,m,d),0);
// ── Ingreso Real = suma de cobros reales registrados ─────────────────────
const getTotRealCobros=(pid,d)=>(d.realCobros||[]).filter(c=>c.projectId===pid).reduce((s,c)=>s+c.amount,0);
// Base cálculo = Monto Factura - Pagos a Terceros - Otros Descuentos
const getBaseCalculo=cobro=>cobro.amount-(cobro.pagosTerceros||0)-(cobro.otrosDescuentos||0);
const getTotBaseCalculo=(pid,d)=>(d.realCobros||[]).filter(c=>c.projectId===pid).reduce((s,c)=>s+getBaseCalculo(c),0);
// Pagos a Terceros total (es un costo del proyecto)
const getTotPagosTerceros=(pid,d)=>(d.realCobros||[]).filter(c=>c.projectId===pid).reduce((s,c)=>s+(c.pagosTerceros||0),0);
// Causadas = pct% × base de cálculo (neto: factura - descuentos)
const getPersonaCausadas=(rp,pid,d)=>(rp.pct/100)*getTotBaseCalculo(pid,d);
const getTotRealPartCausadas=(pid,d)=>(d.realParticipations||[]).filter(p=>p.projectId===pid).reduce((s,p)=>s+getPersonaCausadas(p,pid,d),0);
const getTotRealPartPagadas=(pid,d)=>(d.pagosParticipaciones||[]).filter(p=>p.projectId===pid).reduce((s,c)=>s+c.amount,0);
const getPagosPersona=(pid,personId,d)=>(d.pagosParticipaciones||[]).filter(p=>p.projectId===pid&&p.personId===personId);
// Participaciones presupuestadas = pct% × ingreso estimado total del proyecto
const getPartCostEst=(pid,d)=>{
  const revE=getTotRev(pid,d,'est');
  return(d.participations||[]).filter(p=>p.projectId===pid).reduce((s,p)=>s+(p.pct/100)*revE,0);
};
const getRealPL=(pid,d)=>{
  const revA=getTotRealCobros(pid,d);          // Ingreso real = cobros reales acumulados
  const intC=getTotRealInt(pid,d);
  const extC=getTotRealExt(pid,d);
  const tercC=getTotPagosTerceros(pid,d);      // Costo de terceros (pagos a descontar)
  const partC=getTotRealPartCausadas(pid,d);   // Causadas = pct% × base neta
  const partPagadas=getTotRealPartPagadas(pid,d);
  const totC=intC+extC+tercC+partC;
  const res=revA-totC;
  const mg=revA>0?(res/revA)*100:0;
  return{revA,intC,extC,tercC,partC,partPagadas,totC,res,mg};
};
const getPL=(pid,d)=>{
  const revE=getTotRev(pid,d,'est');
  const revA=getTotRealCobros(pid,d);          // Real en vista presupuesto = cobros reales
  const intC=MO.reduce((s,_,m)=>s+getIntCost(pid,m,d),0);
  const extC=MO.reduce((s,_,m)=>s+getExtCost(pid,m,d),0);
  const partE=getPartCostEst(pid,d);           // Presupuesto: pct% × ingreso estimado
  const partA=getTotRealPartCausadas(pid,d);   // Real: pct% × cobros reales
  const totC=intC+extC+partE,res=revE-totC,mg=revE>0?(res/revE)*100:0;
  return{revE,revA,intC,extC,partE,partA,totC,res,mg};
};

        const has=projId&&(data.revenues.some(r=>r.projectId===projId&&r.month===i)||data.internalCosts.some(c=>c.projectId===projId&&c.month===i));

          <button key={i} onClick={()=>setMo(i)} className={'relative px-2.5 py-1 rounded text-xs '+(mo===i?'bg-indigo-600 text-white':'bg-white border text-gray-600')}>
            {m}
            {has&&mo!==i&&<span className="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 bg-indigo-400 rounded-full"/>}
          </button>
        );
      })}
    </div>
  );
}

function LoginScreen({cfg,onLogin,onConfig}){

/* ── APP ROOT ── */
function App(){
  const [cfg,setCfg]=useState(getLocalCfg);
  const [screen,setScreen]=useState('login');
  const [data,setData]=useState(null);
  const [session,setSession]=useState(null);
  const [currentUser,setCurrentUser]=useState(null);
  const [tab,setTab]=useState('resumen');
  const [saving,setSaving]=useState(false);
  const [saveError,setSaveError]=useState('');
  const prevRef=useRef(null);

  const handleLogin=useCallback(async(email,pass)=>{
    try{
      const auth=await sbSignIn(cfg,email,pass);
      if(auth.error)return auth.error.message||'Email o contraseña incorrectos';
      const tok=auth.access_token,authId=auth.user.id;
      const d=await loadAllData(cfg,tok);
      let profile=d.users.find(u=>u.authId===authId);
      if(!profile&&d.users.length===0){
        const np={id:uid(),name:email.split('@')[0],deptId:(d.departments[0]||{}).id||null,role:'admin',authId};
        await sbUpsert(cfg,tok,'app_users',[toDB.app_users(np)]);
        d.users.push(np);profile=np;
      }
      if(!profile)return 'Tu usuario no está configurado. Contacta al administrador.';
      setSession({tok,authId});setCurrentUser(profile);setData(d);prevRef.current=d;
      const firstTab={'admin':'resumen','administracion':'resumen','socio':'resumen','responsable':'proyectos','rrhh':'part-report','equipo':'timesheet'}[profile.role]||'dashboard';
      setTab(firstTab);setScreen('app');
      return null;
    }catch(e){return 'Error de conexión: '+e.message;}
  },[cfg]);

  const save=useCallback(async nw=>{
    const prev=prevRef.current;
    setData(nw);
    prevRef.current=nw;
    setSaving(true);setSaveError('');
    try{await syncData(cfg,session.tok,prev||nw,nw);}
    catch(e){
      console.error('sync error:',e);
      setSaveError(e.message||'Error al sincronizar');
      setTimeout(()=>setSaveError(''),8000);
    }
    finally{setSaving(false);}
  },[cfg,session]);

  const logout=()=>{setSession(null);setCurrentUser(null);setData(null);prevRef.current=null;setScreen('login');};

  if(!cfg||screen==='config')return <ConfigScreen current={cfg} onSave={(u,k,sk)=>{const c={url:u,key:k,serviceKey:sk||''};setLocalCfg(c);setCfg(c);setScreen('login');}}/>;
  if(screen==='login')return <LoginScreen cfg={cfg} onLogin={handleLogin} onConfig={()=>setScreen('config')}/>;
  if(!data)return <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',color:'#9ca3af'}}>Cargando datos…</div>;

  const role=currentUser&&currentUser.role||'user';
  const isAdmin=role==='admin';
  const isAdminRole=role==='admin'||role==='administracion';
  const isSocio=role==='socio';
  const isResponsable=role==='responsable';
  const isRRHH=role==='rrhh';

  // Nav items by role
  const ALL_NAV=[
    {id:'resumen',l:'Resumen',i:'📊'},
    {id:'dashboard',l:'Dashboard',i:'🏠'},
    {id:'proyectos',l:'Proyectos',i:'📁'},
    {id:'gastos-fijos',l:'Gastos Fijos',i:'🧾'},{id:'labor-costs',l:'Costos Laborales',i:'👷'},
    {id:'config',l:'Configuración',i:'⚙️'},
    {id:'consolidado',l:'Consolidado',i:'📋'},
    {id:'rentabilidad',l:'Rentabilidad',i:'💹'},
    {id:'part-report',l:'Participaciones',i:'🏆'},
    {id:'timesheet',l:'TimeSheet',i:'⏱️'},
  ];
  const navAllowed={
    admin:        ['resumen','dashboard','proyectos','gastos-fijos','labor-costs','config','consolidado','rentabilidad','part-report','timesheet'],
    administracion:['resumen','dashboard','proyectos','gastos-fijos','labor-costs','config','consolidado','rentabilidad','part-report','timesheet'],
    socio:        ['resumen','dashboard','proyectos','gastos-fijos','labor-costs','consolidado','rentabilidad','part-report','timesheet'],
    responsable:  ['proyectos','timesheet'],
    rrhh:         ['part-report','timesheet'],
    user:         ['dashboard','proyectos','gastos','timesheet'],
    equipo:       ['timesheet'],
  };
  const allowed=navAllowed[role]||navAllowed.user;
  const navItems=ALL_NAV.filter(n=>allowed.includes(n.id));

  return(
    <div className="flex h-screen bg-slate-50 text-gray-800 text-sm">
      <aside className="w-52 flex flex-col shrink-0" style={{background:'rgb(0,50,60)'}}>
        <div className="p-4 border-b border-teal-800 flex items-center gap-2.5">
          <img src={LOGO} alt="BT" style={{width:'32px',height:'32px',borderRadius:'6px',objectFit:'cover',flexShrink:0}}/>
          <div>
            <div className="font-bold text-sm text-white">BudgetApp</div>
            <div className="text-xs" style={{color:'rgb(0,186,179)'}}>Baker Tilly Venezuela</div>
          </div>
        </div>
        <div className="px-4 py-3 border-b border-teal-900 text-white">
          <div className="text-xs truncate" style={{color:'rgb(0,186,179)'}}>{ROLE_LABEL(role)}</div>
          <div className="font-medium text-sm truncate">{currentUser&&currentUser.name}</div>
          {saving&&<div className="text-xs mt-0.5" style={{color:'rgb(0,186,179)'}}>💾 Guardando…</div>}
          {saveError&&<div className="text-xs mt-0.5 text-red-500 max-w-xs truncate" title={saveError}>⚠️ Error al guardar — {saveError}</div>}
        </div>
        <nav className="flex-1 p-2 space-y-0.5 overflow-y-auto">
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)}
              className="w-full text-left px-3 py-2 rounded-lg flex items-center gap-2 text-sm transition-colors"
              style={{color: tab===n.id?'white':'rgba(255,255,255,0.65)', background: tab===n.id?'rgb(0,186,179)':'transparent'}}
              onMouseEnter={e=>{if(tab!==n.id)e.currentTarget.style.background='rgba(0,186,179,0.2)';}}
              onMouseLeave={e=>{if(tab!==n.id)e.currentTarget.style.background='transparent';}}>
              {n.i} {n.l}
            </button>
          ))}
        </nav>
        <button onClick={logout} className="m-3 text-xs text-left px-2 py-1 rounded" style={{color:'rgba(255,255,255,0.5)'}} onMouseEnter={e=>e.currentTarget.style.color='white'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.5)'}>← Cerrar sesión</button>
      </aside>
      <main className="flex-1 overflow-auto">
        {(isAdminRole||isSocio||isResponsable||isRRHH)
          ?<AdminArea tab={tab} data={data} save={save} cfg={cfg} setCfg={setCfg} session={session} currentUser={currentUser}/>
          :<UserArea tab={tab} data={data} save={save} user={currentUser} currentUser={currentUser}/>
        }
      </main>
    </div>
  );
}

/* ══════════════════════════════ ADMIN AREA ══════════════════════════════ */
function AdminArea({tab,data,save,cfg,setCfg,session,currentUser}){
  const [projId,setProjId]=useState(null);
  const role=currentUser&&currentUser.role||'user';
  const isAdminRole=role==='admin'||role==='administracion';
  const isResponsable=role==='responsable';

  // Responsable: only sees projects where assigned
  const visibleData=isResponsable?{
    ...data,
    projects:data.projects.filter(p=>p.responsableId===currentUser.id)
  }:data;

  if(projId)return <ProjDetail projId={projId} data={visibleData} save={save} onBack={()=>setProjId(null)}/>;
  if(tab==='resumen')return <AResumen data={visibleData}/>;
  if(tab==='dashboard')return <ADash data={visibleData}/>;
  if(tab==='proyectos')return <AProjects data={visibleData} save={save} onProj={setProjId} currentUser={currentUser}/>;
  if(tab==='config')return isAdminRole?<AConfig data={data} save={save} cfg={cfg} setCfg={setCfg} session={session} currentUser={currentUser}/>:<div className="p-8 text-center text-gray-400">Sin acceso a Configuración.</div>;
  if(tab==='consolidado')return <AConsolidado data={visibleData}/>;
  if(tab==='rentabilidad')return <ARent data={visibleData}/>;
  if(tab==='gastos-fijos')return <AGastosFijos data={data} save={save}/>;
  if(tab==='labor-costs')return <ACostosLaborales data={data} save={save}/>;
  if(tab==='part-report')return <APartReport data={data} currentUser={currentUser}/>;
  if(tab==='timesheet')return <ATimeSheet data={data} save={save} currentUser={currentUser}/>;
  return null;
}

}

function AProjects({data,save,onProj,currentUser}){
  const emptyForm={name:'',client:'',clientId:'',deptId:(data.departments[0]||{}).id||'',status:'Por Enviar',tipo:'Recurrente',periodo:currentPeriodo,honorariosTotal:'',honorariosOS:'',serviceCode:'AE',codigo:'',responsableId:''};
  const [vistaTab,setVistaTab]=useState('activos');
  const [selDept,setSelDept]=useState('todos');
  const [filtroPeriodo,setFiltroPeriodo]=useState('');
  const [show,setShow]=useState(false);
  const [form,setForm]=useState(emptyForm);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});

  const isAdmin=currentUser&&currentUser.role==='admin';
  const canClose=isAdmin;

  const add=()=>{
    if(!form.name.trim()||!form.client.trim())return;
    const codigoFinal=form.codigo.trim()||nextProjectCode(form.periodo,form.serviceCode,data.projects);
    const np={id:uid(),name:form.name.trim(),client:form.client.trim(),clientId:form.clientId||'',deptId:form.deptId,status:form.status,tipo:form.tipo,periodo:form.periodo||currentPeriodo,honorariosTotal:parseFloat(form.honorariosTotal)||0,honorariosOS:parseFloat(form.honorariosOS)||0,recurrente:form.tipo==='Recurrente',cerrado:false,fechaCierre:'',enPapelera:false,fechaPapelera:'',codigo:codigoFinal,responsableId:form.responsableId||''};
    save({...data,projects:[...data.projects,np]});
    setForm(emptyForm);setShow(false);
  };

  const moverAPapelera=id=>{
    const today=new Date().toISOString().split('T')[0];
    save({...data,projects:data.projects.map(p=>p.id===id?{...p,enPapelera:true,fechaPapelera:today}:p)});
  };
  const restaurar=id=>{
    save({...data,projects:data.projects.map(p=>p.id===id?{...p,enPapelera:false,fechaPapelera:''}:p)});
  };
  const eliminarDefinitivo=p=>{
    if(!window.confirm(`⚠️ ELIMINAR DEFINITIVAMENTE\n\nProyecto: "${p.name}"\nCliente: ${p.client}\n\n¿Estás completamente seguro? Esta acción NO se puede deshacer y borrará también todos los ingresos, costos y participaciones asociadas.`))return;
    save({...data,
      projects:data.projects.filter(x=>x.id!==p.id),
      revenues:data.revenues.filter(r=>r.projectId!==p.id),
      internalCosts:data.internalCosts.filter(c=>c.projectId!==p.id),
      externalCosts:data.externalCosts.filter(c=>c.projectId!==p.id),
      participations:(data.participations||[]).filter(x=>x.projectId!==p.id),
      realInternalCosts:(data.realInternalCosts||[]).filter(c=>c.projectId!==p.id),
      realExternalCosts:(data.realExternalCosts||[]).filter(c=>c.projectId!==p.id),
      realParticipations:(data.realParticipations||[]).filter(x=>x.projectId!==p.id),
      realCobros:(data.realCobros||[]).filter(c=>c.projectId!==p.id),
      pagosParticipaciones:(data.pagosParticipaciones||[]).filter(x=>x.projectId!==p.id),
    });
  };

  const startEdit=p=>{
    setEditId(p.id);
    setEditForm({name:p.name,client:p.client,clientId:p.clientId||'',deptId:p.deptId,
      status:p.status,tipo:p.tipo||'Recurrente',periodo:p.periodo||currentPeriodo,
      honorariosTotal:String(p.honorariosTotal||''),honorariosOS:String(p.honorariosOS||''),
      codigo:p.codigo||'',responsableId:p.responsableId||''});
  };
  const saveEdit=()=>{
    if(!editForm.name||!editForm.client)return;
    save({...data,projects:data.projects.map(p=>p.id===editId?{...p,
      name:editForm.name.trim(),client:editForm.client.trim(),clientId:editForm.clientId||'',
      deptId:editForm.deptId,status:editForm.status,tipo:editForm.tipo,
      periodo:editForm.periodo||currentPeriodo,
      honorariosTotal:parseFloat(editForm.honorariosTotal)||0,
      honorariosOS:parseFloat(editForm.honorariosOS)||0,
      recurrente:editForm.tipo==='Recurrente',
      codigo:editForm.codigo||p.codigo||''}:p)});
    setEditId(null);
  };
  const cerrarProyecto=id=>{
    if(!canClose)return;
    const today=new Date().toISOString().split('T')[0];
    save({...data,projects:data.projects.map(p=>p.id===id?{...p,cerrado:true,fechaCierre:today}:p)});
  };
  const reabrirProyecto=id=>{
    if(!canClose)return;
    save({...data,projects:data.projects.map(p=>p.id===id?{...p,cerrado:false,fechaCierre:''}:p)});
  };

  const honNeto=(parseFloat(form.honorariosTotal)||0)-(parseFloat(form.honorariosOS)||0);
  const totActivos=data.projects.filter(p=>!p.cerrado&&!p.enPapelera).length;
  const totCerrados=data.projects.filter(p=>p.cerrado&&!p.enPapelera).length;
  const totPapelera=data.projects.filter(p=>p.enPapelera).length;

  const isClosed=vistaTab==='cerrados';
  const isPapelera=vistaTab==='papelera';
  const base=data.projects.filter(p=>
    isPapelera?p.enPapelera===true:isClosed?(p.cerrado===true&&!p.enPapelera):(!p.cerrado&&!p.enPapelera)
  );
  const conPeriodo=filtroPeriodo?base.filter(p=>p.periodo===filtroPeriodo):base;
  const proyectos=selDept==='todos'?conPeriodo:conPeriodo.filter(p=>p.deptId===selDept);
  const proyectosOrdenados=[...proyectos].sort((a,b)=>a.name.localeCompare(b.name,'es',{sensitivity:'base'}));
  const deptCount=id=>conPeriodo.filter(p=>p.deptId===id).length;

  /* ProjCard is defined OUTSIDE AProjects (see above) to prevent cursor-jump.
     We render it here passing all needed props. */
  const cardProps={data,save,isAdmin,canClose,isPapelera,isClosed,editId,
    editForm,setEditForm,startEdit,saveEdit,cancelEdit:()=>setEditId(null),
    cerrarProyecto,reabrirProyecto,moverAPapelera,restaurar,eliminarDefinitivo,onProj};

  return(
    <div className="p-6">
      {/* Header */}
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h2 className="font-bold text-base">Proyectos</h2>
          <p className="text-gray-400 text-xs">{totActivos} activos · {totCerrados} cerrados · {totPapelera} en papelera</p>
        </div>
        {isAdmin&&vistaTab!=='papelera'&&<button onClick={()=>setShow(!show)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Nuevo Proyecto</button>}
      </div>

      {/* New project form */}
      {show&&vistaTab==='activos'&&(
        <div className="bg-white border rounded-xl p-5 mb-6 shadow-sm">
          <div className="font-semibold mb-3 text-sm">Nuevo Proyecto</div>
          <div className="grid grid-cols-3 gap-3 mb-3">
            <div><label className="text-gray-400 text-xs mb-1 block">Nombre</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Auditoría ABC 2026" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
            <div><label className="text-gray-400 text-xs mb-1 block">Cliente</label>
              {(data.clients||[]).length>0?(
                <div className="space-y-1">
                  <select value={form.clientId} onChange={e=>{const c=(data.clients||[]).find(x=>x.id===e.target.value);setForm({...form,clientId:e.target.value,client:c?c.name:'',});}} className="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="">— Seleccionar cliente —</option>
                    {(data.clients||[]).sort((a,b)=>a.name.localeCompare(b.name)).map(c=>(
                      <option key={c.id} value={c.id}>{c.name}{c.code?' · '+c.code:''}</option>
                    ))}
                  </select>
                  {form.clientId&&(()=>{const c=(data.clients||[]).find(x=>x.id===form.clientId);return c&&<div className="flex items-center gap-2 px-2 py-1 bg-blue-50 rounded-lg text-xs"><span className="font-mono text-blue-600">{c.code||'—'}</span><span className="text-gray-500">{c.shortName||c.name}</span></div>;})()}
                  <div className="text-xs text-gray-400">¿No está en la lista? <button type="button" onClick={()=>setForm({...form,clientId:'',client:''})} className="text-indigo-500 underline">Ingresar manualmente</button></div>
                  {!form.clientId&&<input value={form.client} onChange={e=>setForm({...form,client:e.target.value})} placeholder="Nombre del cliente" className="w-full border rounded-lg px-3 py-2 text-sm"/>}
                </div>
              ):(
                <input value={form.client} onChange={e=>setForm({...form,client:e.target.value})} placeholder="Nombre del cliente" className="w-full border rounded-lg px-3 py-2 text-sm"/>
              )}
            </div>
            <div><label className="text-gray-400 text-xs mb-1 block">Departamento</label>
              <select value={form.deptId} onChange={e=>setForm({...form,deptId:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm">
                {data.departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
              </select>
            </div>
            <div><label className="text-gray-400 text-xs mb-1 block">Honorarios Propuestos (USD)</label><input type="number" value={form.honorariosTotal} onChange={e=>setForm({...form,honorariosTotal:e.target.value})} placeholder="0" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
            <div><label className="text-gray-400 text-xs mb-1 block">Honorarios OS (USD)</label><input type="number" value={form.honorariosOS} onChange={e=>setForm({...form,honorariosOS:e.target.value})} placeholder="0" className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
            <div><label className="text-gray-400 text-xs mb-1 block">Estatus</label>
              <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm">
                {STATUS_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label className="text-blue-600 text-xs mb-1 block font-medium">Responsable del Proyecto</label>
              <select value={form.responsableId||''} onChange={e=>setForm({...form,responsableId:e.target.value})}
                className="w-full border-2 border-blue-200 rounded-lg px-3 py-2 text-sm">
                <option value="">— Sin asignar —</option>
                {(data.users||[]).map(u=>(
                  <option key={u.id} value={u.id}>{u.name} · {ROLE_LABEL(u.role)}</option>
                ))}
              </select>
            </div>
            <div><label className="text-gray-400 text-xs mb-1 block">Tipo</label>
              <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm">
                {TIPO_OPTS.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div><label className="text-gray-400 text-xs mb-1 block">Período</label>
              <select value={form.periodo} onChange={e=>{const np=form.serviceCode?nextProjectCode(e.target.value,form.serviceCode,data.projects):'';setForm({...form,periodo:e.target.value,codigo:np});}} className="w-full border rounded-lg px-3 py-2 text-sm">
                {PERIODOS.map(pp=><option key={pp} value={pp}>{pp} · {periodoLabel(pp)}</option>)}
              </select>
            </div>
            <div>
              <label className="text-indigo-600 text-xs mb-1 block font-medium">Código de Servicio</label>
              <select value={form.serviceCode} onChange={e=>{const sc=e.target.value;const nc=nextProjectCode(form.periodo,sc,data.projects);setForm({...form,serviceCode:sc,codigo:nc});}} className="w-full border-2 border-indigo-300 rounded-lg px-3 py-2 text-sm">
                {SERVICE_CODES.map(sc=><option key={sc.code} value={sc.code}>{sc.code} — {sc.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-indigo-600 text-xs mb-1 block font-medium">Código del Proyecto</label>
              <div className="flex items-center gap-2">
                <input value={form.codigo} onChange={e=>setForm({...form,codigo:e.target.value.toUpperCase()})}
                  placeholder={nextProjectCode(form.periodo,form.serviceCode,data.projects)||'Auto-generado'}
                  className="w-full border-2 border-indigo-300 rounded-lg px-3 py-2 text-sm font-mono"/>
                <button onClick={()=>setForm({...form,codigo:nextProjectCode(form.periodo,form.serviceCode,data.projects)})}
                  className="text-xs text-indigo-500 border border-indigo-300 rounded-lg px-2 py-2 hover:bg-indigo-50 whitespace-nowrap">↺ Auto</button>
              </div>
              {form.serviceCode&&<div className="text-xs text-indigo-400 mt-0.5">Sugerido: <b>{nextProjectCode(form.periodo,form.serviceCode,data.projects)}</b></div>}
            </div>
          </div>
          {form.honorariosTotal&&<div className="text-xs text-indigo-600 mb-3 bg-indigo-50 rounded-lg px-3 py-2">Hon. Neto: <b>{$n(honNeto)}</b></div>}
          <div className="flex gap-2">
            <button onClick={add} className="bg-indigo-600 text-white px-5 py-1.5 rounded-lg text-sm">💾 Guardar Proyecto</button>
            <button onClick={()=>setShow(false)} className="border text-gray-600 px-4 py-1.5 rounded-lg text-sm">Cancelar</button>
          </div>
        </div>
      )}

      {/* Filter bar */}
      <div className="bg-white rounded-xl border p-4 mb-5 flex flex-wrap gap-4 items-center">
        <div className="flex rounded-lg border overflow-hidden">
          <button onClick={()=>{setVistaTab('activos');setEditId(null);}}
            className={'px-4 py-2 text-sm font-medium '+(vistaTab==='activos'?'bg-indigo-600 text-white':'bg-white text-gray-600 hover:bg-gray-50')}>
            ✅ Activos <span className={'ml-1 px-1.5 py-0.5 rounded-full text-xs '+(vistaTab==='activos'?'bg-white text-indigo-600':'bg-gray-100 text-gray-600')}>{totActivos}</span>
          </button>
          <button onClick={()=>{setVistaTab('cerrados');setEditId(null);}}
            className={'px-4 py-2 text-sm font-medium border-l '+(vistaTab==='cerrados'?'bg-gray-600 text-white':'bg-white text-gray-600 hover:bg-gray-50')}>
            🔒 Cerrados <span className={'ml-1 px-1.5 py-0.5 rounded-full text-xs '+(vistaTab==='cerrados'?'bg-white text-gray-700':'bg-gray-100 text-gray-600')}>{totCerrados}</span>
          </button>
          <button onClick={()=>{setVistaTab('papelera');setEditId(null);setSelDept('todos');}}
            className={'px-4 py-2 text-sm font-medium border-l '+(vistaTab==='papelera'?'bg-red-600 text-white':'bg-white text-gray-600 hover:bg-gray-50')}>
            🗑 Papelera {totPapelera>0&&<span className={'ml-1 px-1.5 py-0.5 rounded-full text-xs '+(vistaTab==='papelera'?'bg-white text-red-600':'bg-red-100 text-red-600')}>{totPapelera}</span>}
          </button>
        </div>
        {!isPapelera&&(
          <>
            <div className="flex items-center gap-2">
              <label className="text-gray-500 text-xs font-medium whitespace-nowrap">Departamento:</label>
              <select value={selDept} onChange={e=>{setSelDept(e.target.value);setEditId(null);}}
                className="border rounded-lg px-3 py-2 text-sm min-w-44 focus:outline-none">
                <option value="todos">— Todos ({conPeriodo.length})</option>
                {data.departments.filter(d=>deptCount(d.id)>0).map(d=>(
                  <option key={d.id} value={d.id}>{d.name} ({deptCount(d.id)})</option>
                ))}
              </select>
            </div>
            <div className="flex items-center gap-2">
              <label className="text-gray-500 text-xs font-medium whitespace-nowrap">Período:</label>
              <select value={filtroPeriodo} onChange={e=>setFiltroPeriodo(e.target.value)}
                className="border rounded-lg px-3 py-2 text-sm focus:outline-none">
                <option value="">— Todos —</option>
                {PERIODOS.map(pp=><option key={pp} value={pp}>{pp}</option>)}
              </select>
            </div>
          </>
        )}
        <div className="ml-auto text-xs text-gray-500 flex gap-4">
          <span>{proyectosOrdenados.length} proyecto{proyectosOrdenados.length!==1?'s':''}</span>
          {!isPapelera&&<span>Hon. total: <b className="text-indigo-600">{$n(proyectosOrdenados.reduce((s,p)=>s+p.honorariosTotal,0))}</b></span>}
        </div>
      </div>

      {isPapelera&&(
        <div className="mb-4 bg-red-50 border border-red-200 rounded-xl px-5 py-3 flex items-center gap-3 text-xs text-red-700">
          <span className="text-lg">⚠️</span>
          <div><b>Papelera de Proyectos</b> — Los proyectos aquí NO aparecen en ningún reporte ni cálculo. Puedes <b>Restaurar</b> o <b>Eliminar Definitivamente</b>.</div>
        </div>
      )}

      {data.departments.length===0&&<div className="bg-yellow-50 border border-yellow-200 text-yellow-700 text-xs rounded-lg px-4 py-3 mb-4">⚠️ Primero crea departamentos en Configuración → Departamentos.</div>}

      {/* Projects list */}
      {proyectosOrdenados.length===0?(
        <div className="bg-white rounded-xl border p-10 text-center text-gray-400 text-sm">
          {isPapelera?'La papelera está vacía. 🎉':isClosed?'Sin proyectos cerrados':'Sin proyectos activos'}
          {!isPapelera&&selDept!=='todos'&&` en ${(data.departments.find(d=>d.id===selDept)||{}).name||''}`}
          {!isPapelera&&filtroPeriodo&&` · período ${filtroPeriodo}`}
        </div>
      ):(
        <div className="space-y-2">
          {proyectosOrdenados.map(p=>(
            <div key={p.id} className={'bg-white rounded-xl border overflow-hidden '+(isPapelera?'opacity-80 border-red-200':'')}>
              {/* Edit form — rendered as separate stable component to prevent cursor-jump */}
              {editId===p.id&&isAdmin&&!isPapelera&&(
                <ProjEditForm
                  key={`edit-${p.id}`}
                  editForm={editForm}
                  setEditForm={setEditForm}
                  saveEdit={saveEdit}
                  cancelEdit={()=>setEditId(null)}
                  data={data}
                />
              )}
              {/* Card body */}
              <div className="p-4">
                {isPapelera&&<div className="mb-2 text-xs text-red-500">🗑 En papelera desde {p.fechaPapelera||'—'}</div>}
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5 flex-wrap">
                      <span className={'font-medium text-sm '+(isPapelera?'text-gray-400 line-through':isClosed?'text-gray-500':'')}>{p.name}</span>
                      {p.codigo&&<span className="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded font-mono text-xs font-bold tracking-wide">{p.codigo}</span>}
                      {!p.codigo&&isAdmin&&!isPapelera&&(
                        <button onClick={()=>startEdit(p)}
                          className="px-2 py-0.5 bg-orange-100 text-orange-600 rounded text-xs hover:bg-orange-200">
                          + Asignar código
                        </button>
                      )}
                      <span className={'px-1.5 py-0.5 rounded text-xs font-medium '+(TIPO_CLS[p.tipo||'Recurrente'])}>{p.tipo||'Recurrente'}</span>
                      {isClosed&&!isPapelera&&<span className="px-2 py-0.5 bg-gray-200 text-gray-600 rounded-full text-xs">🔒 {p.fechaCierre||'Cerrado'}</span>}
                      {!isClosed&&!isPapelera&&<span className="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs">✅ Activo</span>}
                      <span className="px-2 py-0.5 bg-blue-50 text-blue-500 rounded-full text-xs">{p.periodo||currentPeriodo}</span>
                    </div>
                    <div className="text-gray-400 text-xs mb-1">
                      {p.client}
                      {p.responsableId&&(()=>{const u=(data.users||[]).find(x=>x.id===p.responsableId);return u?<span className="ml-2 px-1.5 py-0.5 bg-blue-100 text-blue-600 rounded text-xs">👤 {u.name}</span>:null;})()}
                    </div>
                    {!isClosed&&!isPapelera&&(
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-gray-400 text-xs">Estatus:</span>
                        <select value={p.status||'Por Enviar'} onChange={e=>save({...data,projects:data.projects.map(x=>x.id===p.id?{...x,status:e.target.value}:x)})}
                          className={'text-xs font-medium rounded-full px-2 py-0.5 border-0 cursor-pointer focus:outline-none '+(STATUS_CLS[p.status]||'bg-gray-100 text-gray-500')}
                          style={{appearance:'auto'}}>
                          {STATUS_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    )}
                    {p.honorariosTotal>0&&!isPapelera&&(
                      <div className="text-xs text-indigo-600">
                        Propuesto: <b>{$n(p.honorariosTotal)}</b>
                        {p.honorariosOS>0&&<span className="text-red-500"> OS: {$n(p.honorariosOS)}</span>}
                        <span className="text-indigo-700 font-semibold"> Neto: {$n(p.honorariosTotal-p.honorariosOS)}</span>
                      </div>
                    )}
                  </div>
                  {!isPapelera&&(
                    <div className="grid grid-cols-4 gap-2 text-right text-xs shrink-0">
                      <div><div className="text-gray-400">Rev.Est.</div><div className="font-medium">{$n(getPL(p.id,data).revE)}</div></div>
                      <div><div className="text-gray-400">Costos</div><div className="font-medium text-orange-600">{$n(getPL(p.id,data).totC)}</div></div>
                      <div className="text-right">
                        <div className="text-gray-400 mb-0.5">Resultado</div>
                        <div className={'font-medium '+(getPL(p.id,data).res>=0?'text-blue-600':'text-red-600')}>{$n(getPL(p.id,data).res)} <span className="text-gray-400">est.</span></div>
                        {(()=>{const rl=getRealPL(p.id,data);return rl.revA>0?<div className={'font-medium '+(rl.res>=0?'text-green-600':'text-red-500')}>{$n(rl.res)} <span className="text-gray-400">real</span></div>:null;})()}
                      </div>
                      <div><div className="text-gray-400">Margen</div><Mbadge m={getPL(p.id,data).mg}/></div>
                    </div>
                  )}
                </div>
                <div className="flex gap-2 mt-3 justify-end flex-wrap">
                  {isPapelera?(
                    <>
                      <button onClick={()=>restaurar(p.id)} className="bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-medium">↩️ Restaurar</button>
                      {isAdmin&&<button onClick={()=>eliminarDefinitivo(p)} className="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium">🗑 Eliminar Definitivamente</button>}
                    </>
                  ):(
                    <>
                      {isAdmin&&!isClosed&&<button onClick={()=>editId===p.id?setEditId(null):startEdit(p)} className={'px-3 py-1.5 rounded-lg text-xs font-medium '+(editId===p.id?'bg-yellow-100 text-yellow-700':'bg-indigo-50 hover:bg-indigo-100 text-indigo-600')}>✏️ {editId===p.id?'Cerrar':'Editar'}</button>}
                      <button onClick={()=>onProj(p.id)} className={'px-3 py-1.5 rounded-lg text-xs font-medium '+(isClosed?'bg-gray-50 hover:bg-gray-100 text-gray-600':'bg-green-50 hover:bg-green-100 text-green-700')}>📂 {isClosed?'Ver':'Abrir'}</button>
                      {canClose&&!isClosed&&<button onClick={()=>{if(window.confirm('¿Cerrar "'+p.name+'"?'))cerrarProyecto(p.id);}} className="bg-orange-50 hover:bg-orange-100 text-orange-600 px-3 py-1.5 rounded-lg text-xs font-medium">🔒 Cerrar</button>}
                      {canClose&&isClosed&&<button onClick={()=>reabrirProyecto(p.id)} className="bg-amber-50 hover:bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg text-xs font-medium">🔓 Reabrir</button>}
                      {isAdmin&&<button onClick={()=>moverAPapelera(p.id)} className="bg-red-50 hover:bg-red-100 text-red-500 px-3 py-1.5 rounded-lg text-xs font-medium">🗑</button>}
                    </>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AResumen({data}){
  const [view,setView]=useState('global');
  const tRE=data.projects.reduce((s,p)=>s+getTotRev(p.id,data,'est'),0);
  const tRA=data.projects.reduce((s,p)=>s+getTotRealCobros(p.id,data),0);
  const tIC=data.projects.reduce((s,p)=>s+MO.reduce((ss,_,m)=>ss+getIntCost(p.id,m,data),0),0);
  const tEC=data.projects.reduce((s,p)=>s+MO.reduce((ss,_,m)=>ss+getExtCost(p.id,m,data),0),0);
  const tPC=data.projects.reduce((s,p)=>s+getPartCostEst(p.id,data),0);
  const tPA=data.projects.reduce((s,p)=>s+getTotRealPartCausadas(p.id,data),0);
  const tDC=tIC+tEC+tPC;
  const tEE=data.departments.reduce((s,d)=>s+getTotDeptExp(d.id,data,'est'),0);
  const tEA=data.departments.reduce((s,d)=>s+getTotDeptExp(d.id,data,'act'),0);
  // Gastos Fijos del período actual
  const gfItems=(data.fixedExpenses||[]).filter(i=>i.periodo===currentPeriodo);
  const tGFE=gfItems.reduce((s,i)=>s+(i.montos||[]).reduce((ss,v)=>ss+(parseFloat(v)||0),0),0);
  const tGFR=gfItems.reduce((s,i)=>s+(i.montosReal||[]).reduce((ss,v)=>ss+(parseFloat(v)||0),0),0);
  const lcItems=(data.laborCosts||[]).filter(i=>i.periodo===currentPeriodo&&i.activo!==false);
  const tLCE=lcItems.reduce((s,i)=>s+(i.sueldo+i.ticket+i.bstaff+i.depreciacion+i.asignacion+i.movilidad+i.participaciones)*12,0);
  const tLCM=lcItems.reduce((s,i)=>s+(i.sueldo+i.ticket+i.bstaff+i.depreciacion+i.asignacion+i.movilidad+i.participaciones),0);
  const olcItems=(data.otherLaborCosts||[]).filter(i=>i.periodo===currentPeriodo);
  const tOLC=olcItems.reduce((s,i)=>s+(i.montos||[]).reduce((ss,v)=>ss+(parseFloat(v)||0),0),0);
  const bE=tRE-tDC,nE=bE-tEE-tGFE-tLCE-tOLC;
  const nER=tRA-tDC-tGFR; // Utilidad neta real (parcial)
  const bM=tRE>0?(bE/tRE)*100:0,nM=tRE>0?(nE/tRE)*100:0;
  const pRows=data.projects.map(p=>({...p,dn:(data.departments.find(d=>d.id===p.deptId)||{}).name||'',pl:getPL(p.id,data)})).sort((a,b)=>b.pl.revE-a.pl.revE);
  const cMap={};
  data.projects.forEach(p=>{
    const pl=getPL(p.id,data);
    if(!cMap[p.client])cMap[p.client]={client:p.client,projects:[],revE:0,revA:0,intC:0,extC:0,partE:0,totC:0,res:0};
    const c=cMap[p.client];
    c.projects.push(p.name);c.revE+=pl.revE;c.revA+=pl.revA;c.intC+=pl.intC;c.extC+=pl.extC;c.partE+=pl.partE;c.totC+=pl.totC;c.res+=pl.res;
  });
  const cRows=Object.values(cMap).sort((a,b)=>b.revE-a.revE).map(c=>({...c,mg:c.revE>0?(c.res/c.revE)*100:0}));
  const dRows=data.departments.map(dept=>{
    const dp=data.projects.filter(p=>p.deptId===dept.id);
    const re=dp.reduce((s,p)=>s+getTotRev(p.id,data,'est'),0);
    const ra=dp.reduce((s,p)=>s+getTotRealCobros(p.id,data),0);
    const dc=dp.reduce((s,p)=>s+getTotDir(p.id,data),0);
    const ee=getTotDeptExp(dept.id,data,'est');
    const br=re-dc,nr=br-ee;
    return{...dept,re,ra,dc,ee,br,nr,bm:re>0?(br/re)*100:0,nm:re>0?(nr/re)*100:0,np:dp.length};
  });
  const flujoMes=MO.map((_,m)=>{
    const cobro=data.revenues.filter(r=>r.month===m).reduce((s,r)=>s+(r.cobro||0),0);
    const ejec=data.revenues.filter(r=>r.month===m).reduce((s,r)=>s+(r.est||0),0);
    const real=data.revenues.filter(r=>r.month===m).reduce((s,r)=>s+(r.act||0),0);
    return{mes:MO[m],cobro,ejec,real};
  });
  const expCSV=()=>{
    const rows=[['Concepto','Rev.Est.','Rev.Real','C.Interno','C.Externo','Participaciones','Costo Total','MB Bruta']];
    pRows.forEach(p=>rows.push([p.name+'/'+p.client,p.pl.revE,p.pl.revA,p.pl.intC,p.pl.extC,p.pl.partE,p.pl.totC,p.pl.res]));
    rows.push(['GLOBAL',tRE,tRA,tIC,tEC,tPC,tDC,bE]);
    const csv=rows.map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='resumen.csv';a.click();
  };
  const plRows=[
    {l:'Ingresos Totales',e:tRE,a:tRA,bold:true,color:''},
    {l:'  Costos Internos',e:-tIC,a:null,bold:false,color:'text-orange-600'},
    {l:'  Costos Externos',e:-tEC,a:null,bold:false,color:'text-red-500'},
    {l:'  Participaciones',e:-tPC,a:-tPA,bold:false,color:'text-teal-600'},
    {l:'Total Costos Directos',e:-tDC,a:null,bold:true,color:'text-orange-700',sep:true},
    {l:'Margen Bruto',e:bE,a:null,bold:true,color:bE>=0?'text-blue-700':'text-red-600',sep:true},
    {l:'  Costos Laborales (Nómina)',e:-tLCE,a:-tLCM*12,bold:false,color:'text-blue-600'},
    {l:'  Otros Costos Laborales',e:-tOLC,a:-tOLC,bold:false,color:'text-cyan-600'},
    {l:'  Gastos Generales',e:-tEE,a:-tEA,bold:false,color:'text-purple-600'},
    {l:'  Gastos Fijos',e:-tGFE,a:-tGFR,bold:false,color:'text-red-500'},
    {l:'Utilidad Neta',e:nE,a:nER,bold:true,color:nE>=0?'text-green-700':'text-red-700',sep:true},
  ];
  return(
    <div className="p-6">

        <button onClick={expCSV} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-xs">⬇ CSV</button>
      </div>
      <div className="grid grid-cols-5 gap-3 mb-2">
        <Card label="Ingresos Est." value={$n(tRE)} color="indigo"/>
        <Card label="Ingresos Real" value={$n(tRA)} color="green"/>
        <Card label="Costos Prof." value={$n(tIC+tEC)} color="orange"/>
        <Card label="Participaciones" value={$n(tPC)} color="teal"/>
        <Card label="Gastos Gral." value={$n(tEE)} color="purple"/>
      </div>
      <div className="grid grid-cols-4 gap-3 mb-6">
        <Card label="Total Costos Dir." value={$n(tDC)} color="orange"/>
        <Card label="Gastos Fijos" value={$n(tGFE)} sub={'Real: '+$n(tGFR)} color="red"/>
        <Card label="Margen Bruto" value={$n(bE)} sub={pc(bM)} color={bE>=0?'blue':'red'}/>
        <Card label="Utilidad Neta" value={$n(nE)} sub={'Real: '+$n(nER)+' · '+pc(nM)} color={nE>=0?'green':'red'}/>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {[['global','🌐 Global'],['proyecto','📁 Por Proyecto'],['cliente','🏢 Por Cliente'],['depto','🏛 Por Depto.'],['flujo','💰 Flujo de Caja']].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} className={'px-4 py-1.5 rounded-lg text-xs font-medium '+(view===v?'bg-indigo-600 text-white':'bg-white border text-gray-600 hover:bg-gray-50')}>{l}</button>
        ))}
      </div>
      {view==='global'&&(
        <div className="space-y-4">
          <div className="bg-white rounded-xl border overflow-hidden">
            <div className="px-4 py-3 border-b font-semibold text-sm">Estado de Resultados — {YEAR}</div>
            <table className="w-full text-xs">
              <thead className="bg-gray-50 text-gray-400"><tr><th className="text-left px-4 py-2">Concepto</th><th className="text-right px-4 py-2">Estimado</th><th className="text-right px-4 py-2">Realizado</th><th className="text-right px-4 py-2">% s/Ing.</th></tr></thead>
              <tbody>
                {plRows.map((row,i)=>(
                  <tr key={i} className={(row.sep?'border-t-2 border-indigo-200':'border-t')+(row.bold?' bg-gray-50':'')}>
                    <td className={'px-4 py-2 '+(row.bold?'font-semibold ':'')+row.color}>{row.l}</td>
                    <td className={'px-4 py-2 text-right '+(row.bold?'font-bold ':'')+row.color}>{$n(Math.abs(row.e))}{row.e<0&&<span className="text-gray-400 ml-1">(costo)</span>}</td>
                    <td className={'px-4 py-2 text-right '+row.color}>{row.a!=null?$n(Math.abs(row.a)):'—'}</td>
                    <td className="px-4 py-2 text-right text-gray-500">{tRE>0?pc(Math.abs(row.e)/tRE*100):'—'}</td>
                  </tr>

              </tbody>
            </table>
          </div>
          <div className="grid grid-cols-3 gap-4">
            {dRows.map(d=>(
              <div key={d.id} className="bg-white rounded-xl border p-4">
                <div className="font-semibold text-sm mb-2">{d.name}</div>
                <div className="space-y-1.5 text-xs">
                  <div className="flex justify-between"><span className="text-gray-400">Ingresos</span><span>{$n(d.re)}</span></div>
                  <div className="flex justify-between"><span className="text-gray-400">Costos Dir.</span><span className="text-orange-600">{$n(d.dc)}</span></div>

                  <div className="flex justify-between border-t pt-1"><span className="font-medium">Util. Neta</span><span className={'font-bold '+(d.nr>=0?'text-green-600':'text-red-600')}>{$n(d.nr)}</span></div>

              {pRows.map(p=>(
                <tr key={p.id} className="border-t hover:bg-gray-50">

                  <td className="px-3 py-2 text-right text-orange-600">{$n(p.pl.intC)}</td>

                  <td className="px-3 py-2 text-right text-teal-600">{$n(p.pl.partE)}</td>
                  <td className="px-3 py-2 text-right font-medium">{$n(p.pl.totC)}</td>
                  <td className={'px-3 py-2 text-right font-bold '+(p.pl.res>=0?'text-blue-700':'text-red-600')}>{$n(p.pl.res)}</td>

                  {flujoMes.map((f,i)=><td key={i} className="px-2 py-2 text-right text-indigo-600">{f.ejec>0?$n(f.ejec):'—'}</td>)}
                  <td className="px-3 py-2 text-right font-bold text-indigo-700">{$n(flujoMes.reduce((s,f)=>s+f.ejec,0))}</td>
                </tr>
                <tr className="border-t">
                  <td className="px-3 py-2 font-medium text-green-700">✅ Facturado Real</td>
                  {flujoMes.map((f,i)=><td key={i} className="px-2 py-2 text-right text-green-600">{f.real>0?$n(f.real):'—'}</td>)}
                  <td className="px-3 py-2 text-right font-bold text-green-700">{$n(flujoMes.reduce((s,f)=>s+f.real,0))}</td>
                </tr>
              </tbody>
            </table>
            <div className="px-4 py-2 border-t text-gray-400 text-xs">Cobro Planificado = cuándo se espera cobrar · Ejecución Est. = cuándo se ejecuta el trabajo · Facturado Real = lo efectivamente facturado</div>
          </div>
          <div className="bg-white rounded-xl border p-4">
            <div className="font-semibold text-sm mb-3">Cobro Planificado por Proyecto</div>
            <table className="w-full text-xs">
              <thead className="bg-gray-50 text-gray-400"><tr><th className="text-left px-3 py-2">Proyecto</th><th className="text-left px-3 py-2">Cliente</th>{MO.map(m=><th key={m} className="text-right px-1 py-2">{m}</th>)}<th className="text-right px-3 py-2">Total</th></tr></thead>
              <tbody>
                {data.projects.filter(p=>data.revenues.some(r=>r.projectId===p.id&&r.cobro>0)).map(p=>{
                  const totCobro=data.revenues.filter(r=>r.projectId===p.id).reduce((s,r)=>s+(r.cobro||0),0);
                  return(
                    <tr key={p.id} className="border-t hover:bg-gray-50">
                      <td className="px-3 py-2 font-medium">{p.name}</td>
                      <td className="px-3 py-2 text-gray-500">{p.client}</td>
                      {MO.map((_,i)=>{
                        const r=data.revenues.find(rv=>rv.projectId===p.id&&rv.month===i);
                        return <td key={i} className="px-1 py-2 text-right text-teal-600">{r&&r.cobro>0?$n(r.cobro):'—'}</td>;
                      })}
                      <td className="px-3 py-2 text-right font-bold text-teal-700">{$n(totCobro)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

  const tC=data.projects.reduce((s,p)=>s+getTotDir(p.id,data),0);
  const tCobro=data.revenues.reduce((s,r)=>s+(r.cobro||0),0);
  return(
    <div className="p-6">

        <Card label="Ingresos Estimados" value={$n(tE)} color="indigo"/>

        <Card label="Costos Directos" value={$n(tC)} color="orange"/>
        <Card label="Resultado Est." value={$n(tE-tC)} color={(tE-tC)>=0?'blue':'red'}/>

function SecurityConf({cfg,setCfg}){
  const [serviceKey,setServiceKey]=useState(cfg.serviceKey||'');
  const [saved,setSaved]=useState(false);
  const [err,setErr]=useState('');

  const save=async()=>{
    setErr('');setSaved(false);
    // Quick validation: try to call admin endpoint with the key
    if(serviceKey.trim()){
      try{
        const r=await fetch(cfg.url+'/auth/v1/admin/users?page=1&per_page=1',{
          headers:{'apikey':serviceKey.trim(),'Authorization':'Bearer '+serviceKey.trim()}
        });
        if(!r.ok&&r.status===401){setErr('Clave inválida. Asegúrate de usar la Service Role Key, no la anon key.');return;}
      }catch(e){setErr('No se pudo verificar la clave: '+e.message);return;}
    }
    const newCfg={...cfg,serviceKey:serviceKey.trim()};
    setLocalCfg(newCfg);
    setCfg(newCfg);
    setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  };

  const hasSvcKey=!!(cfg.serviceKey&&cfg.serviceKey.trim());

  return(
    <div className="max-w-lg space-y-4">
      <div className="bg-white rounded-xl border p-5">
        <div className="font-semibold text-sm mb-1">🔒 Seguridad y Credenciales</div>
        <p className="text-gray-400 text-xs mb-5">Configura la Service Role Key para que el administrador pueda cambiar contraseñas de usuarios desde la ficha de cada persona.</p>

        {/* Status indicator */}
        <div className={`flex items-center gap-2 px-3 py-2 rounded-lg mb-4 text-xs font-medium ${hasSvcKey?'bg-green-50 border border-green-200 text-green-700':'bg-amber-50 border border-amber-200 text-amber-700'}`}>
          <span>{hasSvcKey?'✅':'⚠️'}</span>
          <span>{hasSvcKey?'Service Role Key configurada — cambio de contraseñas activo.':'Sin Service Role Key — el cambio de contraseñas no está disponible.'}</span>
        </div>

        <div className="space-y-3">
          <div>
            <label className="text-gray-600 text-xs font-medium mb-1 block">Service Role Key</label>
            <input
              type="password"
              value={serviceKey}
              onChange={e=>{setServiceKey(e.target.value);setSaved(false);}}
              placeholder="eyJ... (pega aquí la service_role key de Supabase)"
              className="w-full border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"
            />
          </div>

          <div className="bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-3 text-xs text-indigo-700 space-y-1">
            <div className="font-semibold mb-1">📍 ¿Dónde la encuentro?</div>
            <div>1. Entra a <b>supabase.com</b> → abre tu proyecto</div>
            <div>2. Menú lateral → <b>Settings</b> → <b>API</b></div>
            <div>3. Sección <b>"Project API keys"</b> → fila <b>service_role</b> → botón <b>Reveal</b></div>
            <div>4. Copia y pega aquí</div>
          </div>

          <div className="bg-red-50 border border-red-100 rounded-lg px-3 py-2 text-xs text-red-600">
            ⚠️ <b>Solo úsala desde el equipo del administrador.</b> Esta clave tiene acceso total a la base de datos. Nunca la compartas.
          </div>

          <button onClick={save}
            className={`w-full py-2 rounded-lg text-sm font-medium transition-colors ${saved?'bg-green-600 text-white':'bg-indigo-600 hover:bg-indigo-700 text-white'}`}>
            {saved?'✅ Guardado':'💾 Guardar Service Role Key'}
          </button>
          {hasSvcKey&&(
            <button onClick={()=>{setServiceKey('');const c={...cfg,serviceKey:''};setLocalCfg(c);setCfg(c);setSaved(false);}}
              className="w-full py-1.5 rounded-lg text-xs text-red-400 hover:text-red-600 border border-red-100 hover:bg-red-50 transition-colors">
              🗑️ Eliminar Service Role Key
            </button>
          )}
          {err&&<div className="text-red-500 text-xs bg-red-50 border border-red-200 rounded-lg px-3 py-2">{err}</div>}
        </div>
      </div>
    </div>
  );
}

function UserConf({data,save,cfg,session,currentUser}){
  const isAdmin=(currentUser&&currentUser.role)==='admin';
  // ── state ──
  const [form,setForm]=useState({name:'',initials:'',email:'',pass:'',deptId:(data.departments[0]||{}).id||'',role:'user'});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');const [ok,setOk]=useState('');
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [importPreview,setImportPreview]=useState(null); // null | array of people to import
  const [importLoading,setImportLoading]=useState(false);

  // categories elegibles para import
  const IMPORT_CATS=['pcat5','pcat6','pcat10','pcat7']; // Supervisor, Senior, Semi-Senior, Asistente

  // ── create user ──
  const create=async()=>{
    if(!form.name.trim()||!form.email.trim()||!form.pass.trim()){setErr('Completa todos los campos.');return;}
    setLoading(true);setErr('');setOk('');
    try{
      const res=await sbSignUp(cfg,form.email,form.pass);
      if(res.error){setErr(res.error.message);setLoading(false);return;}
      const user=res.user||(res.data&&res.data.user)||null;
      const authId=user&&user.id||null;
      const newUser={id:uid(),name:form.name.trim(),initials:(form.initials.trim()||autoInitials(form.name)).toUpperCase(),dept_id:form.deptId||null,role:form.role,auth_id:authId||null};
      const tok=session&&session.tok;
      const r=await fetch(cfg.url+'/rest/v1/app_users',{method:'POST',headers:{'apikey':cfg.key,'Authorization':'Bearer '+(tok||cfg.key),'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(newUser)});
      if(!r.ok){const txt=await r.text();setErr('Error al guardar: '+txt);setLoading(false);return;}
      const localUser={id:newUser.id,name:newUser.name,initials:newUser.initials,deptId:newUser.dept_id,role:newUser.role,authId:newUser.auth_id};
      save({...data,users:[...data.users,localUser]});
      setOk('✅ Usuario "'+form.name+'" creado correctamente.');
      setForm({name:'',initials:'',email:'',pass:'',deptId:(data.departments[0]||{}).id||'',role:'user'});
    }catch(e){setErr('Error: '+e.message);}
    finally{setLoading(false);}
  };

  // ── edit user ──
  const startEdit=u=>{
    setEditId(u.id);
    setEditForm({name:u.name||'',initials:u.initials||autoInitials(u.name),deptId:u.deptId||'',role:u.role||'user'});
  };
  const applyEdit=()=>{
    const updated=data.users.map(u=>u.id===editId?{...u,...editForm,name:editForm.name.trim(),initials:(editForm.initials||autoInitials(editForm.name)).toUpperCase()}:u);
    save({...data,users:updated});
    // Also persist to Supabase if connected
    const tok=session&&session.tok;
    if(cfg&&cfg.url&&tok){
      const u=updated.find(x=>x.id===editId);
      if(u) fetch(cfg.url+'/rest/v1/app_users?id=eq.'+editId,{method:'PATCH',headers:{'apikey':cfg.key,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({name:u.name,initials:u.initials,dept_id:u.deptId||null,role:u.role})}).catch(()=>{});
    }
    setEditId(null);
  };
  const deleteUser=id=>save({...data,users:data.users.filter(x=>x.id!==id)});

  // ── import from Personas ──
  const prepareImport=()=>{
    const people=data.people||[];
    const existingNames=new Set((data.users||[]).map(u=>u.name.toLowerCase().trim()));
    const candidates=people
      .filter(p=>IMPORT_CATS.includes(p.catId))
      .filter(p=>{
        const n=[p.nombres,p.apellidos].filter(Boolean).join(' ').toLowerCase().trim();
        return n&&!existingNames.has(n);
      })
      .map(p=>{
        const name=[p.nombres,p.apellidos].filter(Boolean).join(' ');
        const cat=(data.partCats||DEFAULT_PART_CATS).find(c=>c.id===p.catId);
        return{personId:p.id,name,initials:p.initials||autoInitials(name),email:p.email||'',deptId:p.deptId||'',catName:cat?cat.name:'',selected:true};
      });
    setImportPreview(candidates);
    setErr('');setOk('');
  };

  const toggleImportSelect=idx=>setImportPreview(prev=>prev.map((x,i)=>i===idx?{...x,selected:!x.selected}:x));

  const confirmImport=async()=>{
    const toImport=(importPreview||[]).filter(x=>x.selected);
    if(!toImport.length)return;
    setImportLoading(true);setErr('');
    const tok=session&&session.tok;
    const newUsers=[];
    for(const p of toImport){
      const newUser={id:uid(),name:p.name,initials:p.initials.toUpperCase(),dept_id:p.deptId||null,role:'user',auth_id:null};
      if(cfg&&cfg.url&&tok){
        try{
          await fetch(cfg.url+'/rest/v1/app_users',{method:'POST',headers:{'apikey':cfg.key,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(newUser)});
        }catch(_){}
      }
      newUsers.push({id:newUser.id,name:newUser.name,initials:newUser.initials,deptId:newUser.dept_id,role:newUser.role,authId:null});
    }
    save({...data,users:[...data.users,...newUsers]});
    setOk('✅ '+newUsers.length+' usuario'+(newUsers.length!==1?'s':'')+' importado'+(newUsers.length!==1?'s':'')+' correctamente.');
    setImportPreview(null);
    setImportLoading(false);
  };

  const displayData=data;
  return(
    <div className="max-w-2xl space-y-5">

      {/* ── User list ── */}
      <div className="bg-white rounded-xl border p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="font-semibold text-sm">👤 Usuarios del Sistema</div>
          {isAdmin&&<button onClick={prepareImport}
            className="flex items-center gap-1.5 bg-teal-50 hover:bg-teal-100 border border-teal-200 text-teal-700 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
            📥 Importar desde Personas
          </button>}
        </div>

        {/* Import preview panel */}
        {importPreview!==null&&(
          <div className="mb-4 border border-teal-200 rounded-xl bg-teal-50 p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="font-semibold text-sm text-teal-800">📥 Importar como Usuario General</div>
              <button onClick={()=>setImportPreview(null)} className="text-teal-400 hover:text-teal-600 text-lg leading-none">✕</button>
            </div>
            <p className="text-xs text-teal-600 mb-3">Supervisores, Seniors, Semi-Seniors y Asistentes que aún no tienen usuario. Selecciona los que deseas crear.</p>
            {importPreview.length===0?(
              <div className="text-xs text-teal-500 italic py-2 text-center">No hay personas nuevas para importar en esas categorías.</div>
            ):(
              <>
                <div className="space-y-1.5 mb-3 max-h-56 overflow-y-auto">
                  {importPreview.map((p,i)=>(
                    <label key={i} className={`flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer transition-colors ${p.selected?'bg-white border border-teal-300':'bg-teal-100 border border-transparent opacity-60'}`}>
                      <input type="checkbox" checked={p.selected} onChange={()=>toggleImportSelect(i)} className="accent-teal-600"/>
                      <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:'rgb(0,186,179)'}}>{p.initials||'?'}</div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-gray-800">{p.name}</div>
                        <div className="text-xs text-gray-400">{p.catName}{p.email&&' · ✉️ '+p.email}</div>
                      </div>
                      <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">Usuario General</span>
                    </label>
                  ))}
                </div>
                <div className="flex gap-2">
                  <button onClick={confirmImport} disabled={importLoading||!importPreview.some(x=>x.selected)}
                    className="flex-1 bg-teal-600 hover:bg-teal-700 text-white text-xs py-2 rounded-lg disabled:opacity-40 font-medium">
                    {importLoading?'Importando…':'✅ Confirmar Importación'}
                  </button>
                  <button onClick={()=>setImportPreview(null)} className="border text-gray-500 px-4 py-2 rounded-lg text-xs hover:bg-gray-50">Cancelar</button>
                </div>
                <p className="text-xs text-teal-500 mt-2">⚠️ Nota: se crean sin contraseña. Asigna una credencial en Supabase Auth o usa "Crear Nuevo Usuario" para los que necesiten acceso inmediato.</p>
              </>
            )}
          </div>
        )}

        {ok&&<div className="text-emerald-700 text-xs mb-3 bg-emerald-50 px-3 py-2 rounded-lg">{ok}</div>}

        <div className="space-y-2">
          {displayData.users.map(u=>{
            const dept=data.departments.find(d=>d.id===u.deptId)||{};
            const isEditing=editId===u.id;
            return(
              <div key={u.id} className={`rounded-xl border transition-all ${isEditing?'border-indigo-300 bg-indigo-50':'border-gray-100 bg-gray-50 hover:bg-gray-100'}`}>
                {isEditing?(
                  <div className="p-3">
                    <div className="grid grid-cols-2 gap-2 mb-2">
                      <div>
                        <label className="text-gray-500 text-xs mb-1 block">Nombre completo</label>
                        <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}
                          className="w-full border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                      </div>
                      <div>
                        <label className="text-gray-500 text-xs mb-1 block">Iniciales</label>
                        <div className="flex items-center gap-2">
                          <input value={editForm.initials} onChange={e=>setEditForm({...editForm,initials:e.target.value.toUpperCase().slice(0,4)})}
                            className="border rounded-lg px-3 py-1.5 text-sm w-24 focus:outline-none focus:ring-1 focus:ring-indigo-400" maxLength={4}/>
                          <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:'rgb(0,186,179)'}}>{editForm.initials||autoInitials(editForm.name)||'?'}</div>
                        </div>
                      </div>
                      <div>
                        <label className="text-gray-500 text-xs mb-1 block">Departamento</label>
                        <select value={editForm.deptId||''} onChange={e=>setEditForm({...editForm,deptId:e.target.value})}
                          className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400">
                          <option value="">— Sin asignar —</option>
                          {data.departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-gray-500 text-xs mb-1 block">Rol</label>
                        <select value={editForm.role} onChange={e=>setEditForm({...editForm,role:e.target.value})}
                          className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400">
                          {ROLES.map(r=><option key={r.value} value={r.value}>{r.label}</option>)}
                        </select>
                      </div>
                    </div>
                    <p className="text-xs text-gray-400 mb-2">✉️ El email y contraseña se gestionan directamente en Supabase Authentication.</p>
                    <div className="flex gap-2">
                      <button onClick={applyEdit} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-xs font-medium">💾 Guardar</button>
                      <button onClick={()=>setEditId(null)} className="border text-gray-500 px-3 py-1.5 rounded-lg text-xs hover:bg-gray-50">Cancelar</button>
                    </div>
                  </div>
                ):(
                  <div className="flex items-center justify-between px-3 py-2.5 text-sm">
                    <div className="flex items-center gap-2.5">
                      <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:'rgb(0,186,179)'}}>{u.initials||autoInitials(u.name)}</div>
                      <div>
                        <div className="font-medium text-gray-800">{u.name}</div>
                        {dept.name&&<div className="text-xs text-gray-400">{dept.name}</div>}
                      </div>
                      <span className={'px-1.5 py-0.5 rounded text-xs font-medium '+(ROLE_BADGE[u.role]||'bg-gray-200 text-gray-600')}>{ROLE_LABEL(u.role)}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      {isAdmin&&<button onClick={()=>startEdit(u)} className="text-indigo-400 hover:text-indigo-600 text-xs px-2 py-1 rounded hover:bg-indigo-50 transition-colors">✏️ Editar</button>}
                      {isAdmin&&<button onClick={()=>deleteUser(u.id)} className="text-red-400 hover:text-red-600 text-xs px-2 py-1 rounded hover:bg-red-50 transition-colors">✕</button>}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          {displayData.users.length===0&&<div className="text-gray-400 text-sm text-center py-6">No hay usuarios registrados.</div>}
        </div>
      </div>

      {/* ── Create new user ── */}
      {isAdmin&&<div className="bg-white rounded-xl border p-5">
        <div className="text-xs font-semibold text-gray-500 mb-3 uppercase">➕ Crear Nuevo Usuario</div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value,initials:form.initials||autoInitials(e.target.value)})} placeholder="Nombre completo" className="border rounded-lg px-3 py-2 text-sm"/>
          <div className="flex gap-2">
            <input value={form.initials} onChange={e=>setForm({...form,initials:e.target.value.toUpperCase().slice(0,4)})} placeholder="Iniciales (auto)" className="border rounded-lg px-3 py-2 text-sm w-28" maxLength={4}/>
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:'rgb(0,186,179)'}}>{form.initials||autoInitials(form.name)}</div>
          </div>
          <input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Email" className="border rounded-lg px-3 py-2 text-sm"/>
          <input type="password" value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} placeholder="Contraseña inicial" className="border rounded-lg px-3 py-2 text-sm"/>
          <select value={form.deptId} onChange={e=>setForm({...form,deptId:e.target.value})} className="border rounded-lg px-2 py-2 text-sm">
            {data.departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
          <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} className="border rounded-lg px-2 py-2 text-sm">
            {ROLES.map(r=><option key={r.value} value={r.value}>{r.label}</option>)}
          </select>
          <button onClick={create} disabled={loading} className="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm disabled:opacity-50">
            {loading?'Creando…':'+ Crear Usuario'}
          </button>
        </div>
        {err&&<div className="text-red-500 text-xs mt-2 bg-red-50 px-3 py-2 rounded-lg">{err}</div>}
        <div className="mt-3 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-700">
          💡 <b>Si aparece error de confirmación:</b> en Supabase → Authentication → Settings desactiva <b>"Enable email confirmations"</b>.
        </div>
      </div>}

    </div>
  );
}
