function ARent({data}){
  const sorted=[...data.projects].sort((a,b)=>getMargin(b.id,data)-getMargin(a.id,data));
  const tRE=data.projects.reduce((s,p)=>s+getTotRev(p.id,data,'est'),0);
  const tRA=data.projects.reduce((s,p)=>s+getTotRealCobros(p.id,data),0);
  const tIC=data.projects.reduce((s,p)=>s+MO.reduce((ss,_,m)=>ss+getIntCost(p.id,m,data),0),0);
  const tEC=data.projects.reduce((s,p)=>s+MO.reduce((ss,_,m)=>ss+getExtCost(p.id,m,data),0),0);
  const tPC=data.projects.reduce((s,p)=>s+getPartCostEst(p.id,data),0);
  const tC=tIC+tEC+tPC,tR=tRE-tC,tM=tRE>0?(tR/tRE)*100:0;
  const expCSV=()=>{
    const rows=[['Proyecto','Cliente','Estatus','Hon.Propuesto','Hon.OS','Hon.Neto','Rev.Est.','C.Int.','C.Ext.','Partic.','Total','Resultado','%']];
    sorted.forEach(p=>{
      const pl=getPL(p.id,data);
      rows.push([p.name,p.client,p.status||'',p.honorariosTotal||0,p.honorariosOS||0,(p.honorariosTotal||0)-(p.honorariosOS||0),pl.revE,pl.intC,pl.extC,pl.partE,pl.totC,pl.res,pc(pl.mg)]);
    });
    const csv=rows.map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='rentabilidad.csv';a.click();
  };
  return(
    <div className="p-6">
      <div className="flex items-center justify-between mb-5">
        <h2 className="font-bold text-base">Rentabilidad por Proyecto — {YEAR}</h2>
        <button onClick={expCSV} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">⬇ CSV</button>
      </div>
      <div className="bg-white rounded-xl border overflow-x-auto">
        <table className="w-full text-xs">
          <thead className="bg-gray-50 text-gray-500">
            <tr>
              <th className="text-left px-3 py-2">Proyecto</th><th className="text-left px-3 py-2">Cliente</th><th className="text-left px-3 py-2">Estatus</th>
              <th className="text-right px-3 py-2">Hon.Neto</th><th className="text-right px-3 py-2">Rev.Est.</th><th className="text-right px-3 py-2">C.Int.</th>
              <th className="text-right px-3 py-2">C.Ext.</th><th className="text-right px-3 py-2">Partic.</th><th className="text-right px-3 py-2">Total</th>
              <th className="text-right px-3 py-2">Resultado</th><th className="text-right px-3 py-2">Margen</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(p=>{
              const pl=getPL(p.id,data);
              const honNeto=(p.honorariosTotal||0)-(p.honorariosOS||0);
              return(
                <tr key={p.id} className="border-t hover:bg-gray-50">
                  <td className="px-3 py-2 font-medium">{p.name}</td>
                  <td className="px-3 py-2 text-gray-500">{p.client}</td>
                  <td className="px-3 py-2"><StatusBadge status={p.status}/></td>
                  <td className="px-3 py-2 text-right text-indigo-700">{honNeto>0?$n(honNeto):'—'}</td>
                  <td className="px-3 py-2 text-right">{$n(pl.revE)}</td>
                  <td className="px-3 py-2 text-right text-orange-600">{$n(pl.intC)}</td>
                  <td className="px-3 py-2 text-right text-red-500">{$n(pl.extC)}</td>
                  <td className="px-3 py-2 text-right text-teal-600">{$n(pl.partE)}</td>
                  <td className="px-3 py-2 text-right font-medium">{$n(pl.totC)}</td>
                  <td className={'px-3 py-2 text-right font-medium '+(pl.res>=0?'text-green-600':'text-red-600')}>{$n(pl.res)}</td>
                  <td className="px-3 py-2 text-right"><Mbadge m={pl.mg}/></td>
                </tr>
              );
            })}
          </tbody>
          <tfoot className="border-t-2 bg-indigo-50 font-bold text-xs">
            <tr>
              <td colSpan={4} className="px-3 py-2">TOTAL</td>
              <td className="px-3 py-2 text-right">{$n(tRE)}</td>
              <td className="px-3 py-2 text-right text-orange-600">{$n(tIC)}</td>
              <td className="px-3 py-2 text-right text-red-500">{$n(tEC)}</td>
              <td className="px-3 py-2 text-right text-teal-600">{$n(tPC)}</td>
              <td className="px-3 py-2 text-right">{$n(tC)}</td>
              <td className={'px-3 py-2 text-right '+(tR>=0?'text-green-600':'text-red-600')}>{$n(tR)}</td>
              <td className="px-3 py-2 text-right"><Mbadge m={tM}/></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

function UserArea({tab,data,save,user,currentUser}){
  const [projId,setProjId]=useState(null);
  if(projId)return <ProjDetail projId={projId} data={data} save={save} onBack={()=>setProjId(null)}/>;
  if(tab==='dashboard')return <UDash data={data} user={user} onProj={setProjId}/>;
  if(tab==='proyectos')return <UProjects data={data} save={save} user={user} onProj={setProjId}/>;
  if(tab==='gastos')return <UExpenses data={data} save={save} user={user}/>;
  if(tab==='timesheet')return <ATimeSheet data={data} save={save} currentUser={currentUser||user}/>;
  return null;
}

          </div>

            <SaveBtn onClick={savExp} label='💾 Guardar'/>

          </div>
        </div>
      )}
      <div className="bg-white rounded-xl border">
        <div className="flex items-center justify-between px-4 py-3 border-b">

            <tfoot className="border-t bg-gray-50 font-bold text-xs">

}

function ProjRev({projId,mo,data,save,readOnly}){

    setEst(rev!=null&&rev.est!=null?String(rev.est):'');

  const totCobrosReales=getTotRealCobros(projId,data);

    <div className="max-w-2xl space-y-4">

          <div className="bg-red-50 rounded-xl border border-red-200 p-3 text-xs"><div className="text-red-400 mb-1">OS / Terceros</div><div className="font-bold text-red-600">{$n(proj.honorariosOS)}</div></div>

        </div>
      )}
      {/* Ingreso real automático */}
      <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 flex items-center justify-between">
        <div>
          <div className="text-emerald-700 font-semibold text-sm">✅ Ingreso Real Acumulado (Cobros)</div>
          <div className="text-emerald-500 text-xs mt-0.5">Suma automática de todos los cobros reales registrados en este proyecto</div>
        </div>
        <div className="text-emerald-700 font-bold text-xl">{$n(totCobrosReales)}</div>
      </div>
      <div className="bg-white rounded-xl border p-5">
        <div className="font-semibold mb-3 text-sm">Ingresos y Cobro Planificado — {MO[mo]}</div>
        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Ingreso Estimado (ejecución)</label>
            <input type="number" value={est} onChange={e=>setEst(e.target.value)} onKeyDown={e=>e.key==='Enter'&&savRev()} placeholder="0" className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div>
            <label className="text-teal-600 text-xs mb-1 block font-medium">💰 Cobro Planificado (flujo caja)</label>
            <input type="number" value={cobro} onChange={e=>setCobro(e.target.value)} onKeyDown={e=>e.key==='Enter'&&savRev()} placeholder="0" className="w-full border-2 border-teal-300 rounded-lg px-3 py-2 text-sm"/>

        </div>

          <SaveBtn onClick={savRev} label={rev?'💾 Actualizar':'💾 Guardar'} disabled={!est&&!cobro}/>
          <span className="text-xs text-gray-400">Los cobros reales se registran en la pestaña <b>💰 Cobros Reales</b></span>
        </div>
      </div>
      <div className="bg-white rounded-xl border p-4">
        <div className="flex items-center justify-between mb-2">

          {honNeto>0&&<div className="text-xs text-gray-500">Cobro plan.: <b className={totCobro>honNeto?'text-red-600':'text-teal-600'}>{$n(totCobro)}</b> / {$n(honNeto)} | Cobrado real: <b className="text-emerald-600">{$n(totCobrosReales)}</b></div>}
        </div>
        <div className="overflow-x-auto"><div className="grid grid-cols-8 gap-1 min-w-max">
          {MO.map(function(m,i){
            const r=data.revenues.find(rv=>rv.projectId===projId&&rv.month===i);
            return(
              <div key={i} className={'text-center p-1.5 rounded text-xs border '+(i===mo?'bg-indigo-50 border-indigo-300':'border-transparent')}>
                <div className="text-gray-500 font-medium">{MO[i]}</div>

                {r&&r.cobro>0&&<div className="text-teal-600 font-medium">{$n(r.cobro)}</div>}

        <div className="flex gap-4 mt-2 text-xs text-gray-400">
          <span><span className="text-indigo-600">●</span> Ingr. estimado</span>
          <span><span className="text-teal-600">●</span> Cobro planificado</span>

  const [showBulk,setShowBulk]=useState(false);
  // bulk state: {catId -> {checked, pct}}
  const initBulk=()=>{
    const m={};
    cats.forEach(c=>{
      const existing=parts.find(p=>p.catId===c.id);
      m[c.id]={checked:!!existing,pct:existing?String(existing.pct):String(c.defaultPct)};
    });
    return m;
  };
  const [bulk,setBulk]=useState(initBulk);
  const selObj=cats.find(c=>c.id===selCat);
  const pE=revE*(parseFloat(pct)||0)/100,pA=revA*(parseFloat(pct)||0)/100;
  const add=()=>{
    if(!selCat||!pct)return;
    const ex=parts.find(p=>p.catId===selCat);
    const upd=ex?(data.participations||[]).map(p=>p.id===ex.id?{...p,pct:parseFloat(pct)||0}:p):[...(data.participations||[]),{id:uid(),projectId:projId,catId:selCat,pct:parseFloat(pct)||0}];
    save({...data,participations:upd});setPct('');
  };
  const applyBulk=()=>{
    // Keep non-project participations intact, rebuild this project's ones
    const otherParts=(data.participations||[]).filter(p=>p.projectId!==projId);
    const newProjParts=[];
    cats.forEach(c=>{
      const b=bulk[c.id];
      if(b&&b.checked&&parseFloat(b.pct)>0){
        const existing=parts.find(p=>p.catId===c.id);
        newProjParts.push({
          id:existing?existing.id:uid(), // reuse existing ID to avoid unique constraint conflicts
          projectId:projId,
          catId:c.id,
          pct:parseFloat(b.pct)||0
        });
      }
    });
    save({...data,participations:[...otherParts,...newProjParts]});
    setShowBulk(false);
  };
  const del=id=>save({...data,participations:(data.participations||[]).filter(p=>p.id!==id)});
  const tE=parts.reduce((s,p)=>s+(p.pct/100)*revE,0);
  const tA=parts.reduce((s,p)=>s+(p.pct/100)*revA,0);
  const tP=parts.reduce((s,p)=>s+p.pct,0);
  const bulkTotal=Object.values(bulk).reduce((s,b)=>s+(b.checked?parseFloat(b.pct)||0:0),0);
  return(
    <div className="bg-white rounded-xl border p-5 max-w-2xl">
      <div className="font-semibold mb-1 text-sm">🏆 Participaciones del Proyecto</div>
      {revE===0&&<div className="bg-yellow-50 border border-yellow-200 text-yellow-700 text-xs rounded-lg px-4 py-2 mb-4">⚠️ Sin ingresos estimados aún. Define ingresos primero.</div>}
      <div className="flex gap-3 mb-4 text-xs flex-wrap">
        <div className="px-3 py-2 bg-indigo-50 rounded-lg">Rev. Est. <b className="text-indigo-700">{$n(revE)}</b></div>
        <div className="px-3 py-2 bg-green-50 rounded-lg">Rev. Real <b className="text-green-700">{$n(revA)}</b></div>
        <div className="px-3 py-2 bg-teal-50 rounded-lg">% Total <b className={tP>100?'text-red-600':'text-teal-700'}>{tP.toFixed(2)}%</b></div>
        <button onClick={()=>{setBulk(initBulk());setShowBulk(!showBulk);}}
          className="ml-auto bg-teal-50 hover:bg-teal-100 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-lg font-medium">
          📋 {showBulk?'Cerrar panel':'Cargar categorías en bloque'}
        </button>
      </div>

      {/* ── Panel de carga en bloque ── */}
      {showBulk&&(
        <div className="border border-teal-200 rounded-xl p-4 mb-5 bg-teal-50">
          <div className="font-semibold text-sm mb-1 text-teal-800">Selecciona las categorías a incorporar</div>
          <p className="text-teal-600 text-xs mb-3">Marca las que quieras agregar y ajusta el % si es necesario. Al aplicar se reemplazarán todas las participaciones actuales del proyecto.</p>
          <div className="space-y-2 mb-3">
            {cats.map(c=>{
              const b=bulk[c.id]||{checked:false,pct:String(c.defaultPct)};
              const monto=revE*(parseFloat(b.pct)||0)/100;
              return(
                <div key={c.id} className={'flex items-center gap-3 px-3 py-2 rounded-lg border '+(b.checked?'bg-white border-teal-300':'bg-gray-50 border-gray-200')}>
                  <input type="checkbox" checked={b.checked} onChange={e=>setBulk({...bulk,[c.id]:{...b,checked:e.target.checked}})}
                    className="rounded w-4 h-4 accent-teal-600 cursor-pointer"/>
                  <span className={'flex-1 text-sm '+(b.checked?'font-medium text-gray-800':'text-gray-500')}>{c.name}</span>
                  <input type="number" value={b.pct} step="0.5" min="0" max="100"
                    onChange={e=>setBulk({...bulk,[c.id]:{...b,pct:e.target.value}})}
                    className={'w-20 border rounded-lg px-2 py-1 text-right text-xs '+(b.checked?'border-teal-300 bg-white':'border-gray-200 bg-gray-100 text-gray-400')}
                    disabled={!b.checked}/>
                  <span className="text-gray-400 text-xs w-4">%</span>
                  {b.checked&&revE>0&&<span className="text-teal-600 text-xs w-20 text-right font-medium">{$n(monto)}</span>}
                </div>
              );
            })}
          </div>
          <div className="flex items-center justify-between">
            <div className="text-xs">
              <span className="text-gray-500">Total seleccionado: </span>
              <b className={bulkTotal>100?'text-red-600':'text-teal-700'}>{bulkTotal.toFixed(2)}%</b>
              {bulkTotal>100&&<span className="text-red-500 ml-2">⚠️ Supera el 100%</span>}
            </div>
            <div className="flex gap-2 items-center">
              <button onClick={()=>setShowBulk(false)} className="border text-gray-600 px-4 py-1.5 rounded-lg text-sm">Cancelar</button>
              <SaveBtn onClick={applyBulk} label='💾 Guardar participaciones' color='teal'/>
              <span className="text-xs text-gray-400">Reemplaza todas las participaciones actuales del proyecto</span>
            </div>
          </div>
        </div>
      )}

      {/* ── Agregar una categoría individual ── */}
      <div className="flex gap-2 mb-4 flex-wrap items-end">
        <div className="flex-1 min-w-44">
          <label className="text-gray-400 text-xs mb-1 block">Agregar categoría individual</label>
          <select value={selCat} onChange={e=>{setSelCat(e.target.value);const c=cats.find(x=>x.id===e.target.value);if(c)setPct(String(c.defaultPct));}} className="w-full border rounded-lg px-3 py-2 text-sm">
            {cats.map(c=><option key={c.id} value={c.id}>{c.name} ({c.defaultPct}%)</option>)}
          </select>
        </div>
        <div>
          <label className="text-gray-400 text-xs mb-1 block">%</label>
          <input type="number" value={pct} onChange={e=>setPct(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder={(selObj&&selObj.defaultPct)||'0'} step="0.5" className="w-24 border rounded-lg px-3 py-2 text-sm"/>
        </div>
        {parseFloat(pct)>0&&revE>0&&(
          <div className="text-xs text-teal-600 pb-2">
            <div>Est: <b>{$n(pE)}</b></div>
            {revA>0&&<div>Real: <b>{$n(pA)}</b></div>}
          </div>
        )}
        <SaveBtn onClick={add} label='💾 Asignar' disabled={!pct} color='teal'/>
      </div>
      {parts.length>0?(
        <table className="w-full text-xs">
          <thead className="bg-gray-50 text-gray-400"><tr><th className="text-left px-3 py-2">Categoría</th><th className="text-right px-3 py-2">%</th><th className="text-right px-3 py-2">Monto Est.</th><th className="text-right px-3 py-2">Monto Real</th><th></th></tr></thead>
          <tbody>
            {parts.map(p=>{
              const cat=cats.find(c=>c.id===p.catId);
              const mE=(p.pct/100)*revE,mA=(p.pct/100)*revA;
              return(
                <tr key={p.id} className="border-t hover:bg-gray-50">
                  <td className="px-3 py-2 font-medium">{cat?cat.name:p.catId}</td>
                  <td className="px-3 py-2 text-right"><span className="px-2 py-0.5 bg-teal-100 text-teal-700 rounded-full font-bold">{p.pct}%</span></td>
                  <td className="px-3 py-2 text-right text-teal-600 font-medium">{$n(mE)}</td>
                  <td className="px-3 py-2 text-right text-teal-400">{revA>0?$n(mA):'—'}</td>
                  <td className="px-3 py-2 text-right"><button onClick={()=>del(p.id)} className="text-red-400">✕</button></td>
                </tr>
              );
            })}
          </tbody>
          <tfoot className="border-t-2 bg-teal-50 font-bold text-xs">
            <tr>
              <td className="px-3 py-2">TOTAL</td>
              <td className="px-3 py-2 text-right text-teal-700">{tP.toFixed(2)}%</td>
              <td className="px-3 py-2 text-right text-teal-600">{$n(tE)}</td>
              <td className="px-3 py-2 text-right text-teal-400">{revA>0?$n(tA):'—'}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      ):<p className="text-gray-400 text-xs text-center py-6">Sin participaciones asignadas.</p>}
    </div>
  );
}

/* ── GASTOS DEPARTAMENTO (desde detalle proyecto) ── */
function ProjExpenses({projId,deptId,mo,data,save,readOnly}){
  if(readOnly)return(<div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl p-6 text-center text-gray-400 text-xs">🔒 Proyecto cerrado — solo lectura. Reábrelo para editar.</div>);
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({category:ECATS[0],est:'',act:''});
  const mine=data.expenses.filter(e=>e.deptId===deptId&&e.month===mo);
  const savExp=()=>{
    if(!form.est)return;
    const ex=mine.find(e=>e.category===form.category);
    const upd=ex?data.expenses.map(e=>e.id===ex.id?{...e,est:parseFloat(form.est)||0,act:parseFloat(form.act)||0}:e):[...data.expenses,{id:uid(),deptId,category:form.category,month:mo,est:parseFloat(form.est)||0,act:parseFloat(form.act)||0}];
    save({...data,expenses:upd});setForm({category:ECATS[0],est:'',act:''});setShow(false);
  };
  const tE=mine.reduce((s,e)=>s+e.est,0),tA=mine.reduce((s,e)=>s+e.act,0);
  return(
    <div className="bg-white rounded-xl border p-5 max-w-xl">
      <div className="font-semibold mb-1 text-sm">💸 Gastos del Departamento — {MO[mo]}</div>
      <p className="text-gray-400 text-xs mb-4">Gastos generales del departamento para este mes.</p>
      {show&&(
        <div className="border rounded-xl p-4 mb-4 bg-gray-50">
          <div className="grid grid-cols-3 gap-3 mb-3">
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} className="border rounded-lg px-3 py-2 text-sm">
              {ECATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <input type="number" value={form.est} onChange={e=>setForm({...form,est:e.target.value})} placeholder="Estimado USD" className="border rounded-lg px-3 py-2 text-sm"/>
            <input type="number" value={form.act} onChange={e=>setForm({...form,act:e.target.value})} placeholder="Real USD" className="border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div className="flex gap-2">
            <button onClick={savExp} className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm">Guardar</button>
            <button onClick={()=>setShow(false)} className="border text-gray-600 px-4 py-1.5 rounded-lg text-sm">Cancelar</button>
          </div>
        </div>
      )}
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs text-gray-500">Gastos registrados en {MO[mo]}</span>
        <button onClick={()=>{setForm({category:ECATS[0],est:'',act:''});setShow(true);}} className="bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs">+ Agregar</button>
      </div>
      {mine.length===0
        ?<p className="text-gray-400 text-xs text-center py-4">Sin gastos registrados en {MO[mo]}.</p>
        :<table className="w-full text-xs">
          <thead className="bg-gray-50 text-gray-400"><tr><th className="text-left px-3 py-2">Categoría</th><th className="text-right px-3 py-2">Estimado</th><th className="text-right px-3 py-2">Real</th><th className="text-right px-3 py-2">Variación</th><th></th></tr></thead>
          <tbody>
            {mine.map(e=>{
              const diff=e.act-e.est;
              return(
                <tr key={e.id} className="border-t hover:bg-gray-50">
                  <td className="px-3 py-2">{e.category}</td>
                  <td className="px-3 py-2 text-right">{$n(e.est)}</td>
                  <td className="px-3 py-2 text-right">{$n(e.act)}</td>
                  <td className={'px-3 py-2 text-right '+(diff>0?'text-red-500':diff<0?'text-green-600':'text-gray-400')}>{diff>=0?'+':''}{$n(diff)}</td>
                  <td className="px-3 py-2 text-right">
                    <button onClick={()=>{setForm({category:e.category,est:String(e.est),act:String(e.act)});setShow(true);}} className="text-indigo-400 mr-2">✏️</button>
                    <button onClick={()=>save({...data,expenses:data.expenses.filter(x=>x.id!==e.id)})} className="text-red-400">✕</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot className="border-t bg-gray-50 font-bold text-xs">
            <tr>
              <td className="px-3 py-2">Total</td>
              <td className="px-3 py-2 text-right">{$n(tE)}</td>
              <td className="px-3 py-2 text-right">{$n(tA)}</td>
              <td className={'px-3 py-2 text-right '+((tA-tE)>0?'text-red-500':'text-green-600')}>{$n(tA-tE)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      }
    </div>
  );
}


/* ══════════════════════════ REAL: INTERNOS ══════════════════════════════ */
function ProjRealInt({projId,mo,data,save,readOnly}){
  if(readOnly)return(<div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl p-6 text-center text-gray-400 text-xs">🔒 Proyecto cerrado — solo lectura. Reábrelo para editar.</div>);
  const [form,setForm]=useState({level:LEVELS[0],hours:''});
  const costs=(data.realInternalCosts||[]).filter(c=>c.projectId===projId&&c.month===mo);
  const tot=costs.reduce((s,c)=>s+c.hours*(data.rates[c.level]||0),0);
  const prev=form.hours?(parseFloat(form.hours)||0)*(data.rates[form.level]||0):0;
  const add=()=>{
    if(!form.hours)return;
    const ex=costs.find(c=>c.level===form.level);
    const all=data.realInternalCosts||[];
    const upd=ex?all.map(c=>c.id===ex.id?{...c,hours:parseFloat(form.hours)||0}:c):[...all,{id:uid(),projectId:projId,month:mo,level:form.level,hours:parseFloat(form.hours)||0}];
    save({...data,realInternalCosts:upd});setForm({level:LEVELS[0],hours:''});
  };
  // compare with budget
  const budCosts=data.internalCosts.filter(c=>c.projectId===projId&&c.month===mo);
  const budTot=budCosts.reduce((s,c)=>s+c.hours*(data.rates[c.level]||0),0);
  return(
    <div className="bg-white rounded-xl border p-5 max-w-xl">
      <div className="flex items-center gap-2 mb-1">
        <div className="font-semibold text-sm">✅ Costos Internos Reales — {MO[mo]}</div>
        {budTot>0&&<span className="text-xs text-gray-400">Presupuesto: <b className="text-orange-600">{$n(budTot)}</b></span>}
      </div>
      <p className="text-gray-400 text-xs mb-4">Ingresa las horas efectivamente trabajadas por cada nivel en este mes.</p>
      <div className="flex gap-2 mb-4 flex-wrap items-end">
        <div className="flex-1 min-w-36">
          <label className="text-gray-400 text-xs mb-1 block">Nivel</label>
          <select value={form.level} onChange={e=>setForm({...form,level:e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm">
            {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
          </select>
        </div>
        <div>
          <label className="text-gray-400 text-xs mb-1 block">Horas reales</label>
          <input type="number" value={form.hours} onChange={e=>setForm({...form,hours:e.target.value})} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="0" className="w-24 border-2 border-emerald-300 rounded-lg px-3 py-2 text-sm"/>
        </div>
        <div className="text-xs text-gray-400 pb-2">
          <div>${data.rates[form.level]||0}/hr</div>
          {prev>0&&<div className="text-emerald-600">Sub: {$n(prev)}</div>}
        </div>
        <SaveBtn onClick={add} label='💾 Registrar' disabled={!form.hours} color='emerald'/>
      </div>
      {costs.length>0?(
        <table className="w-full text-xs">
          <thead className="bg-gray-50 text-gray-400"><tr><th className="text-left px-3 py-2">Nivel</th><th className="text-right px-3 py-2">$/hr</th><th className="text-right px-3 py-2">Horas</th><th className="text-right px-3 py-2">Costo Real</th><th className="text-right px-3 py-2">vs Ppto.</th><th></th></tr></thead>
          <tbody>
            {costs.map(c=>{
              const costReal=c.hours*(data.rates[c.level]||0);
              const budC=budCosts.find(b=>b.level===c.level);
              const costBud=budC?budC.hours*(data.rates[c.level]||0):0;
              const diff=costReal-costBud;
              return(
                <tr key={c.id} className="border-t hover:bg-gray-50">
                  <td className="px-3 py-2 font-medium">{c.level}</td>
                  <td className="px-3 py-2 text-right">${data.rates[c.level]||0}</td>
                  <td className="px-3 py-2 text-right">{c.hours}</td>
                  <td className="px-3 py-2 text-right text-emerald-600 font-medium">{$n(costReal)}</td>
                  <td className={'px-3 py-2 text-right text-xs '+(costBud>0?(diff>0?'text-red-500':'text-green-600'):'text-gray-400')}>{costBud>0?(diff>=0?'+':'')+$n(diff):'—'}</td>
                  <td className="px-3 py-2 text-right"><button onClick={()=>save({...data,realInternalCosts:(data.realInternalCosts||[]).filter(x=>x.id!==c.id)})} className="text-red-400">✕</button></td>
                </tr>
              );
            })}
          </tbody>
          <tfoot className="border-t bg-emerald-50 font-bold text-xs">
            <tr>
              <td colSpan={3} className="px-3 py-2">Total Real</td>
              <td className="px-3 py-2 text-right text-emerald-600">{$n(tot)}</td>
              <td className={'px-3 py-2 text-right '+(tot-budTot>0?'text-red-500':'text-green-600')}>{budTot>0?(tot-budTot>=0?'+':'')+$n(tot-budTot):'—'}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      ):<p className="text-gray-400 text-xs text-center py-4">Sin registros reales en {MO[mo]}.</p>}
    </div>
  );
}

/* ══════════════════════════ REAL: EXTERNOS ══════════════════════════════ */
function ProjRealExt({projId,mo,data,save,readOnly}){
  if(readOnly)return(<div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl p-6 text-center text-gray-400 text-xs">🔒 Proyecto cerrado — solo lectura. Reábrelo para editar.</div>);
  const emptyForm={name:'',fecha:'',amount:''};
  const [form,setForm]=useState(emptyForm);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});

  // All payments for this project (not filtered by month — shown together)
  const allPagos=(data.realExternalCosts||[]).filter(c=>c.projectId===projId);
  // Month-specific for the monthly view
  const monthPagos=allPagos.filter(c=>c.month===mo);
  const totMonth=monthPagos.reduce((s,c)=>s+c.amount,0);
  const totAll=allPagos.reduce((s,c)=>s+c.amount,0);

  // Budget total for comparison
  const budTot=(data.externalCosts||[]).filter(c=>c.projectId===projId&&c.month===mo)
    .reduce((s,c)=>s+(c.type==='fixed'?c.amount:c.rate*c.hours),0);
  const budTotAll=(data.externalCosts||[]).filter(c=>c.projectId===projId)
    .reduce((s,c)=>s+(c.type==='fixed'?c.amount:c.rate*c.hours),0);

  const add=()=>{
    const amt=parseFloat(form.amount)||0;
    if(!form.name.trim()||amt<=0)return;
    save({...data,realExternalCosts:[...allPagos,
      {id:uid(),projectId:projId,month:mo,name:form.name.trim(),fecha:form.fecha||'',amount:amt,
       type:'fixed',rate:0,hours:0}
    ]});
    setForm(emptyForm);
  };
  const del=id=>save({...data,realExternalCosts:(data.realExternalCosts||[]).filter(x=>x.id!==id)});
  const startEdit=c=>{setEditId(c.id);setEditForm({name:c.name,fecha:c.fecha||'',amount:String(c.amount||0)});};
  const applyEdit=()=>{
    save({...data,realExternalCosts:(data.realExternalCosts||[]).map(c=>c.id===editId?{...c,name:editForm.name.trim(),fecha:editForm.fecha||'',amount:parseFloat(editForm.amount)||0}:c)});
    setEditId(null);
  };

  return(
    <div className="bg-white rounded-xl border p-5 max-w-2xl space-y-4">
      {/* Header */}
      <div className="flex items-center gap-3 flex-wrap">
        <div className="font-semibold text-sm">✅ Pagos a Externos — {MO[mo]}</div>
        {budTot>0&&<span className="text-xs text-gray-400">Presupuesto mes: <b className="text-red-500">{$n(budTot)}</b></span>}
        {budTotAll>0&&<span className="text-xs text-gray-400">Presupuesto total: <b className="text-red-400">{$n(budTotAll)}</b></span>}
      </div>

      {/* Form */}
      <div className="bg-gray-50 rounded-xl p-4 border">
        <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Registrar Pago</div>
        <div className="grid grid-cols-3 gap-3 mb-3">
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Proveedor</label>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
              placeholder="Nombre del proveedor" onKeyDown={e=>e.key==='Enter'&&add()}
              className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">📅 Fecha del pago</label>
            <input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}
              className="w-full border-2 border-emerald-300 rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Monto (USD)</label>
            <input type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}
              onKeyDown={e=>e.key==='Enter'&&add()} placeholder="0"
              className="w-full border-2 border-emerald-300 rounded-lg px-3 py-2 text-sm"/>
          </div>
        </div>
        <SaveBtn onClick={add} label='💾 Registrar Pago' disabled={!form.name.trim()||(parseFloat(form.amount)||0)<=0} color='emerald'/>
      </div>

      {/* Payments this month */}
      {monthPagos.length>0&&(
        <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Pagos en {MO[mo]}</div>
          <table className="w-full text-xs">
            <thead className="bg-gray-50 text-gray-400">
              <tr>
                <th className="text-left px-3 py-2">Proveedor</th>
                <th className="text-left px-3 py-2">Fecha</th>
                <th className="text-right px-3 py-2 text-emerald-600">Monto</th>
                <th className="w-16"></th>
              </tr>
            </thead>
            <tbody>
              {monthPagos.sort((a,b)=>a.fecha>b.fecha?1:-1).map(c=>(
                <tr key={c.id} className="border-t hover:bg-gray-50">
                  {editId===c.id?(
                    <>
                      <td className="px-3 py-2"><input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} className="border rounded px-2 py-1 text-xs w-full"/></td>
                      <td className="px-3 py-2"><input type="date" value={editForm.fecha} onChange={e=>setEditForm({...editForm,fecha:e.target.value})} className="border rounded px-2 py-1 text-xs w-36"/></td>
                      <td className="px-3 py-2 text-right"><input type="number" value={editForm.amount} onChange={e=>setEditForm({...editForm,amount:e.target.value})} className="border-2 border-emerald-300 rounded px-2 py-1 text-xs w-28 text-right"/></td>
                      <td className="px-3 py-2 text-right whitespace-nowrap">
                        <button onClick={applyEdit} className="text-green-600 font-bold mr-1">✓</button>
                        <button onClick={()=>setEditId(null)} className="text-gray-400">✕</button>
                      </td>
                    </>
                  ):(
                    <>
                      <td className="px-3 py-2 font-medium text-gray-700">{c.name}</td>
                      <td className="px-3 py-2 text-gray-500">{c.fecha||'—'}</td>
                      <td className="px-3 py-2 text-right text-emerald-600 font-medium">{$n(c.amount)}</td>
                      <td className="px-3 py-2 text-right whitespace-nowrap">
                        <button onClick={()=>startEdit(c)} className="text-indigo-400 mr-2">✏️</button>
                        <button onClick={()=>del(c.id)} className="text-red-400">✕</button>
                      </td>
                    </>
                  )}
                </tr>
              ))}
            </tbody>
            <tfoot className="border-t-2 bg-emerald-50 font-bold text-xs">
              <tr>
                <td colSpan={2} className="px-3 py-2">Total {MO[mo]}</td>
                <td className="px-3 py-2 text-right text-emerald-700">{$n(totMonth)}</td>
                <td className={'px-3 py-2 text-right '+(totMonth-budTot>0?'text-red-500':'text-green-600')}>
                  {budTot>0?(totMonth-budTot>=0?'▲ ':'▼ ')+$n(Math.abs(totMonth-budTot)):''}
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}
      {monthPagos.length===0&&<p className="text-gray-400 text-xs text-center py-3">Sin pagos a externos en {MO[mo]}.</p>}

      {/* Acumulado total del proyecto */}
      {allPagos.length>0&&(
        <div className="bg-indigo-50 rounded-xl p-3 text-xs flex items-center justify-between">
          <span className="text-indigo-600 font-medium">Total acumulado del proyecto</span>
          <div className="flex gap-6 items-center">
            <span className="text-emerald-700 font-bold text-sm">{$n(totAll)}</span>
            {budTotAll>0&&<span className={'font-medium '+(totAll-budTotAll>0?'text-red-500':'text-green-600')}>
              vs Ppto: {totAll-budTotAll>=0?'+':''}{$n(totAll-budTotAll)}
            </span>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════ REAL: PARTICIPACIONES (Causadas / Pagadas) ═════ */
/* ══════════════════════ REAL: PARTICIPACIONES ══════════════════════════
   Lógica:
   • Causadas  = pct% × cobros reales acumulados (automático)
   • Pagadas   = monto manual ingresado por persona con fecha
   • Saldo     = Causadas − Pagadas
   ═══════════════════════════════════════════════════════════════════════ */
/* ══════════════════════ REAL: PARTICIPACIONES ══════════════════════════ */
function ProjRealPart({projId,data,save,readOnly}){
  if(readOnly)return(<div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl p-6 text-center text-gray-400 text-xs">🔒 Proyecto cerrado — solo lectura. Reábrelo para editar.</div>);
  const cats=data.partCats||DEFAULT_PART_CATS;
  const people=data.people||[];
  const realParts=(data.realParticipations||[]).filter(p=>p.projectId===projId);
  const allPagos=(data.pagosParticipaciones||[]).filter(p=>p.projectId===projId);

  const [view,setView]=useState('resumen');
  const [filterCat,setFilterCat]=useState('');
  // Form: asignar persona
  const [selPerson,setSelPerson]=useState('');
  const [pctVal,setPctVal]=useState('');
  // Form: nuevo pago
  const [pagoPersonId,setPagoPersonId]=useState('');
  const [pagoAmount,setPagoAmount]=useState('');
  const [pagoFecha,setPagoFecha]=useState('');
  const [pagoNotes,setPagoNotes]=useState('');
  const [pagoTasaCambio,setPagoTasaCambio]=useState('');
  // Edit pago individual
  const [editPagoId,setEditPagoId]=useState(null);
  const [editPagoForm,setEditPagoForm]=useState({});
  // Edit persona (pct)
  const [editRpId,setEditRpId]=useState(null);
  const [editRpPct,setEditRpPct]=useState('');
  const [editCobro,setEditCobro]=useState(null);
  const [editCobroForm,setEditCobroForm]=useState({pagosTerceros:'',otrosDescuentos:''});

  const totCobrosReales=getTotRealCobros(projId,data);   // ingreso real bruto
  const totBase=getTotBaseCalculo(projId,data);            // base neta = facturas - descuentos
  const cobros=(data.realCobros||[]).filter(c=>c.projectId===projId);
  const budPart=getPartCostEst(projId,data);
  const causadasDe=rp=>(rp.pct/100)*totBase;              // causadas sobre base neta
  const pagosDePersona=personId=>allPagos.filter(p=>p.personId===personId);
  const totPagadoPersona=personId=>pagosDePersona(personId).reduce((s,p)=>s+p.amount,0);
  const totCausadas=realParts.reduce((s,p)=>s+causadasDe(p),0);
  const totPagadas=allPagos.reduce((s,p)=>s+p.amount,0);
  const totSaldo=totCausadas-totPagadas;

  const filteredPeople=filterCat?people.filter(p=>p.catId===filterCat):people;

  const handleSelectPerson=pid=>{
    setSelPerson(pid);
    if(!pid){setPctVal('');return;}
    const person=people.find(p=>p.id===pid);
    const budPct=(data.participations||[]).find(bp=>bp.projectId===projId&&bp.catId===(person&&person.catId));
    if(budPct){setPctVal(String(budPct.pct));return;}
    const cat=cats.find(c=>c.id===(person&&person.catId));
    setPctVal(cat?String(cat.defaultPct):'');
  };

  // Asignar/actualizar persona con %
  const addPersona=()=>{
    if(!selPerson||!pctVal)return;
    const existing=realParts.find(p=>p.personId===selPerson);
    const all=data.realParticipations||[];
    let newParts;
    if(existing){
      newParts=all.map(p=>p.id===existing.id?{...p,pct:parseFloat(pctVal)||p.pct}:p);
    }else{
      newParts=[...all,{id:uid(),projectId:projId,personId:selPerson,pct:parseFloat(pctVal)||0,pagadas:0,fechaPagadas:'',notes:''}];
    }
    save({...data,realParticipations:newParts});
    setSelPerson('');setPctVal('');
  };

  // Registrar pago individual
  const addPago=()=>{
    const amt=parseFloat(pagoAmount)||0;
    const tasa=parseFloat(pagoTasaCambio)||0;
    if(!pagoPersonId||amt<=0)return;
    const newPago={id:uid(),projectId:projId,personId:pagoPersonId,amount:amt,tasaCambio:tasa,fecha:pagoFecha||'',notes:pagoNotes.trim()};
    save({...data,pagosParticipaciones:[...allPagos,newPago]});
    setPagoAmount('');setPagoTasaCambio('');setPagoFecha('');setPagoNotes('');
  };

  // Editar pago individual
  const startEditPago=p=>{setEditPagoId(p.id);setEditPagoForm({amount:String(p.amount),tasaCambio:String(p.tasaCambio||''),fecha:p.fecha||'',notes:p.notes||''});};
  const applyEditPago=()=>{
    const updated=(data.pagosParticipaciones||[]).map(p=>p.id===editPagoId?{...p,amount:parseFloat(editPagoForm.amount)||0,tasaCambio:parseFloat(editPagoForm.tasaCambio)||0,fecha:editPagoForm.fecha||'',notes:editPagoForm.notes}:p);
    save({...data,pagosParticipaciones:updated});
    setEditPagoId(null);
  };
  const delPago=id=>save({...data,pagosParticipaciones:(data.pagosParticipaciones||[]).filter(p=>p.id!==id)});

  // Eliminar persona del proyecto
  const delPersona=id=>{
    save({...data,
      realParticipations:(data.realParticipations||[]).filter(p=>p.id!==id),
      pagosParticipaciones:(data.pagosParticipaciones||[]).filter(p=>!(p.projectId===projId&&p.personId===(realParts.find(r=>r.id===id)||{}).personId))
    });
  };

  // Editar % de persona
  const applyEditRp=()=>{
    save({...data,realParticipations:(data.realParticipations||[]).map(p=>p.id===editRpId?{...p,pct:parseFloat(editRpPct)||p.pct}:p)});
    setEditRpId(null);
  };

  const SaldoBadge=({c,p})=>{
    const s=c-p;
    if(Math.abs(s)<0.5)return <span className="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-bold">✓ Saldado</span>;
    if(s>0)return <span className="px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full text-xs font-bold">{$n(s)} pendiente</span>;
    return <span className="px-2 py-0.5 bg-orange-100 text-orange-700 rounded-full text-xs font-bold">Exceso {$n(Math.abs(s))}</span>;
  };

  return(
    <div className="space-y-4 max-w-4xl">
      {/* Info model */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 text-xs text-blue-700">
        <b>Modelo:</b> Causadas = <b>pct% × cobros reales</b> acumulados. Pagadas = suma de pagos individuales registrados por persona.
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-5 gap-3">
        <div className="bg-indigo-50 rounded-xl border border-indigo-200 p-3 text-xs"><div className="text-indigo-400 mb-0.5">Presupuestadas</div><div className="font-bold text-indigo-700">{$n(budPart)}</div></div>
        <div className="bg-blue-50 rounded-xl border border-blue-200 p-3 text-xs">
          <div className="text-blue-400 mb-0.5">Facturas (bruto)</div>
          <div className="font-bold text-blue-700">{$n(totCobrosReales)}</div>
          {cobros.some(c=>(c.pagosTerceros||0)+(c.otrosDescuentos||0)>0)&&<div className="text-red-400 text-xs">- {$n(cobros.reduce((s,c)=>s+(c.pagosTerceros||0)+(c.otrosDescuentos||0),0))} desc.</div>}
        </div>
        <div className="bg-red-50 rounded-xl border border-red-200 p-3 text-xs">
          <div className="text-red-500 mb-0.5 font-semibold">Costo de Terceros</div>
          <div className="font-bold text-red-700">{$n(cobros.reduce((s,c)=>s+(c.pagosTerceros||0),0))}</div>
          <div className="text-red-300 text-xs mt-0.5">pagos a descontar</div>
        </div>
        <div className="bg-teal-50 rounded-xl border border-teal-200 p-3 text-xs">
          <div className="text-teal-600 mb-0.5 font-semibold">Base Cálculo</div>
          <div className="font-bold text-teal-700">{$n(totBase)}</div>
          <div className="text-teal-400 text-xs mt-0.5">Facturas − Descuentos</div>
        </div>
        <div className="bg-amber-50 rounded-xl border border-amber-200 p-3 text-xs"><div className="text-amber-500 mb-0.5">Causadas</div><div className="font-bold text-amber-700">{$n(totCausadas)}</div><div className="text-amber-300 text-xs mt-0.5">% × base</div></div>
        <div className="bg-emerald-50 rounded-xl border border-emerald-200 p-3 text-xs"><div className="text-emerald-500 mb-0.5">Pagadas</div><div className="font-bold text-emerald-700">{$n(totPagadas)}</div></div>
      </div>
      {/* Saldo */}
      <div className={'rounded-xl border px-4 py-3 flex items-center justify-between text-xs '+(totSaldo>0?'bg-red-50 border-red-200':'bg-green-50 border-green-200')}>
        <span className={totSaldo>0?'text-red-600 font-medium':'text-green-600 font-medium'}>Saldo pendiente de pago</span>
        <span className={'font-bold text-sm '+(totSaldo>0?'text-red-700':'text-green-700')}>{$n(Math.abs(totSaldo))} {totSaldo<=0?'✓ Saldado':''}</span>
      </div>

      {totCobrosReales===0&&<div className="bg-yellow-50 border border-yellow-200 text-yellow-700 text-xs rounded-xl px-4 py-3">⚠️ Sin cobros reales. Registra cobros en la pestaña <b>💰 Cobros Reales</b> para que se calculen las causadas.</div>}

      {/* ── Desglose base de cálculo ── */}
      {cobros.length>0&&(
        <div className="bg-white rounded-xl border overflow-hidden">
          <div className="px-4 py-3 border-b font-semibold text-sm flex items-center justify-between">
            <span>📋 Base para Cálculo de Participaciones</span>
            <span className="text-xs text-gray-400 font-normal">Causadas = % × Base Total <b className="text-teal-700">{$n(totBase)}</b></span>
          </div>
          <table className="w-full text-xs">
            <thead className="bg-gray-50 text-gray-400">
              <tr>
                <th className="text-left px-4 py-2">Nº Factura</th>
                <th className="text-left px-4 py-2">Fecha</th>
                <th className="text-right px-4 py-2 text-emerald-600">Monto Factura</th>
                <th className="text-right px-4 py-2 text-red-500 font-semibold">Pagos a Terceros</th>
                <th className="text-right px-4 py-2 text-orange-400">Otros Descuentos</th>
                <th className="text-right px-4 py-2 text-teal-600 font-semibold">Base Cálculo</th>
              </tr>
            </thead>
            <tbody>
              {cobros.sort((a,b)=>a.fecha>b.fecha?1:-1).map(c=>{
                const isEditingCobro=editCobro===c.id;
                return(
                  <tr key={c.id} className="border-t hover:bg-gray-50">
                    <td className="px-4 py-2">
                      <span className="px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full font-mono">{c.numFactura||'—'}</span>
                    </td>
                    <td className="px-4 py-2 text-gray-600">{c.fecha||'—'}</td>
                    <td className="px-4 py-2 text-right text-emerald-600 font-medium">{$n(c.amount)}</td>
                    {isEditingCobro?(
                      <>
                        <td className="px-4 py-2 text-right">
                          <input type="number" value={editCobroForm.pagosTerceros}
                            onChange={e=>setEditCobroForm({...editCobroForm,pagosTerceros:e.target.value})}
                            className="border-2 border-red-300 rounded px-2 py-1 text-xs w-28 text-right"/>
                        </td>
                        <td className="px-4 py-2 text-right">
                          <input type="number" value={editCobroForm.otrosDescuentos}
                            onChange={e=>setEditCobroForm({...editCobroForm,otrosDescuentos:e.target.value})}
                            className="border-2 border-orange-200 rounded px-2 py-1 text-xs w-28 text-right"/>
                        </td>
                        <td className="px-4 py-2 text-right font-bold text-teal-700 bg-teal-50">
                          <div>{$n(c.amount-(parseFloat(editCobroForm.pagosTerceros)||0)-(parseFloat(editCobroForm.otrosDescuentos)||0))}</div>
                          <div className="flex gap-1 justify-end mt-1">
                            <button onClick={()=>{
                              save({...data,realCobros:(data.realCobros||[]).map(x=>x.id===c.id?{...x,pagosTerceros:parseFloat(editCobroForm.pagosTerceros)||0,otrosDescuentos:parseFloat(editCobroForm.otrosDescuentos)||0}:x)});
                              setEditCobro(null);
                            }} className="text-green-600 font-bold bg-green-100 px-2 py-0.5 rounded text-xs">✓</button>
                            <button onClick={()=>setEditCobro(null)} className="text-gray-400 bg-gray-100 px-2 py-0.5 rounded text-xs">✕</button>
                          </div>
                        </td>
                      </>
                    ):(
                      <>
                        <td className="px-4 py-2 text-right">
                          <div className="flex items-center justify-end gap-1">
                            <span className={'font-medium '+(c.pagosTerceros>0?'text-red-500':'text-gray-300')}>{(c.pagosTerceros||0)>0?$n(c.pagosTerceros):'—'}</span>
                          </div>
                        </td>
                        <td className="px-4 py-2 text-right">
                          <span className={(c.otrosDescuentos||0)>0?'text-orange-500':'text-gray-300'}>{(c.otrosDescuentos||0)>0?$n(c.otrosDescuentos):'—'}</span>
                        </td>
                        <td className="px-4 py-2 text-right font-bold text-teal-700 bg-teal-50">
                          <div className="flex items-center justify-end gap-2">
                            <span>{$n(getBaseCalculo(c))}</span>
                            <button onClick={()=>{setEditCobro(c.id);setEditCobroForm({pagosTerceros:String(c.pagosTerceros||0),otrosDescuentos:String(c.otrosDescuentos||0)});}}
                              className="text-indigo-400 hover:text-indigo-600 text-xs">✏️</button>
                          </div>
                        </td>
                      </>
                    )}
                  </tr>
                );
              })}
            </tbody>
            <tfoot className="border-t-2 bg-gray-50 font-bold text-xs">
              <tr>
                <td colSpan={2} className="px-4 py-2">TOTAL</td>
                <td className="px-4 py-2 text-right text-emerald-700">{$n(totCobrosReales)}</td>
                <td className="px-4 py-2 text-right text-red-600">{cobros.some(c=>c.pagosTerceros>0)?$n(cobros.reduce((s,c)=>s+(c.pagosTerceros||0),0)):'—'}</td>
                <td className="px-4 py-2 text-right text-orange-500">{cobros.some(c=>c.otrosDescuentos>0)?$n(cobros.reduce((s,c)=>s+(c.otrosDescuentos||0),0)):'—'}</td>
                <td className="px-4 py-2 text-right text-teal-700 bg-teal-50">{$n(totBase)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}

      {/* ── Sección 1: Asignar persona ── */}
      <div className="bg-white rounded-xl border p-5">
        <div className="font-semibold text-sm mb-3">👤 Asignar persona al proyecto</div>
        <div className="grid grid-cols-3 gap-3 mb-3">
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Filtrar por categoría</label>
            <select value={filterCat} onChange={e=>{setFilterCat(e.target.value);setSelPerson('');setPctVal('');}} className="w-full border rounded-lg px-3 py-1.5 text-sm">
              <option value="">— Todas —</option>
              {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">Persona</label>
            <select value={selPerson} onChange={e=>handleSelectPerson(e.target.value)} className="w-full border rounded-lg px-3 py-1.5 text-sm">
              <option value="">— Seleccionar —</option>
              {filteredPeople.map(p=>{
                const cat=cats.find(c=>c.id===p.catId);
                const ya=realParts.find(rp=>rp.personId===p.id);
                return <option key={p.id} value={p.id}>{p.name} ({cat?cat.name:'—'}){ya?' ✓':''}</option>;
              })}
            </select>
          </div>
          <div>
            <label className="text-gray-400 text-xs mb-1 block">% participación</label>
            <div className="flex items-center gap-2">
              <input type="number" value={pctVal} onChange={e=>setPctVal(e.target.value)} placeholder="0" step="0.5" className="w-24 border-2 border-amber-300 rounded-lg px-3 py-1.5 text-sm"/>
              <span className="text-xs text-gray-400">%</span>
              {pctVal&&totCobrosReales>0&&<span className="text-xs text-amber-600 font-medium">= {$n((parseFloat(pctVal)||0)/100*totCobrosReales)}</span>}
            </div>
          </div>
        </div>
        <SaveBtn onClick={addPersona} label={realParts.find(p=>p.personId===selPerson)?'💾 Actualizar %':'💾 Asignar'} disabled={!selPerson||!pctVal}/>
      </div>

      {/* ── Sección 2: Registrar pago ── */}
      {realParts.length>0&&(
        <div className="bg-white rounded-xl border p-5">
          <div className="font-semibold text-sm mb-3">💚 Registrar Pago de Participación</div>
          <div className="grid grid-cols-6 gap-3 mb-3">
            <div>
              <label className="text-gray-400 text-xs mb-1 block">Persona</label>
              <select value={pagoPersonId} onChange={e=>setPagoPersonId(e.target.value)} className="w-full border-2 border-emerald-300 rounded-lg px-3 py-1.5 text-sm">
                <option value="">— Seleccionar —</option>
                {realParts.map(rp=>{
                  const person=people.find(p=>p.id===rp.personId);
                  const caus=causadasDe(rp);
                  const pagado=totPagadoPersona(rp.personId);
                  const saldo=caus-pagado;
                  return <option key={rp.id} value={rp.personId}>{person?person.name:rp.personId} — saldo: {saldo>0?'$'+Math.round(saldo):'saldado'}</option>;
                })}
              </select>
            </div>
            <div>
              <label className="text-gray-400 text-xs mb-1 block">Monto (USD)</label>
              <input type="number" value={pagoAmount} onChange={e=>setPagoAmount(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPago()} placeholder="0" className="w-full border-2 border-emerald-300 rounded-lg px-3 py-1.5 text-sm"/>
            </div>
            <div>
              <label className="text-gray-400 text-xs mb-1 block">Tasa de Cambio (Bs)</label>

            </div>
            <div>
              <label className="text-gray-400 text-xs mb-1 block">Monto (Bs)</label>

      )}

      {/* ── Tabs ── */}
      {realParts.length>0&&(
        <div className="flex gap-2">
          {[['resumen','📊 Resumen'],['detalle','👤 Por Persona y Pagos']].map(([v,l])=>(

      {/* ── Vista: Resumen por categoría ── */}
      {view==='resumen'&&realParts.length>0&&(

              <th className="text-right px-4 py-2 text-amber-600">Causado</th>

            </tr></thead>
            <tbody>
              {cats.map(cat=>{
                const catPpl=people.filter(p=>p.catId===cat.id);
                const catRPs=realParts.filter(rp=>catPpl.some(p=>p.id===rp.personId));
                if(catRPs.length===0)return null;
                const cPct=catRPs.reduce((s,p)=>s+p.pct,0);
                const cCaus=catRPs.reduce((s,p)=>s+causadasDe(p),0);
                const cPag=catRPs.reduce((s,p)=>s+totPagadoPersona(p.personId),0);
                return(
                  <tr key={cat.id} className="border-t hover:bg-gray-50">
                    <td className="px-4 py-2 font-medium">{cat.name}</td>

                    <td className="px-4 py-2 text-right font-medium">{cPct.toFixed(2)}%</td>

                    <td className="px-4 py-2 text-right"><SaldoBadge c={cCaus} p={cPag}/></td>

            <tfoot className="border-t-2 bg-gray-50 font-bold text-xs"><tr>
              <td className="px-4 py-2">TOTAL</td>
              <td className="px-4 py-2 text-right">{realParts.length}</td>
              <td className="px-4 py-2 text-right">{realParts.reduce((s,p)=>s+p.pct,0).toFixed(2)}%</td>
              <td className="px-4 py-2 text-right text-amber-700">{$n(totCausadas)}</td>
              <td className="px-4 py-2 text-right text-emerald-700">{$n(totPagadas)}</td>
              <td className="px-4 py-2 text-right"><SaldoBadge c={totCausadas} p={totPagadas}/></td>
            </tr></tfoot>
          </table>
        </div>
      )}

      {/* ── Vista: Por Persona con pagos individuales ── */}
      {view==='detalle'&&realParts.length>0&&(
        <div className="space-y-3">
          {realParts.map(rp=>{
            const person=people.find(p=>p.id===rp.personId);
            const cat=person?cats.find(c=>c.id===person.catId):null;
            const caus=causadasDe(rp);
            const pagos=pagosDePersona(rp.personId);
            const totPag=pagos.reduce((s,p)=>s+p.amount,0);
            return(
              <div key={rp.id} className="bg-white rounded-xl border overflow-hidden">

                <div className="px-4 py-3 bg-gray-50 border-b flex items-center justify-between">

                    {person&&<div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'rgb(0,186,179)'}}>{person.initials||autoInitials(person.name)}</div>}
                    <div>
                      <div className="font-semibold text-sm">{person?person.name:'—'}</div>
                      <div className="text-xs text-gray-400">{cat?cat.name:'—'}</div>
                    </div>
                    {/* Edit pct inline */}
                    {editRpId===rp.id?(
                      <div className="flex items-center gap-1 ml-3">
                        <input type="number" value={editRpPct} onChange={e=>setEditRpPct(e.target.value)} className="border-2 border-amber-300 rounded px-2 py-0.5 text-xs w-16 text-right"/>
                        <span className="text-xs text-gray-400">%</span>
                        <button onClick={applyEditRp} className="text-green-600 text-xs font-bold ml-1">✓</button>
                        <button onClick={()=>setEditRpId(null)} className="text-gray-400 text-xs ml-1">✕</button>

                    ):(
                      <span className="px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full text-xs font-bold ml-2 cursor-pointer" onClick={()=>{setEditRpId(rp.id);setEditRpPct(String(rp.pct));}}>

                    )}

                  <div className="flex items-center gap-4 text-xs">
                    <span className="text-amber-600 font-medium">Causado: <b>{$n(caus)}</b></span>
                    <span className="text-emerald-600 font-medium">Pagado: <b>{$n(totPag)}</b></span>
                    <SaldoBadge c={caus} p={totPag}/>
                    <button onClick={()=>delPersona(rp.id)} className="text-red-400 text-xs ml-2">🗑</button>
                  </div>
                </div>
                {/* Pagos individuales */}
                {pagos.length>0&&(
                  <table className="w-full text-xs">
                    <thead className="bg-white text-gray-400 border-b">
                      <tr>
                        <th className="text-left px-4 py-1.5">Fecha</th>
                        <th className="text-right px-4 py-1.5 text-emerald-600">Monto ($)</th>
                        <th className="text-right px-4 py-1.5">Tasa Cambio</th>
                        <th className="text-right px-4 py-1.5">Monto (Bs)</th>
                        <th className="text-left px-4 py-1.5">Notas</th>
                        <th className="w-20"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {pagos.sort((a,b)=>a.fecha>b.fecha?1:-1).map(pago=>(
                        <tr key={pago.id} className="border-t hover:bg-gray-50">
                          {editPagoId===pago.id?(
                            <>
                              <td className="px-4 py-1.5"><input type="date" value={editPagoForm.fecha} onChange={e=>setEditPagoForm({...editPagoForm,fecha:e.target.value})} className="border rounded px-2 py-0.5 text-xs w-36"/></td>
                              <td className="px-4 py-1.5 text-right"><input type="number" value={editPagoForm.amount} onChange={e=>setEditPagoForm({...editPagoForm,amount:e.target.value})} className="border-2 border-emerald-300 rounded px-2 py-0.5 text-xs w-28 text-right"/></td>
                              <td className="px-4 py-1.5 text-right"><input type="number" value={editPagoForm.tasaCambio} onChange={e=>setEditPagoForm({...editPagoForm,tasaCambio:e.target.value})} className="border rounded px-2 py-0.5 text-xs w-24 text-right"/></td>
                              <td className="px-4 py-1.5 text-right font-medium text-gray-600 truncate">{((parseFloat(editPagoForm.amount)||0)*(parseFloat(editPagoForm.tasaCambio)||0)).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2})} Bs</td>
                              <td className="px-4 py-1.5"><input value={editPagoForm.notes} onChange={e=>setEditPagoForm({...editPagoForm,notes:e.target.value})} className="border rounded px-2 py-0.5 text-xs w-full"/></td>
                              <td className="px-4 py-1.5 text-right whitespace-nowrap">
                                <button onClick={applyEditPago} className="text-green-600 font-bold mr-1">✓</button>
                                <button onClick={()=>setEditPagoId(null)} className="text-gray-400">✕</button>

                            </>

                            <>
                              <td className="px-4 py-1.5 text-gray-600">{pago.fecha||'—'}</td>
                              <td className="px-4 py-1.5 text-right text-emerald-600 font-medium">{$n(pago.amount)}</td>
                              <td className="px-4 py-1.5 text-right text-gray-500">{(pago.tasaCambio||0)>0?pago.tasaCambio:'—'}</td>
                              <td className="px-4 py-1.5 text-right text-gray-700 font-medium">{(pago.tasaCambio||0)>0?((pago.amount||0)*(pago.tasaCambio||0)).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2})+' Bs':'—'}</td>
                              <td className="px-4 py-1.5 text-gray-400">{pago.notes||'—'}</td>
                              <td className="px-4 py-1.5 text-right whitespace-nowrap">
                                <button onClick={()=>startEditPago(pago)} className="text-indigo-400 mr-2">✏️</button>
                                <button onClick={()=>delPago(pago.id)} className="text-red-400">✕</button>
                              </td>

                    </tbody>
                    <tfoot className="border-t bg-emerald-50 font-bold text-xs">
                      <tr>
                        <td className="px-4 py-1.5">Total pagado</td>
                        <td className="px-4 py-1.5 text-right text-emerald-700">{$n(totPag)}</td>

                      </tr>

                )}
                {pagos.length===0&&<div className="px-4 py-3 text-xs text-gray-400 italic">Sin pagos registrados aún para esta persona.</div>}
              </div>
            );
          })}
        </div>
      )}

      {realParts.length===0&&<p className="text-gray-400 text-xs text-center py-4 bg-white rounded-xl border">Sin participaciones registradas. Asigna personas arriba.</p>}
    </div>
  );
}


/* ══════════════════════════ COBROS REALES ══════════════════ */
function ProjComparativo({projId,data}){
  const pl=getPL(projId,data);
  const rl=getRealPL(projId,data);
  const diff=(e,r)=>r-e;
  const pctDiff=(e,r)=>e!==0?((r-e)/Math.abs(e))*100:0;
  const DiffBadge=({e,r,invert})=>{
    const d=diff(e,r);
    const isGood=invert?(d<0):(d>=0);
    if(d===0)return <span className="text-gray-400">—</span>;
    return <span className={(isGood?'text-green-600':'text-red-600')+' font-medium'}>{d>=0?'+':''}{$n(d)}</span>;
  };
  const rows=[
    {l:'Ingresos',e:pl.revE,r:rl.revA,invertDiff:false,bold:true,color:''},
    {l:'Costos Internos',e:pl.intC,r:rl.intC,invertDiff:true,bold:false,color:'text-orange-600'},
    {l:'Costos Externos',e:pl.extC,r:rl.extC,invertDiff:true,bold:false,color:'text-red-500'},
    {l:'Costo de Terceros',e:0,r:rl.tercC||0,invertDiff:true,bold:false,color:'text-red-400'},
    {l:'Participaciones',e:pl.partE,r:rl.partC,invertDiff:true,bold:false,color:'text-teal-600'},
    {l:'Total Costos',e:pl.totC,r:rl.totC,invertDiff:true,bold:true,color:'text-orange-700',sep:true},
    {l:'Resultado / Margen',e:pl.res,r:rl.res,invertDiff:false,bold:true,color:pl.res>=0?'text-blue-700':'text-red-600',sep:true},
  ];
  // Monthly revenue comparison
  // cobros reales assigned to month by exact date
  // Pre-index real cobros by month index for performance
  const cobrosByIdx={};
  (data.realCobros||[]).filter(c=>c.projectId===projId&&c.fecha).forEach(c=>{
    const d=new Date(c.fecha+'T00:00:00');
    const idx=(d.getFullYear()-2025)*12+d.getMonth()-6;
    if(idx>=0&&idx<24) cobrosByIdx[idx]=(cobrosByIdx[idx]||0)+c.amount;
  });
  const cobroRealByMonth=m=>cobrosByIdx[m]||0;
  const mData=MO.map((_,m)=>({
    mes:MO[m],
    est:getRev(projId,m,data,'est'),
    real:getRev(projId,m,data,'act'),
    planCobro:(data.revenues.find(r=>r.projectId===projId&&r.month===m)||{}).cobro||0,
    realCobro:cobroRealByMonth(m),
    intEst:getIntCost(projId,m,data),
    intReal:getRealIntCost(projId,m,data),
    extEst:getExtCost(projId,m,data),
    extReal:getRealExtCost(projId,m,data),
  }));
  const totPlanCobro=mData.reduce((s,m)=>s+m.planCobro,0);
  const totRealCobro=(data.realCobros||[]).filter(c=>c.projectId===projId).reduce((s,c)=>s+c.amount,0);
  const hasAnyReal=rl.revA>0||rl.intC>0||rl.extC>0||rl.partC>0;
  return(
    <div className="space-y-5">
      {!hasAnyReal&&(
        <div className="bg-blue-50 border border-blue-200 text-blue-700 text-xs rounded-xl px-4 py-3">
          ℹ️ Aún no hay datos reales registrados. Usa las pestañas <b>Internos Real</b>, <b>Externos Real</b> e <b>Ingresos</b> para ingresar los valores reales del proyecto.
        </div>
      )}
      {/* Summary table */}
      <div className="bg-white rounded-xl border overflow-hidden">
        <div className="px-4 py-3 border-b font-semibold text-sm">📊 Comparativo Presupuesto vs Real
          <span className="text-gray-400 font-normal text-xs ml-2">— Participaciones: Presupuesto = %×ingr.est. | Real = %×cobros reales acumulados</span>
        </div>
        <table className="w-full text-xs">
          <thead className="bg-gray-50 text-gray-400">
            <tr>
              <th className="text-left px-4 py-2">Concepto</th>
              <th className="text-right px-4 py-2 text-indigo-600">Presupuesto</th>
              <th className="text-right px-4 py-2 text-emerald-600">Real</th>
              <th className="text-right px-4 py-2">Diferencia</th>
              <th className="text-right px-4 py-2">% Var.</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row,i)=>(
              <tr key={i} className={(row.sep?'border-t-2 border-indigo-200':'border-t')+(row.bold?' bg-gray-50':'')}>
                <td className={'px-4 py-2.5 '+(row.bold?'font-semibold ':'')+row.color}>{row.l}</td>
                <td className={'px-4 py-2.5 text-right text-indigo-700 '+(row.bold?'font-bold ':'')}>{$n(row.e)}</td>
                <td className={'px-4 py-2.5 text-right text-emerald-600 '+(row.bold?'font-bold ':'')}>{row.r>0||row.r<0?$n(row.r):'—'}</td>
                <td className="px-4 py-2.5 text-right"><DiffBadge e={row.e} r={row.r} invert={row.invertDiff}/></td>
                <td className="px-4 py-2.5 text-right text-gray-500">{row.e!==0?pc(Math.abs(pctDiff(row.e,row.r))):'—'}</td>
              </tr>
            ))}
          </tbody>
          <tfoot className="border-t-2 bg-indigo-50 text-xs font-bold">
            <tr>
              <td className="px-4 py-2">Margen %</td>
              <td className="px-4 py-2 text-right text-indigo-700"><Mbadge m={pl.mg}/></td>
              <td className="px-4 py-2 text-right text-emerald-700"><Mbadge m={rl.mg}/></td>
              <td colSpan={2} className={'px-4 py-2 text-right '+(rl.mg-pl.mg>=0?'text-green-600':'text-red-600')}>{(rl.mg-pl.mg>=0?'+':'')+pc(rl.mg-pl.mg)} vs presupuesto</td>
            </tr>
          </tfoot>
        </table>
      </div>
      {/* Monthly comparison */}
      <div className="bg-white rounded-xl border overflow-x-auto">
        <div className="px-4 py-3 border-b font-semibold text-sm">Ingresos por Mes — Est. vs Real</div>
        <table className="min-w-max w-full text-xs">
          <thead className="bg-gray-50 text-gray-400">
            <tr>
              <th className="text-left px-3 py-2 w-28">Concepto</th>
              {MO.map(m=><th key={m} className="text-right px-2 py-2 w-20">{m}</th>)}
              <th className="text-right px-3 py-2">Total</th>
            </tr>
          </thead>
          <tbody>
            <tr className="border-t">
              <td className="px-3 py-2 text-indigo-700 font-medium">📋 Ingr. Est.</td>
              {mData.map((m,i)=><td key={i} className="px-2 py-2 text-right text-indigo-600">{m.est>0?$n(m.est):'—'}</td>)}
              <td className="px-3 py-2 text-right font-bold text-indigo-700">{$n(pl.revE)}</td>
            </tr>
            <tr className="border-t">
              <td className="px-3 py-2 text-emerald-700 font-medium">✅ Ingr. Real</td>
              {mData.map((m,i)=><td key={i} className="px-2 py-2 text-right text-emerald-600">{m.real>0?$n(m.real):'—'}</td>)}
              <td className="px-3 py-2 text-right font-bold text-emerald-700">{$n(rl.revA)}</td>
            </tr>
            <tr className="border-t bg-gray-50">
              <td className="px-3 py-2 text-gray-600 font-medium">Δ Dif. Ingr.</td>
              {mData.map((m,i)=>{
                const d=m.real-m.est;
                if(m.est===0&&m.real===0)return <td key={i} className="px-2 py-2 text-right text-gray-300">—</td>;
                return <td key={i} className={'px-2 py-2 text-right '+(d>=0?'text-green-600':'text-red-500')}>{d>=0?'+':''}{d!==0?$n(Math.abs(d)):'='}</td>;
              })}
              <td className={'px-3 py-2 text-right font-bold '+(rl.revA-pl.revE>=0?'text-green-600':'text-red-500')}>{$n(rl.revA-pl.revE)}</td>
            </tr>
            <tr className="border-t">
              <td className="px-3 py-2 font-medium text-teal-700">📋 Plan Cobro</td>
              {mData.map((m,i)=><td key={i} className="px-2 py-2 text-right text-teal-600">{m.planCobro>0?$n(m.planCobro):'—'}</td>)}
              <td className="px-3 py-2 text-right font-bold text-teal-700">{$n(totPlanCobro)}</td>
            </tr>
            <tr className="border-t">
              <td className="px-3 py-2 font-medium text-emerald-700">✅ Cobrado Real</td>
              {mData.map((m,i)=><td key={i} className="px-2 py-2 text-right text-emerald-600">{m.realCobro>0?$n(m.realCobro):'—'}</td>)}
              <td className="px-3 py-2 text-right font-bold text-emerald-700">{$n(totRealCobro)}</td>
            </tr>
            <tr className="border-t bg-teal-50">
              <td className="px-3 py-2 font-medium text-teal-600">Δ Dif. Cobro</td>
              {mData.map((m,i)=>{
                const d=m.realCobro-m.planCobro;
                if(m.planCobro===0&&m.realCobro===0)return<td key={i} className="px-2 py-2 text-right text-gray-300">—</td>;
                return<td key={i} className={'px-2 py-2 text-right '+(d>=0?'text-green-600':'text-amber-600')}>{d!==0?(d>0?'+':'')+$n(Math.abs(d)):'='}</td>;
              })}
              <td className={'px-3 py-2 text-right font-bold '+(totRealCobro-totPlanCobro>=0?'text-green-600':'text-amber-600')}>{$n(totRealCobro-totPlanCobro)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      {/* Participaciones detail */}
      {(()=>{
        const totCobros=getTotRealCobros(projId,data);
        const budParts=(data.participations||[]).filter(p=>p.projectId===projId);
        const realParts=(data.realParticipations||[]).filter(p=>p.projectId===projId);
        if(budParts.length===0&&realParts.length===0)return null;
        const cats=data.partCats||DEFAULT_PART_CATS;
        const people=data.people||[];
        // Build rows per category
        const catRows=cats.map(cat=>{
          const budPart=budParts.find(p=>p.catId===cat.id);
          const budAmt=budPart?(budPart.pct/100)*pl.revE:0;
          const catPpl=people.filter(p=>p.catId===cat.id);
          const catRPs=realParts.filter(rp=>catPpl.some(p=>p.id===rp.personId));
          const realAmt=catRPs.reduce((s,p)=>s+(p.pct/100)*totCobros,0);
          if(budAmt===0&&realAmt===0)return null;
          return{cat,budAmt,realAmt,catRPs};
        }).filter(Boolean);
        if(catRows.length===0)return null;
        return(
          <div className="bg-white rounded-xl border overflow-hidden">
            <div className="px-4 py-3 border-b font-semibold text-sm">Participaciones — Presupuesto vs Real</div>
            <table className="w-full text-xs">
              <thead className="bg-gray-50 text-gray-400">
                <tr>
                  <th className="text-left px-4 py-2">Categoría / Persona</th>
                  <th className="text-right px-4 py-2 text-indigo-600">Presupuestado</th>
                  <th className="text-right px-4 py-2 text-amber-600">Causado Real</th>
                  <th className="text-right px-4 py-2">Diferencia</th>
                </tr>
              </thead>
              <tbody>
                {catRows.map(({cat,budAmt,realAmt,catRPs})=>(
                  <React.Fragment key={cat.id}>
                    <tr className="border-t bg-gray-50">
                      <td className="px-4 py-2 font-semibold text-gray-700">{cat.name}</td>

                ))}
              </tbody>
              <tfoot className="border-t-2 bg-teal-50 font-bold text-xs">
                <tr>
                  <td className="px-4 py-2">Total Participaciones</td>

    </div>
  );
}
