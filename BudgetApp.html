// Helper: returns the Monday date string (YYYY-MM-DD) for a given Date
function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff);
  return dt.toISOString().split('T')[0];
}
function addDays(dateStr,n){
  const d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}
function fmtWeekLabel(monday){
  const fri=addDays(monday,4);
  const opts={day:'2-digit',month:'short'};
  const mDate=new Date(monday+'T00:00:00');
  const fDate=new Date(fri+'T00:00:00');
  return mDate.toLocaleDateString('es-VE',opts)+' – '+fDate.toLocaleDateString('es-VE',{...opts,year:'numeric'});
}

function ATimeSheet({data,save,currentUser}){
  const role=currentUser&&currentUser.role||'user';
  const isAdminRole=role==='admin'||role==='administracion';
  const canSeeReport=isAdminRole||role==='socio'||role==='responsable'||role==='rrhh';
  const [weekStart,setWeekStart]=useState(()=>getMonday(new Date()));
  const [reportTab,setReportTab]=useState('mis-horas'); // 'mis-horas' | 'reporte'
  const [addingDay,setAddingDay]=useState(null); // day index 0-4 being added
  const [form,setForm]=useState({type:'proyecto',projectId:'',concept:'',hours:'',notes:''});
  const [syncErr,setSyncErr]=useState('');
  const saveTs=async(newData)=>{
    setSyncErr('');
    try{await save(newData);}
    catch(e){setSyncErr('⚠️ Error al guardar horas: '+e.message);}
  };

  const myId=currentUser&&currentUser.id;
  const allSheets=data.timesheets||[];

  // Current user's entries for this week
  const myEntries=allSheets.filter(e=>e.userId===myId&&e.weekStart===weekStart);

  // Active projects (not closed, not in papelera)
  const activeProjects=(data.projects||[]).filter(p=>!p.cerrado&&!p.enPapelera)
    .sort((a,b)=>a.name.localeCompare(b.name));

  // Hours per day for current user
  const hoursForDay=(dayIdx)=>myEntries.filter(e=>e.dayOfWeek===dayIdx+1).reduce((s,e)=>s+e.hours,0);
  const totalWeek=myEntries.reduce((s,e)=>s+e.hours,0);

  const prevWeek=()=>setWeekStart(addDays(weekStart,-7));
  const nextWeek=()=>setWeekStart(addDays(weekStart,7));

  const openAdd=(dayIdx)=>{setAddingDay(dayIdx);setForm({type:'proyecto',projectId:'',concept:'',hours:'',notes:''}); };
  const cancelAdd=()=>setAddingDay(null);

  const commitAdd=()=>{
    const hrs=parseFloat(form.hours)||0;
    if(hrs<=0)return;
    if(form.type==='proyecto'&&!form.projectId)return;
    if(form.type==='concepto'&&!form.concept)return;
    const entry={
      id:uid(),
      userId:myId,
      weekStart,
      dayOfWeek:addingDay+1,
      projectId:form.type==='proyecto'?form.projectId:'',
      concept:form.type==='concepto'?form.concept:'',
      hours:hrs,
      notes:form.notes.trim(),
    };
    saveTs({...data,timesheets:[...allSheets,entry]});
    setAddingDay(null);
  };

  const removeEntry=(id)=>saveTs({...data,timesheets:allSheets.filter(e=>e.id!==id)});

  // Weekly summary by project/concept
  const summaryMap={};
  myEntries.forEach(e=>{
    const key=e.projectId||e.concept||'?';
    if(!summaryMap[key]) summaryMap[key]={hours:0,notes:[]};
    summaryMap[key].hours+=e.hours;
    if(e.notes&&e.notes.trim()) summaryMap[key].notes.push({day:DAY_NAMES[e.dayOfWeek-1],note:e.notes.trim()});
  });

  const getProjectName=(pid)=>{
    const p=(data.projects||[]).find(x=>x.id===pid);
    return p?`${p.codigo?p.codigo+' · ':''}${p.name} (${p.client})`:'Proyecto desconocido';
  };

  const dayColors=['bg-indigo-50 border-indigo-200','bg-teal-50 border-teal-200','bg-purple-50 border-purple-200','bg-blue-50 border-blue-200','bg-emerald-50 border-emerald-200'];
  const dayTextColors=['text-indigo-700','text-teal-700','text-purple-700','text-blue-700','text-emerald-700'];

  return(
    <div className="p-6 max-w-5xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-xl font-bold text-gray-800">⏱️ TimeSheet</h1>
          {syncErr&&<div className="text-xs text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 mt-1">{syncErr}<br/><span className="text-gray-400">Verifica en Supabase → SQL Editor que la tabla timesheets tiene RLS habilitado con política de acceso abierto.</span></div>}
          <p className="text-xs text-gray-400 mt-0.5">Jornada: 8:30–12:00 / 13:00–17:30 · 8h diarias · {currentUser&&currentUser.name}</p>
        </div>
        {canSeeReport&&(
          <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
            <button onClick={()=>setReportTab('mis-horas')}
              className={'px-4 py-1.5 rounded-lg text-xs font-medium transition-all '+(reportTab==='mis-horas'?'bg-white shadow text-indigo-700':'text-gray-500 hover:text-gray-700')}>
              📋 Mis Horas
            </button>
            <button onClick={()=>setReportTab('reporte')}
              className={'px-4 py-1.5 rounded-lg text-xs font-medium transition-all '+(reportTab==='reporte'?'bg-white shadow text-indigo-700':'text-gray-500 hover:text-gray-700')}>
              📊 Reporte Equipo
            </button>
          </div>
        )}
      </div>

      {reportTab==='reporte'&&canSeeReport
        ?<TimesheetReport data={data} weekStart={weekStart} prevWeek={prevWeek} nextWeek={nextWeek} getProjectName={getProjectName}/>
        :(
        <>
          {/* Week navigator */}
          <div className="flex items-center justify-between bg-white border rounded-2xl px-5 py-3 mb-5 shadow-sm">
            <button onClick={prevWeek} className="text-gray-400 hover:text-indigo-600 text-lg px-2 transition-colors">‹</button>
            <div className="text-center">
              <div className="font-semibold text-gray-700 text-sm">Semana del {fmtWeekLabel(weekStart)}</div>
              <div className="text-xs text-gray-400 mt-0.5">
                Total registrado: <span className={`font-bold ${totalWeek===40?'text-green-600':totalWeek>40?'text-red-600':'text-orange-500'}`}>{totalWeek.toFixed(1)}h</span>
                <span className="ml-1 text-gray-300">/ 40h semanales</span>
              </div>
            </div>
            <button onClick={nextWeek} className="text-gray-400 hover:text-indigo-600 text-lg px-2 transition-colors">›</button>
          </div>

          {/* Day cards grid */}
          <div className="grid grid-cols-5 gap-3 mb-5">
            {DAY_NAMES.map((dayName,dayIdx)=>{
              const dayDate=addDays(weekStart,dayIdx);
              const dayEntries=myEntries.filter(e=>e.dayOfWeek===dayIdx+1);
              const dayHours=hoursForDay(dayIdx);
              const isComplete=Math.abs(dayHours-HOURS_PER_DAY)<0.01;
              const isOver=dayHours>HOURS_PER_DAY;
              const pct=Math.min((dayHours/HOURS_PER_DAY)*100,100);

              return(
                <div key={dayIdx} className={`rounded-2xl border-2 p-3 flex flex-col gap-2 ${dayColors[dayIdx]} transition-all`}>
                  {/* Day header */}
                  <div className="flex items-center justify-between">
                    <div>
                      <div className={`font-bold text-sm ${dayTextColors[dayIdx]}`}>{dayName}</div>
                      <div className="text-xs text-gray-400">{new Date(dayDate+'T00:00:00').toLocaleDateString('es-VE',{day:'2-digit',month:'short'})}</div>
                    </div>
                    <div className={`text-xs font-bold px-2 py-0.5 rounded-full ${isOver?'bg-red-100 text-red-600':isComplete?'bg-green-100 text-green-700':'bg-white text-gray-400'}`}>
                      {dayHours.toFixed(1)}h
                    </div>
                  </div>

                  {/* Progress bar */}
                  <div className="h-1.5 rounded-full bg-white overflow-hidden">
                    <div className={`h-full rounded-full transition-all ${isOver?'bg-red-400':isComplete?'bg-green-400':'bg-indigo-300'}`} style={{width:pct+'%'}}/>
                  </div>

                  {/* Entries */}
                  <div className="space-y-1.5 flex-1">
                    {dayEntries.map(e=>{
                      const label=e.projectId?getProjectName(e.projectId):e.concept;
                      const isConc=!e.projectId;
                      return(
                        <div key={e.id} className="bg-white rounded-xl px-2.5 py-1.5 flex items-start justify-between gap-1 shadow-sm group">
                          <div className="flex-1 min-w-0">
                            <div className={`text-xs font-medium truncate ${isConc?'text-purple-600':'text-gray-700'}`} title={label}>
                              {isConc?'🏷️ ':'📁 '}{label}
                            </div>
                            <div className="text-xs font-bold text-gray-500">{e.hours}h</div>
                            {e.notes&&<div className="text-xs text-gray-400 italic truncate" title={e.notes}>📝 {e.notes}</div>}
                          </div>
                          <button onClick={()=>removeEntry(e.id)} className="opacity-0 group-hover:opacity-100 text-red-300 hover:text-red-500 text-xs leading-none pt-0.5 transition-opacity">✕</button>
                        </div>
                      );
                    })}
                  </div>

                  {/* Add entry */}
                  {addingDay===dayIdx?(
                    <div className="bg-white rounded-xl p-2.5 shadow-sm space-y-1.5">
                      {/* Type toggle */}
                      <div className="flex gap-1">
                        <button onClick={()=>setForm(f=>({...f,type:'proyecto',projectId:'',concept:''}))}
                          className={`flex-1 py-1 rounded-lg text-xs font-medium transition-colors ${form.type==='proyecto'?'bg-indigo-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                          📁 Proyecto
                        </button>
                        <button onClick={()=>setForm(f=>({...f,type:'concepto',projectId:'',concept:''}))}
                          className={`flex-1 py-1 rounded-lg text-xs font-medium transition-colors ${form.type==='concepto'?'bg-purple-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                          🏷️ Concepto
                        </button>
                      </div>
                      {form.type==='proyecto'?(
                        <select value={form.projectId} onChange={e=>setForm(f=>({...f,projectId:e.target.value}))}
                          className="w-full border rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400">
                          <option value="">— Seleccionar proyecto —</option>
                          {activeProjects.map(p=>(
                            <option key={p.id} value={p.id}>{p.codigo?p.codigo+' · ':''}{p.name}</option>
                          ))}
                        </select>
                      ):(
                        <select value={form.concept} onChange={e=>setForm(f=>({...f,concept:e.target.value}))}
                          className="w-full border rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-purple-400">
                          <option value="">— Seleccionar concepto —</option>
                          {TIMESHEET_CONCEPTS.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      )}
                      <div className="flex gap-1">
                        <input type="number" min="0.5" max="8" step="0.5"
                          value={form.hours} onChange={e=>setForm(f=>({...f,hours:e.target.value}))}
                          placeholder={`Horas (máx ${(HOURS_PER_DAY-dayHours).toFixed(1)}h)`}
                          className="flex-1 border rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
                      </div>
                      <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                        placeholder="Notas (opcional)"
                        className="w-full border rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-gray-300"/>
                      <div className="flex gap-1">
                        <button onClick={commitAdd}
                          disabled={!(parseFloat(form.hours)>0)||(form.type==='proyecto'&&!form.projectId)||(form.type==='concepto'&&!form.concept)}
                          className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs py-1.5 rounded-lg disabled:opacity-40 font-medium transition-colors">
                          ✓ Agregar
                        </button>
                        <button onClick={cancelAdd} className="px-2 py-1.5 text-xs text-gray-400 hover:text-gray-600 border rounded-lg">✕</button>
                      </div>
                    </div>
                  ):(
                    <button onClick={()=>openAdd(dayIdx)}
                      className="w-full py-1.5 border-2 border-dashed border-white hover:border-gray-300 text-gray-300 hover:text-gray-500 text-xs rounded-xl transition-all">
                      + Agregar
                    </button>
                  )}

                  {/* Validation hints */}
                  {!isComplete&&dayHours>0&&(
                    <div className={`text-xs text-center rounded-lg py-0.5 ${isOver?'bg-red-100 text-red-500':'bg-orange-50 text-orange-400'}`}>
                      {isOver?`⚠️ Excede en ${(dayHours-HOURS_PER_DAY).toFixed(1)}h`:`Faltan ${(HOURS_PER_DAY-dayHours).toFixed(1)}h`}
                    </div>
                  )}
                  {isComplete&&(
                    <div className="text-xs text-center bg-green-50 text-green-600 rounded-lg py-0.5">✓ Día completo</div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Weekly summary */}
          {Object.keys(summaryMap).length>0&&(
            <div className="bg-white border rounded-2xl p-5 shadow-sm">
              <div className="font-semibold text-sm text-gray-700 mb-3">📊 Resumen Semanal</div>
              <div className="space-y-2">
                {Object.entries(summaryMap).sort((a,b)=>b[1].hours-a[1].hours).map(([key,{hours:hrs,notes:notesList}])=>{
                  const isProj=(data.projects||[]).some(p=>p.id===key);
                  const label=isProj?getProjectName(key):key;
                  const pct=totalWeek>0?(hrs/totalWeek*100):0;
                  return(
                    <div key={key} className="space-y-1">
                      <div className="flex items-center gap-3">
                        <div className="w-4 text-xs">{isProj?'📁':'🏷️'}</div>
                        <div className="flex-1 min-w-0">
                          <div className="text-xs font-medium text-gray-700 truncate mb-0.5">{label}</div>
                          <div className="h-1.5 rounded-full bg-gray-100 overflow-hidden">
                            <div className={`h-full rounded-full ${isProj?'bg-indigo-400':'bg-purple-400'}`} style={{width:pct+'%'}}/>
                          </div>
                        </div>
                        <div className="text-xs font-bold text-gray-600 w-16 text-right">{hrs.toFixed(1)}h <span className="font-normal text-gray-400">({pct.toFixed(0)}%)</span></div>
                      </div>
                      {notesList.length>0&&(
                        <div className="ml-7 space-y-0.5">
                          {notesList.map((n,i)=>(
                            <div key={i} className="text-xs text-gray-400 flex gap-1.5">
                              <span className="text-gray-300 shrink-0">{n.day}:</span>
                              <span className="italic">{n.note}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="mt-3 pt-3 border-t flex justify-between text-xs">
                <span className="text-gray-400">Total semana</span>
                <span className={`font-bold ${totalWeek===40?'text-green-600':totalWeek>40?'text-red-500':'text-orange-500'}`}>{totalWeek.toFixed(1)}h / 40h</span>
              </div>
            </div>
          )}

          {Object.keys(summaryMap).length===0&&(
            <div className="bg-white border-2 border-dashed border-gray-200 rounded-2xl p-10 text-center">
              <div className="text-4xl mb-3">⏱️</div>
              <div className="text-gray-400 text-sm font-medium">Aún no hay horas registradas esta semana</div>
              <div className="text-gray-300 text-xs mt-1">Usa el botón "+ Agregar" en cada día para registrar tus horas</div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ── TimeSheet Admin Report ── */
function TimesheetReport({data,weekStart,prevWeek,nextWeek,getProjectName}){
  const allSheets=data.timesheets||[];
  const users=data.users||[];
  const weekEntries=allSheets.filter(e=>e.weekStart===weekStart);

  // Group by user
  const byUser={};
  weekEntries.forEach(e=>{
    if(!byUser[e.userId])byUser[e.userId]=[];
    byUser[e.userId].push(e);
  });

  const totalHoursForUser=(uid)=>(byUser[uid]||[]).reduce((s,e)=>s+e.hours,0);

  return(
    <div>
      {/* Week nav */}
      <div className="flex items-center justify-between bg-white border rounded-2xl px-5 py-3 mb-5 shadow-sm">
        <button onClick={prevWeek} className="text-gray-400 hover:text-indigo-600 text-lg px-2">‹</button>
        <div className="text-center">
          <div className="font-semibold text-gray-700 text-sm">Semana del {fmtWeekLabel(weekStart)}</div>
          <div className="text-xs text-gray-400 mt-0.5">{Object.keys(byUser).length} usuarios con horas registradas</div>
        </div>
        <button onClick={nextWeek} className="text-gray-400 hover:text-indigo-600 text-lg px-2">›</button>
      </div>

      {users.length===0&&<div className="text-gray-400 text-center py-10 text-sm">No hay usuarios registrados.</div>}

      <div className="space-y-4">
        {users.map(u=>{
          const entries=byUser[u.id]||[];
          const totalHours=entries.reduce((s,e)=>s+e.hours,0);
          const isComplete=Math.abs(totalHours-40)<0.01;
          const hasEntries=entries.length>0;

          return(
            <div key={u.id} className="bg-white border rounded-2xl overflow-hidden shadow-sm">
              {/* User header */}
              <div className={`px-5 py-3 flex items-center justify-between border-b ${hasEntries?'bg-gray-50':'bg-gray-50 opacity-60'}`}>
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center">
                    {u.initials||u.name.slice(0,2).toUpperCase()}
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-gray-800">{u.name}</div>
                    <div className="text-xs text-gray-400">{ROLE_LABEL(u.role)}</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  {hasEntries?(
                    <span className={`text-xs font-bold px-3 py-1 rounded-full ${isComplete?'bg-green-100 text-green-700':totalHours>40?'bg-red-100 text-red-600':'bg-orange-100 text-orange-600'}`}>
                      {totalHours.toFixed(1)}h / 40h
                    </span>
                  ):(
                    <span className="text-xs text-gray-300 italic">Sin horas registradas</span>
                  )}
                </div>
              </div>

              {/* Entries table */}
              {hasEntries&&(
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead className="bg-gray-50 text-gray-400">
                      <tr>
                        <th className="text-left px-4 py-2">Día</th>
                        <th className="text-left px-4 py-2">Proyecto / Concepto</th>
                        <th className="text-right px-4 py-2">Horas</th>
                        <th className="text-left px-4 py-2">Notas</th>
                      </tr>
                    </thead>
                    <tbody>
                      {entries.sort((a,b)=>a.dayOfWeek-b.dayOfWeek).map(e=>{
                        const isConc=!e.projectId;
                        const label=isConc?e.concept:getProjectName(e.projectId);
                        return(
                          <tr key={e.id} className="border-t hover:bg-gray-50">
                            <td className="px-4 py-2 font-medium text-gray-600">{DAY_NAMES[e.dayOfWeek-1]}</td>
                            <td className="px-4 py-2">
                              <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${isConc?'bg-purple-100 text-purple-700':'bg-indigo-100 text-indigo-700'}`}>
                                {isConc?'🏷️':'📁'} {label}
                              </span>
                            </td>
                            <td className="px-4 py-2 text-right font-bold text-gray-700">{e.hours.toFixed(1)}h</td>
                            <td className="px-4 py-2 text-gray-400">{e.notes||'—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot className="border-t-2 bg-gray-50 font-bold">
                      <tr>
                        <td colSpan={2} className="px-4 py-2 text-gray-600">Total</td>
                        <td className="px-4 py-2 text-right text-indigo-700">{totalHours.toFixed(1)}h</td>
                        <td/>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Grand total */}
      {weekEntries.length>0&&(
        <div className="mt-5 bg-indigo-50 border border-indigo-200 rounded-2xl px-5 py-4 flex justify-between items-center">
          <span className="text-sm font-semibold text-indigo-700">Total horas registradas — equipo completo</span>
          <span className="text-lg font-bold text-indigo-700">{weekEntries.reduce((s,e)=>s+e.hours,0).toFixed(1)}h</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
